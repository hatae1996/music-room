// ── PLAYLIST (Firebase userPlaylists/<닉> — 방과 무관하게 동일 닉네임이면 동일 목록)
function firebaseKeyFromNick(nick) {
  return String(nick || '').replace(/[.#$[\]]/g, '_');
}

function userPlaylistDbPath(nick) {
  return `userPlaylists/${firebaseKeyFromNick(nick)}`;
}

function playlistOwnerNick() {
  return String((state.me && state.me.name) || myName || '').trim();
}

function normalizeQueueSong(s) {
  if (!s || !s.id) return null;
  const thumbnail = s.thumbnail || s.thumb || '';
  return { id: s.id, title: s.title || '', channel: s.channel || '', thumbnail };
}

function normalizePlaylistMap(raw) {
  const out = {};
  if (!raw || typeof raw !== 'object' || Array.isArray(raw)) return out;
  for (const k of Object.keys(raw)) {
    if (typeof k !== 'string' || !k.trim()) continue;
    const v = raw[k];
    if (!Array.isArray(v)) {
      out[k] = [];
      continue;
    }
    out[k] = v.map(s => normalizeQueueSong(s)).filter(Boolean);
  }
  return out;
}

function isPlaylistMapEmpty(map) {
  return !map || typeof map !== 'object' || Object.keys(map).length === 0;
}

function clonePlaylistMap(raw) {
  const n = normalizePlaylistMap(raw);
  const o = {};
  for (const k of Object.keys(n)) {
    o[k] = n[k].map(s => ({ ...s }));
  }
  return o;
}

/** RTDB는 빈 배열 [] 를 쓰면 자식이 없다고 보고 키가 사라지는 경우가 많아, 빈 폴더는 '' 로 저장 */
function playlistMapDenormalizeForFirebase(data) {
  const out = {};
  for (const k of Object.keys(data)) {
    const v = data[k];
    if (!Array.isArray(v)) {
      out[k] = v;
      continue;
    }
    out[k] = v.length === 0 ? '' : v.map(s => ({
      id: s.id,
      title: s.title || '',
      channel: s.channel || '',
      thumbnail: s.thumbnail || ''
    }));
  }
  return out;
}

function loadLegacyLocalPlaylists(nick) {
  try {
    const key = 'musicroom_playlists_' + firebaseKeyFromNick(nick);
    const raw = localStorage.getItem(key);
    if (!raw) return {};
    const o = JSON.parse(raw);
    return normalizePlaylistMap(o);
  } catch (e) {
    return {};
  }
}

function playlistTxCurrentAsObject(current) {
  if (current !== null && current !== undefined && typeof current === 'object' && !Array.isArray(current)) {
    return current;
  }
  return {};
}

async function sharedPlaylistTransaction(mutateFn) {
  const nick = playlistOwnerNick();
  if (!nick || !window._fbReady || !window._fb.runTransaction) {
    toast('연결 준비 중이에요');
    return false;
  }
  const { db, ref, runTransaction } = window._fb;
  const pathRef = ref(db, userPlaylistDbPath(nick));
  try {
    const result = await runTransaction(pathRef, (current) => {
      const raw = playlistTxCurrentAsObject(current);
      const data = clonePlaylistMap(raw);
      const ok = mutateFn(data);
      if (ok === false) return undefined;
      return playlistMapDenormalizeForFirebase(data);
    });
    if (result.committed) {
      const v = result.snapshot.exists() ? result.snapshot.val() : null;
      state.sharedPlaylist = normalizePlaylistMap(v);
    }
    return result.committed;
  } catch (e) {
    console.error(e);
    toast('플레이리스트 저장에 실패했어요');
    return false;
  }
}

async function maybeMigrateLocalPlaylistToShared() {
  if (!myName || !window._fbReady || !window._fb.runTransaction) return;
  const key = 'mr_userpl_migrated_' + firebaseKeyFromNick(myName);
  if (sessionStorage.getItem(key)) return;
  const { db, ref, get, runTransaction } = window._fb;
  const pathRef = ref(db, userPlaylistDbPath(myName));
  try {
    const snap = await get(pathRef);
    const existing = normalizePlaylistMap(snap.exists() ? snap.val() : null);
    if (!isPlaylistMapEmpty(existing)) {
      sessionStorage.setItem(key, '1');
      return;
    }
    const legacy = loadLegacyLocalPlaylists(myName);
    if (!isPlaylistMapEmpty(legacy)) {
      const txResult = await runTransaction(pathRef, (current) => {
        const ex = normalizePlaylistMap(playlistTxCurrentAsObject(current));
        if (!isPlaylistMapEmpty(ex)) {
          return current !== null && current !== undefined && typeof current === 'object' && !Array.isArray(current)
            ? current
            : {};
        }
        return playlistMapDenormalizeForFirebase(clonePlaylistMap(legacy));
      });
      if (txResult.committed) {
        const v = txResult.snapshot.exists() ? txResult.snapshot.val() : null;
        state.sharedPlaylist = normalizePlaylistMap(v);
      }
      sessionStorage.setItem(key, '1');
      return;
    }
    if (!state.roomId) {
      sessionStorage.setItem(key, '1');
      return;
    }
    const roomPlSnap = await get(ref(db, `rooms/${state.roomId}/sharedPlaylist`));
    const fromRoom = normalizePlaylistMap(roomPlSnap.exists() ? roomPlSnap.val() : null);
    if (isPlaylistMapEmpty(fromRoom)) {
      sessionStorage.setItem(key, '1');
      return;
    }
    const txResult = await runTransaction(pathRef, (current) => {
      const ex = normalizePlaylistMap(playlistTxCurrentAsObject(current));
      if (!isPlaylistMapEmpty(ex)) {
        return current !== null && current !== undefined && typeof current === 'object' && !Array.isArray(current)
          ? current
          : {};
      }
      return playlistMapDenormalizeForFirebase(clonePlaylistMap(fromRoom));
    });
    if (txResult.committed) {
      const v = txResult.snapshot.exists() ? txResult.snapshot.val() : null;
      state.sharedPlaylist = normalizePlaylistMap(v);
    }
    sessionStorage.setItem(key, '1');
  } catch (e) {
    console.error(e);
    sessionStorage.setItem(key, '1');
  }
}

function loadPlaylists(_nick) {
  return clonePlaylistMap(state.sharedPlaylist);
}

async function createFolder(_nick, folderName) {
  const name = (folderName || '').trim();
  if (!name) return false;
  return sharedPlaylistTransaction((data) => {
    if (Object.prototype.hasOwnProperty.call(data, name)) {
      toast('같은 이름의 폴더가 있어요');
      return false;
    }
    data[name] = [];
    return true;
  });
}

async function deleteFolder(_nick, folderName) {
  return sharedPlaylistTransaction((data) => {
    delete data[folderName];
    return true;
  });
}

async function renameFolder(_nick, oldName, newName) {
  const nn = (newName || '').trim();
  if (!nn || nn === oldName) return false;
  return sharedPlaylistTransaction((data) => {
    if (!Object.prototype.hasOwnProperty.call(data, oldName)) return false;
    if (Object.prototype.hasOwnProperty.call(data, nn)) {
      toast('이미 있는 폴더 이름이에요');
      return false;
    }
    data[nn] = data[oldName];
    delete data[oldName];
    return true;
  });
}

async function addSong(_nick, folderName, song) {
  const entry = normalizeQueueSong(song);
  if (!entry) return false;
  let added = false;
  await sharedPlaylistTransaction((data) => {
    if (!data[folderName]) data[folderName] = [];
    if (data[folderName].some(s => s.id === entry.id)) {
      toast('이미 폴더에 있는 곡이에요');
      return false;
    }
    data[folderName].push({
      id: entry.id,
      title: entry.title || '',
      channel: entry.channel || '',
      thumbnail: entry.thumbnail || ''
    });
    added = true;
    return true;
  });
  return added;
}

async function removeSong(_nick, folderName, songId) {
  return sharedPlaylistTransaction((data) => {
    if (!data[folderName]) return true;
    data[folderName] = data[folderName].filter(s => s.id !== songId);
    return true;
  });
}

async function moveSong(_nick, folderName, fromIdx, toIdx) {
  return sharedPlaylistTransaction((data) => {
    const arr = data[folderName];
    if (!arr || fromIdx < 0 || fromIdx >= arr.length || toIdx < 0 || toIdx >= arr.length) return false;
    const [item] = arr.splice(fromIdx, 1);
    arr.splice(toIdx, 0, item);
    return true;
  });
}

async function transferSongBetweenFolders(fromFolder, storageIdx, toFolder, asCopy) {
  return sharedPlaylistTransaction((data) => {
    const from = data[fromFolder];
    if (!from || storageIdx < 0 || storageIdx >= from.length) return false;
    const item = from[storageIdx];
    if (!item) return false;
    if (!data[toFolder]) data[toFolder] = [];
    if (data[toFolder].some(s => s.id === item.id)) {
      toast('대상 폴더에 같은 영상이 있어요');
      return false;
    }
    data[toFolder].push({ ...item });
    if (!asCopy) from.splice(storageIdx, 1);
    return true;
  });
}

function buildDisplaySongRows(songs, sortMode) {
  const indexed = (songs || []).map((s, storageIndex) => ({ s, storageIndex }));
  if (sortMode === 'titleAsc') {
    indexed.sort((a, b) => String(a.s.title || '').localeCompare(String(b.s.title || ''), 'ko', { sensitivity: 'base' }));
  } else if (sortMode === 'titleDesc') {
    indexed.sort((a, b) => String(b.s.title || '').localeCompare(String(a.s.title || ''), 'ko', { sensitivity: 'base' }));
  }
  return indexed;
}

function songToPlayShape(s) {
  const n = normalizeQueueSong(s);
  if (!n) return null;
  return { id: n.id, title: n.title, channel: n.channel, thumb: n.thumbnail };
}

async function fbSetRoomQueue(items, index) {
  if (!state.roomId || !window._fbReady || !isMeDJ()) return;
  const { db, ref, update } = window._fb;
  await update(ref(db, `rooms/${state.roomId}`), {
    songQueue: items,
    queueIndex: index
  });
}

async function fbClearRoomQueue() {
  if (!state.roomId || !window._fbReady || !isMeDJ()) return;
  const { db, ref, update } = window._fb;
  await update(ref(db, `rooms/${state.roomId}`), { songQueue: [], queueIndex: 0 });
}

async function djPlayNowWithQueue(songFlat, closeModal) {
  if (!state.me || !isMeDJ()) return;
  const song = songToPlayShape(songFlat);
  if (!song) return;
  const q = [normalizeQueueSong(songFlat)];
  await fbSetRoomQueue(q, 0);
  const seatIndex = state.me.seatIndex;
  if (state.seats[seatIndex]) state.seats[seatIndex].song = song;
  fbUpdateSong(seatIndex, song);
  renderSeats();
  _doPlay(song, state.me.name);
  if (closeModal) document.getElementById('search-modal').classList.remove('open');
}

async function playFolderAll(folderName) {
  if (!isMeDJ()) return;
  const pl = loadPlaylists(myName);
  const list = pl[folderName];
  if (!list || !list.length) { toast('폴더가 비었어요'); return; }
  const normalized = list.map(s => normalizeQueueSong(s)).filter(Boolean);
  await fbSetRoomQueue(normalized, 0);
  const first = songToPlayShape(normalized[0]);
  if (state.me) {
    const seatIndex = state.me.seatIndex;
    if (state.seats[seatIndex]) state.seats[seatIndex].song = first;
    fbUpdateSong(seatIndex, first);
    renderSeats();
    _doPlay(first, state.me.name);
  }
}

async function addSongToRoomQueue(songFlat) {
  if (!isMeDJ() || !state.roomId || !window._fbReady) return false;
  const song = normalizeQueueSong(songFlat);
  if (!song) return false;
  const { db, ref, get, update } = window._fb;
  const roomRef = ref(db, `rooms/${state.roomId}`);
  const snap = await get(roomRef);
  const data = snap.val() || {};
  const q = Array.isArray(data.songQueue) ? [...data.songQueue] : [];
  q.push(song);
  const idx = typeof data.queueIndex === 'number' ? data.queueIndex : 0;
  await update(roomRef, { songQueue: q, queueIndex: idx });
  return true;
}

async function advancePlayQueueIfAny() {
  if (!isMeDJ() || !state.roomId || !window._fbReady) return;
  const { db, ref, get, update } = window._fb;
  const roomRef = ref(db, `rooms/${state.roomId}`);
  const snap = await get(roomRef);
  const data = snap.val() || {};
  const q = Array.isArray(data.songQueue) ? data.songQueue : [];
  if (!q.length) return;
  const idx = typeof data.queueIndex === 'number' ? data.queueIndex : 0;
  const nextIdx = (idx + 1) % q.length;
  const song = q[nextIdx];
  const djName = state.dj && state.dj.currentDJ;
  if (!song || !song.id || !djName) return;
  await update(roomRef, { queueIndex: nextIdx });
  _doPlay(songToPlayShape(song), djName);
}

async function skipToNextSong() {
  if (!isMeDJ() || !state.roomId || !window._fbReady) return;
  const { db, ref, get, update } = window._fb;
  const roomRef = ref(db, `rooms/${state.roomId}`);
  const snap = await get(roomRef);
  const data = snap.val() || {};
  const q = Array.isArray(data.songQueue) ? data.songQueue : [];
  const idx = typeof data.queueIndex === 'number' ? data.queueIndex : 0;
  if (!q.length) {
    toast('재생 큐가 비어있어요');
    return;
  }
  const nextIdx = (idx + 1) % q.length;
  const song = q[nextIdx];
  const djName = state.dj && state.dj.currentDJ;
  if (!song || !song.id || !djName) {
    toast('다음 곡 정보를 찾을 수 없어요');
    return;
  }
  await update(roomRef, { queueIndex: nextIdx });
  _doPlay(songToPlayShape(song), djName);
}

async function shuffleRoomQueue() {
  if (!isMeDJ() || !state.roomId || !window._fbReady) return;
  const { db, ref, get, update } = window._fb;
  const roomRef = ref(db, `rooms/${state.roomId}`);
  const snap = await get(roomRef);
  const data = snap.val() || {};
  let q = [...(Array.isArray(data.songQueue) ? data.songQueue : [])];
  if (q.length < 2) return;
  const curId = state.remoteCurrentSong && state.remoteCurrentSong.id;
  for (let i = q.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [q[i], q[j]] = [q[j], q[i]];
  }
  let newIdx = q.findIndex(s => s && s.id === curId);
  if (newIdx < 0) newIdx = 0;
  await update(roomRef, { songQueue: q, queueIndex: newIdx });
  toast('재생 큐를 섞었어요 🔀');
}

let _searchDebounceTimer = null;
const SEARCH_DEBOUNCE_MS = 700;
const SEARCH_MIN_QUERY_LEN = 2;
const SEARCH_CACHE_TTL_MS = 10 * 60 * 1000;
const SEARCH_CACHE_KEY = 'musicroom_yt_search_cache_v1';
const SEARCH_QUOTA_COOLDOWN_MS = 5 * 60 * 1000;
let _searchRequestSeq = 0;
let _searchAbortController = null;
let _searchQuotaBlockedUntil = 0;
const _searchMemoryCache = new Map();
/** ISO 8601 duration (e.g. PT4M13S) → m:ss or h:mm:ss */
function formatYoutubeDuration(iso) {
  if (!iso || typeof iso !== 'string') return '';
  const m = iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
  if (!m) return '';
  const h = parseInt(m[1] || '0', 10) || 0;
  const min = parseInt(m[2] || '0', 10) || 0;
  const s = parseInt(m[3] || '0', 10) || 0;
  const total = h * 3600 + min * 60 + s;
  const hh = Math.floor(total / 3600);
  const mm = Math.floor((total % 3600) / 60);
  const ss = total % 60;
  if (hh > 0) return `${hh}:${String(mm).padStart(2, '0')}:${String(ss).padStart(2, '0')}`;
  return `${mm}:${String(ss).padStart(2, '0')}`;
}
function normalizeSearchQuery(q) {
  return String(q || '').trim().replace(/\s+/g, ' ').toLowerCase();
}
function loadSearchCacheFromStorage() {
  try {
    const raw = localStorage.getItem(SEARCH_CACHE_KEY);
    if (!raw) return;
    const parsed = JSON.parse(raw);
    if (!parsed || typeof parsed !== 'object') return;
    const now = Date.now();
    Object.entries(parsed).forEach(([key, value]) => {
      if (!value || typeof value !== 'object') return;
      if (typeof value.expiresAt !== 'number' || value.expiresAt < now) return;
      if (!Array.isArray(value.items)) return;
      _searchMemoryCache.set(key, value);
    });
  } catch (_) {}
}
function persistSearchCacheToStorage() {
  try {
    const now = Date.now();
    const payload = {};
    _searchMemoryCache.forEach((value, key) => {
      if (!value || typeof value !== 'object') return;
      if (typeof value.expiresAt !== 'number' || value.expiresAt < now) return;
      payload[key] = value;
    });
    localStorage.setItem(SEARCH_CACHE_KEY, JSON.stringify(payload));
  } catch (_) {}
}
function getCachedSearchResult(normalizedQuery) {
  const cached = _searchMemoryCache.get(normalizedQuery);
  if (!cached) return null;
  if (cached.expiresAt < Date.now()) {
    _searchMemoryCache.delete(normalizedQuery);
    persistSearchCacheToStorage();
    return null;
  }
  return cached.items;
}
function setCachedSearchResult(normalizedQuery, items) {
  _searchMemoryCache.set(normalizedQuery, {
    expiresAt: Date.now() + SEARCH_CACHE_TTL_MS,
    items: Array.isArray(items) ? items : []
  });
  persistSearchCacheToStorage();
}
function showSearchHint(resultsEl, msg) {
  resultsEl.innerHTML = `<div class="search-empty">${escHtml(msg)}</div>`;
}
function isSearchQuotaBlocked() {
  return _searchQuotaBlockedUntil > Date.now();
}
function getSearchQuotaRemainMs() {
  return Math.max(0, _searchQuotaBlockedUntil - Date.now());
}
function formatRemainClock(ms) {
  const totalSec = Math.ceil((ms || 0) / 1000);
  const mm = Math.floor(totalSec / 60);
  const ss = totalSec % 60;
  return `${mm}:${String(ss).padStart(2, '0')}`;
}
function activateSearchQuotaCooldown() {
  _searchQuotaBlockedUntil = Date.now() + SEARCH_QUOTA_COOLDOWN_MS;
}
function getLatestCachedItems() {
  const now = Date.now();
  let latest = null;
  _searchMemoryCache.forEach((value) => {
    if (!value || typeof value !== 'object') return;
    if (typeof value.expiresAt !== 'number' || value.expiresAt < now) return;
    if (!Array.isArray(value.items) || !value.items.length) return;
    if (!latest || value.expiresAt > latest.expiresAt) latest = value;
  });
  return latest ? latest.items : null;
}
function showQuotaBlockedFallback(resultsEl, preferredItems) {
  const remain = formatRemainClock(getSearchQuotaRemainMs());
  const fallbackItems = Array.isArray(preferredItems) && preferredItems.length
    ? preferredItems
    : getLatestCachedItems();
  if (fallbackItems && fallbackItems.length) {
    renderSearchResults(resultsEl, fallbackItems);
    toast(`YouTube 검색 할당량 소진으로 ${remain} 동안 캐시 결과를 보여줘요.`);
    return true;
  }
  showSearchHint(resultsEl, `YouTube 검색 할당량이 소진되어 ${remain} 동안 검색이 제한됩니다.`);
  toast(`YouTube 검색 할당량 소진. ${remain} 후 다시 시도해주세요.`);
  return false;
}
function isQuotaExceededError(errObj) {
  if (!errObj || typeof errObj !== 'object') return false;
  if (errObj.code === 403) return true;
  if (errObj.status === 'RESOURCE_EXHAUSTED') return true;
  const reason = String(errObj.errors?.[0]?.reason || '').toLowerCase();
  const msg = String(errObj.message || '').toLowerCase();
  return reason.includes('quotaexceeded') || msg.includes('quota');
}
function renderSearchResults(resultsEl, items) {
  resultsEl.innerHTML = '';
  const dj = isMeDJ();
  items.forEach(item => {
    const vid = item.id;
    const title = item.title || '';
    const thumb = item.thumb || '';
    const channel = item.channel || '';
    const dur = item.duration || '';
    const durHtml = dur ? `<span class="result-duration">${escHtml(dur)}</span>` : '';
    const div = document.createElement('div');

    div.innerHTML = `

      </div>
      <div style="flex:1;min-width:0;">
        <div class="result-title">${escHtml(title)}</div>
        <div class="result-channel">${escHtml(channel)}</div>
      </div>
      <div class="result-actions">
        <button type="button" class="search-play-btn">▶ 재생</button>
        <button type="button" class="search-queue-btn">＋ 큐</button>
        <button type="button" class="search-save-btn">＋ 저장</button>
      </div>`;
    const playB = div.querySelector('.search-play-btn');
    const queueB = div.querySelector('.search-queue-btn');

    playB.disabled = !dj;

    playB.addEventListener('click', e => {
      e.stopPropagation();
      if (!dj) return;
      djPlayNowWithQueue(songPayload, true);
    });
    queueB.addEventListener('click', async e => {
      e.stopPropagation();
      if (!dj) return;
      const ok = await addSongToRoomQueue(songPayload);
      if (!ok) return;
      queueB.disabled = true;

      queueB.classList.add('added');
    });
    saveB.addEventListener('click', e => {

loadSearchCacheFromStorage();

  document.getElementById('search-modal').classList.add('open');
}
document.getElementById('modal-close').addEventListener('click',()=>document.getElementById('search-modal').classList.remove('open'));
document.getElementById('search-btn').addEventListener('click', () => { clearTimeout(_searchDebounceTimer); doSearch(); });
document.getElementById('search-input').addEventListener('keydown',e=>{
  if (e.key === 'Enter') {
    clearTimeout(_searchDebounceTimer);
    doSearch();

document.getElementById('search-input').addEventListener('input', () => {
  clearTimeout(_searchDebounceTimer);
  const qq = document.getElementById('search-input').value.trim();
  const resultsEl = document.getElementById('search-results');
  if (!qq) {

    return;
  }

    showSearchHint(resultsEl, `검색어 ${SEARCH_MIN_QUERY_LEN}자 이상 입력해주세요.`);
  }

async function doSearch() {
  const q = document.getElementById('search-input').value.trim();
  if (!q) return;
  const resultsEl = document.getElementById('search-results');
  if (q.length < SEARCH_MIN_QUERY_LEN) {
    showSearchHint(resultsEl, `검색어 ${SEARCH_MIN_QUERY_LEN}자 이상 입력해주세요.`);
    return;
  }
  const normalizedQuery = normalizeSearchQuery(q);
  const cachedItems = getCachedSearchResult(normalizedQuery);
  if (isSearchQuotaBlocked()) {
    showQuotaBlockedFallback(resultsEl, cachedItems);
    return;
  }
  if (cachedItems && cachedItems.length) {
    renderSearchResults(resultsEl, cachedItems);
    return;
  }
  if (cachedItems && !cachedItems.length) {
    showSearchHint(resultsEl, '검색 결과가 없어요 🎵');
    return;
  }
  const requestSeq = ++_searchRequestSeq;
  if (_searchAbortController) {
    _searchAbortController.abort();
  }
  const abortController = new AbortController();
  _searchAbortController = abortController;
  showSearchHint(resultsEl, '🔍 검색 중...');
  try {
    const url=`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(q)}&type=video&maxResults=8&key=${ytApiKey}`;
    const data = await (await fetch(url, { signal: abortController.signal })).json();
    if (requestSeq !== _searchRequestSeq) return;
    if (data.error){
      if (isQuotaExceededError(data.error)) {
        activateSearchQuotaCooldown();
        showQuotaBlockedFallback(resultsEl, cachedItems);
        return;
      }
      showSearchHint(resultsEl, `❌ 오류: ${data.error.message}`);
      return;
    }
    if (!data.items?.length){
      setCachedSearchResult(normalizedQuery, []);
      showSearchHint(resultsEl, '검색 결과가 없어요 🎵');
      return;
    }
    const ids = data.items.map(it => it.id?.videoId).filter(Boolean).join(',');
    const durationById = {};
    if (ids) {
      const vUrl = `https://www.googleapis.com/youtube/v3/videos?part=contentDetails&id=${encodeURIComponent(ids)}&key=${ytApiKey}`;
      const vJson = await (await fetch(vUrl, { signal: abortController.signal })).json();
      if (requestSeq !== _searchRequestSeq) return;
      if (vJson.error && isQuotaExceededError(vJson.error)) {
        activateSearchQuotaCooldown();
      }
      if (!vJson.error && vJson.items?.length) {
        vJson.items.forEach(v => {
          const d = v.contentDetails?.duration;
          if (v.id && d) durationById[v.id] = formatYoutubeDuration(d);
        });
      }
    }
    const normalizedItems = data.items.map(item => {
      const vid = item.id.videoId;
      const title = item.snippet.title;
      const thumb = item.snippet.thumbnails.medium?.url || item.snippet.thumbnails.default?.url || '';
      const channel = item.snippet.channelTitle;
      return { id: vid, title, thumb, channel, duration: durationById[vid] || '' };
    }).filter(it => it.id);
    setCachedSearchResult(normalizedQuery, normalizedItems);
    renderSearchResults(resultsEl, normalizedItems);
  } catch(e){
    if (e && e.name === 'AbortError') return;
    if (requestSeq !== _searchRequestSeq) return;
    showSearchHint(resultsEl, '❌ 네트워크 오류');
  } finally {
    if (_searchAbortController === abortController) {
      _searchAbortController = null;
    }
  }
}

    if (!cs || !cs.id) { toast('지금 재생 중인 곡이 없어요'); return; }
    // 일반 사용자는 현재 곡을 내 플레이어에서 재동기화/재생만 허용
    applyCurrentSongFromFirebase(cs);
    toast('현재 곡 재생 중');
    return;
  }
  if (state.playing) ytPlayer.pauseVideo();
  else if (state.currentSong) ytPlayer.playVideo();
  else playCurrentDJSong();
});
const djSearchBtn = document.getElementById('dj-search-btn');
const djPlBtn = document.getElementById('dj-playlist-btn');
const djPpBtn = document.getElementById('dj-play-pause-btn');
const djNextBtn = document.getElementById('dj-next-btn');
const djLeaveBtn = document.getElementById('dj-leave-btn');
if (djSearchBtn) djSearchBtn.addEventListener('click', () => openSearchModal());
if (djPlBtn) djPlBtn.addEventListener('click', () => { switchTab('playlist'); document.querySelector('.right-panel')?.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); });
if (djPpBtn) djPpBtn.addEventListener('click', () => document.getElementById('play-pause-btn').click());
if (djNextBtn) djNextBtn.addEventListener('click', () => document.getElementById('next-btn')?.click());
if (djLeaveBtn) djLeaveBtn.addEventListener('click', () => leaveDJBooth());
document.getElementById('next-btn').addEventListener('click', async () => {
  if (!isMeDJ()) { toast('DJ만 조작할 수 있어요'); return; }
  await skipToNextSong();
});
document.getElementById('stop-btn').addEventListener('click',async ()=>{
  if (!ytPlayer||!ytReady) return;
  if (!isMeDJ()) { toast('DJ만 조작할 수 있어요'); return; }
  if (window._fbReady) {
    const {db, ref, set, update} = window._fb;
    await set(ref(db, `rooms/${state.roomId}/currentSong`), null);
    await update(ref(db, `rooms/${state.roomId}`), { songQueue: [], queueIndex: 0 });
  }
  resetLocalPlaybackQuiet();
  fbSendSystemChat(state.roomId,'재생이 멈췄습니다.');
});
document.getElementById('mute-btn').addEventListener('click',()=>{
  if (!ytPlayer||!ytReady) return;
  if (isMuted){ytPlayer.unMute();ytPlayer.setVolume(100);isMuted=false;document.getElementById('mute-btn').textContent='🔊';document.getElementById('mute-btn').style.color='';localStorage.setItem('musicroom_unmuted','true');document.getElementById('unmute-bar').style.display='none';}
  else{ytPlayer.mute();isMuted=true;document.getElementById('mute-btn').textContent='🔇';document.getElementById('mute-btn').style.color='var(--accent)';}
});

// ── CHAT UI
// 채팅 입력창 자동 높이
const chatInput = document.getElementById('chat-input');
const chatPopupNotifyEl = document.getElementById('chat-popup-notify');
if (chatPopupNotifyEl) {
  chatPopupNotifyEl.checked = isChatPopupNotifyOn();
  chatPopupNotifyEl.addEventListener('change', () => {
    localStorage.setItem(LS_CHAT_POPUP_NOTIFY, chatPopupNotifyEl.checked ? '1' : '0');
    toast(chatPopupNotifyEl.checked ? '팝업 알림 ON 🔔' : '팝업 알림 OFF');
  });
}

chatInput.addEventListener('input', () => {
  chatInput.style.height = 'auto';
  chatInput.style.height = Math.min(chatInput.scrollHeight, 80) + 'px';
});

document.getElementById('send-btn').addEventListener('click', () => {
  sendChat();
  // 키보드 유지: 포커스 다시 설정
  chatInput.focus();
});

chatInput.addEventListener('keydown', e => {
  // PC: 엔터 전송 / 모바일: 엔터 줄바꿈
  const isMobile = /Android|iPhone|iPad/i.test(navigator.userAgent);
  if (e.key === 'Enter' && !e.shiftKey && !isMobile) {
    e.preventDefault();
    sendChat();
  }
  // 모바일은 기본 엔터(줄바꿈) 동작 허용
});

function sendChat() {
  const input = document.getElementById('chat-input');
  const msg = input.value.trim();
  if (!msg || !state.me) return;
  if (isChatPopupNotifyOn() && typeof Notification !== 'undefined' && Notification.permission === 'default') {
    Notification.requestPermission().catch(() => {});
  }
  fbSendChat(msg);
  input.value = '';
  input.style.height = 'auto';
}

document.getElementById('chat-download-btn')?.addEventListener('click', () => {
  if (!state.roomId) return;
  const key = `chatlog_${state.roomId}`;
  const logs = JSON.parse(localStorage.getItem(key) || '[]');
  if (!logs.length) {
    toast('저장된 대화가 없어요');
    return;
  }
  const lines = logs.map(l => {
    const t = l.time ? new Date(l.time).toLocaleString('ko-KR') : '';
    if (l.type === 'system') return `[${t}] * ${l.msg}`;
    return `[${t}] ${l.nick}: ${l.msg}`;
  });
  const blob = new Blob([lines.join('\n')], { type: 'text/plain;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `musicroom-chat-${state.roomId}.txt`;
  a.click();
  URL.revokeObjectURL(a.href);
  toast('대화 기록을 내려받았어요 📥');
});

// ── TABS
function switchTab(active) {
  state.rightPanelTab = active;
  if (active === 'chat') stopChatTabAttention();
  const tabs = ['chat','playlist','history'];
  tabs.forEach(t => {
    const btn = document.getElementById(`tab-${t}`);
    const panel = document.getElementById(`panel-${t}`);
    if (!btn || !panel) return;
    const isActive = t === active;
    btn.classList.toggle('active', isActive);
    if (isActive) {
      const flexTabs = t === 'chat' || t === 'playlist';
      panel.style.setProperty('display', flexTabs ? 'flex' : 'block', 'important');
      panel.style.setProperty('flex', '1', 'important');
    } else {
      panel.style.setProperty('display', 'none', 'important');
    }
  });
  if (active === 'history') renderHistory();
  if (active === 'playlist') renderPlaylistPanel();
}
document.getElementById('tab-chat').addEventListener('click', () => switchTab('chat'));
document.getElementById('tab-playlist').addEventListener('click', () => switchTab('playlist'));
document.getElementById('tab-history').addEventListener('click', () => switchTab('history'));

document.getElementById('pl-new-folder-btn')?.addEventListener('click', async () => {
  const name = (prompt('새 폴더 이름') || '').trim();
  if (name && await createFolder(myName, name)) {
    renderPlaylistPanel();
    toast('폴더가 만들어졌어요 📂');
  }
});

document.getElementById('folder-picker-close')?.addEventListener('click', () => closeFolderPicker());
document.getElementById('folder-picker')?.addEventListener('click', e => {
  if (e.target.id === 'folder-picker') closeFolderPicker();
});
document.querySelector('.folder-picker-box')?.addEventListener('click', e => e.stopPropagation());
document.getElementById('folder-picker-new-btn')?.addEventListener('click', async () => {
  const inp = document.getElementById('folder-picker-new-input');
  const name = (inp && inp.value || '').trim();
  if (!name) return;
  if (await createFolder(myName, name)) {
    inp.value = '';
    renderFolderPickerList();
    toast('폴더가 만들어졌어요 📂');
  }
});

document.querySelectorAll('.pl-sort-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const m = btn.getAttribute('data-sort');
    if (!m) return;
    state.playlistSortMode = m;
    document.querySelectorAll('.pl-sort-btn').forEach(b => b.classList.toggle('active', b === btn));
    renderPlaylistPanel();
  });
});

document.getElementById('queue-toggle-btn')?.addEventListener('click', () => {
  _queuePanelCollapsed = !_queuePanelCollapsed;
  renderQueuePanel();
});
document.getElementById('queue-shuffle-btn')?.addEventListener('click', () => shuffleRoomQueue());
document.getElementById('queue-clear-btn')?.addEventListener('click', async () => {
  if (!isMeDJ()) return;
  await fbClearRoomQueue();
  toast('재생 큐를 비웠어요');
});

document.getElementById('save-current-btn')?.addEventListener('click', () => {
  const cs = state.remoteCurrentSong;
  if (!cs || !cs.id) return;
  const thumb = cs.thumbnail || cs.thumb || '';
  openFolderPicker({
    id: cs.id,
    title: cs.title,
    channel: cs.channel || '',
    thumb,
    thumbnail: thumb,
  }, '재생 중인 곡 저장', { fromNowPlaying: true });
});

// ── REACTIONS
document.querySelectorAll('.reaction-btn').forEach(btn=>{
  btn.addEventListener('click',()=>launchEmoji(btn.dataset.emoji));
});

// ── LEAVE
document.getElementById('leave-btn').addEventListener('click',async()=>{
  if(state.roomId&&state.me&&window._fbReady){
    const{db,ref,set,get,update}=window._fb;
    if(isMeDJ()){
      const djSnap = await get(ref(db, `rooms/${state.roomId}/dj`));
      const d = djSnap.val() || { djQueue: [] };
      let nextDJ = (d.djQueue && d.djQueue[0]) || null;
      let newQueue = [...(d.djQueue || [])];
      if (nextDJ) {
        newQueue = newQueue.slice(1);
      } else {
        const others = state.seats.filter(s => s && s.name !== state.me.name).map(s => s.name);
        nextDJ = others[0] || null;
      }
      await update(ref(db, `rooms/${state.roomId}/dj`), { currentDJ: nextDJ, djQueue: newQueue });
    }
    await set(ref(db,`rooms/${state.roomId}/seats/seat_${state.me.seatIndex}`),null);
    fbSendSystemChat(state.roomId,`${state.me.name}님이 방을 나갔습니다 👋`);
  }
  localStorage.removeItem('musicroom_session');
  location.href='index.html';
});

// ── PAGE VISIBILITY (자리비움)
document.addEventListener('visibilitychange',()=>{
  if(!state.me||!state.roomId||!window._fbReady)return;
  const{db,ref,update}=window._fb;
  update(ref(db,`rooms/${state.roomId}/seats/seat_${state.me.seatIndex}`),{away:document.hidden});
});

// ── SERVICE WORKER 등록
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js', { scope: './' })
    .then(reg => console.log('SW registered:', reg.scope))
    .catch(err => console.warn('SW failed:', err));
}

// SW keep-alive ping — 15초 간격(백그라운드 오디오 컨텍스트 유지)
setInterval(() => {
  if (!navigator.serviceWorker.controller) return;
  const mc = new MessageChannel();
  navigator.serviceWorker.controller.postMessage('keepalive', [mc.port2]);
}, 15000);

// ── START
// Firebase 준비되면 입장
window.addEventListener('firebase-ready', ()=>{enterRoom();});
if (window._fbReady) enterRoom();
</script>
