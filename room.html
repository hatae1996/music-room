<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>🎵 뮤직룸</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nanum+Gothic:wght@400;700;800&display=swap');

  :root {
    --bg: #0d0d1a; --surface: #1a1a2e; --surface2: #16213e;
    --accent: #e94560; --accent2: #f5a623; --accent3: #0f3460;
    --green: #00ff88; --purple: #a855f7;
    --text: #e8e8f0; --text-dim: #8888aa;
    --pixel: 'Press Start 2P', monospace;
    --body: 'Nanum Gothic', sans-serif;
    --border: #2a2a4a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--body);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
    background-image:
      radial-gradient(ellipse at 20% 50%, rgba(168,85,247,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 20%, rgba(233,69,96,0.08) 0%, transparent 50%);
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px);
    pointer-events: none;
    z-index: 9999;
  }

  /* TOP BAR */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    background: var(--surface);
    border-bottom: 2px solid var(--border);
    gap: 8px;
    flex-wrap: wrap;
    flex-shrink: 0;
  }
  .room-logo { font-family: var(--pixel); font-size: 10px; color: var(--accent); }
  .users-bar {
    display: flex; align-items: center; gap: 8px;
    font-family: var(--pixel); font-size: 7px; color: var(--text-dim);
    overflow-x: auto; white-space: nowrap;
  }
  .user-dot::before {
    content: ''; width: 6px; height: 6px; background: var(--green);
    display: inline-block; margin-right: 4px;
    box-shadow: 0 0 6px var(--green);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.4} }
  .topbar-right { display: flex; gap: 8px; align-items: center; }
  .room-id-display {
    font-family: var(--pixel); font-size: 8px; color: var(--text-dim);
    background: var(--bg); border: 1px solid var(--border);
    padding: 5px 10px; cursor: pointer;
  }
  .room-id-display:hover { border-color: var(--accent2); color: var(--accent2); }
  .next-dj-btn {
    background: transparent; border: 2px solid var(--accent); color: var(--accent);
    padding: 6px 12px; font-family: var(--pixel); font-size: 8px;
    cursor: pointer; white-space: nowrap;
  }
  #leave-btn {
    background: var(--surface2); border: 1px solid var(--border); color: var(--text-dim);
    padding: 6px 10px; font-family: var(--pixel); font-size: 7px; cursor: pointer;
  }
  /* DJ 거부권 토글 */
  #dj-refuse-btn {
    background: transparent; border: 1px solid var(--border); color: var(--text-dim);
    padding: 6px 10px; font-family: var(--pixel); font-size: 7px; cursor: pointer; white-space: nowrap;
    transition: all 0.2s;
  }
  #dj-refuse-btn.active {
    border-color: #ff8c00; color: #ff8c00; background: rgba(255,140,0,0.1);
  }
  /* DJ 신청 모달 */
  #dj-request-modal {
    position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 200;
    display: none; align-items: center; justify-content: center; backdrop-filter: blur(4px);
  }
  #dj-request-modal.open { display: flex; }
  .dj-request-box {
    background: var(--surface); border: 2px solid var(--accent); width: 320px;
    box-shadow: 0 0 40px rgba(233,69,96,0.3), 6px 6px 0 rgba(0,0,0,0.5);
    position: relative;
  }
  .dj-request-box::before {
    content:''; position:absolute; top:-1px; left:-1px; right:-1px; height:3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
  }
  .dj-request-header {
    padding: 14px 18px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .dj-request-title { font-family: var(--pixel); font-size: 9px; color: var(--text); }
  .dj-request-close {
    background: none; border: 1px solid var(--border); color: var(--text-dim);
    width: 28px; height: 28px; cursor: pointer; font-size: 14px;
  }
  .dj-request-list { padding: 14px 18px; display: flex; flex-direction: column; gap: 8px; }
  .dj-request-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; border: 1px solid var(--border); cursor: pointer;
    transition: all 0.15s; background: var(--bg);
  }
  .dj-request-item:hover:not(.refused) { border-color: var(--accent); background: rgba(233,69,96,0.05); }
  .dj-request-item.refused { opacity: 0.4; cursor: not-allowed; border-color: #ff4444; }
  .dj-request-name { font-family: var(--pixel); font-size: 8px; color: var(--text); flex: 1; }
  .dj-request-song { font-size: 11px; color: var(--accent2); margin-top: 2px; }
  .dj-request-badge {
    font-family: var(--pixel); font-size: 6px; padding: 3px 6px;
    border: 1px solid; letter-spacing: 1px;
  }
  .dj-request-badge.refused { color: #ff4444; border-color: #ff4444; }
  .dj-request-badge.no-song { color: var(--text-dim); border-color: var(--border); }

  /* MAIN LAYOUT */
  .room-layout {
    display: grid;
    grid-template-columns: 1fr 320px;
    flex: 1;
    min-height: 0;
    height: calc(100dvh - 57px);
  }

  /* STAGE */
  .stage-area {
    display: flex; flex-direction: column;
    overflow: hidden; position: relative; min-height: 0;
  }

  .dj-indicator {
    position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
    font-family: var(--pixel); font-size: 7px; color: var(--accent);
    background: var(--surface); border: 1px solid var(--accent);
    padding: 4px 10px; z-index: 5;
    box-shadow: 0 0 12px rgba(233,69,96,0.3);
    animation: glow 2s ease-in-out infinite;
  }
  @keyframes glow { 0%,100%{box-shadow:0 0 12px rgba(233,69,96,0.3)}50%{box-shadow:0 0 20px rgba(233,69,96,0.6)} }

  /* SEATS */
  .seats-container {
    flex: 1; display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    position: relative; overflow: hidden; min-height: 0;
  }

  .seat {
    border: 1px solid var(--border);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 16px 12px; gap: 8px; position: relative;
    transition: background 0.3s;
  }
  .seat:nth-child(1){border-right:1px solid var(--border);border-bottom:1px solid var(--border);}
  .seat:nth-child(2){border-left:1px solid var(--border);border-bottom:1px solid var(--border);}
  .seat:nth-child(3){border-right:1px solid var(--border);border-top:1px solid var(--border);}
  .seat:nth-child(4){border-left:1px solid var(--border);border-top:1px solid var(--border);}

  .seat.is-dj { position: relative; overflow: hidden; }
  .seat.is-dj::before {
    content: ''; position: absolute; top: 0; left: 50%;
    transform: translateX(-50%); width: 160px; height: 100%;
    background: linear-gradient(to bottom, rgba(245,200,80,0.22) 0%, rgba(245,200,80,0.06) 50%, transparent 100%);
    clip-path: polygon(40% 0%, 60% 0%, 85% 100%, 15% 100%);
    pointer-events: none; z-index: 0;
    animation: beamPulse 2.5s ease-in-out infinite;
  }
  @keyframes beamPulse { 0%,100%{opacity:0.8}50%{opacity:1} }
  .seat.is-dj canvas.sprite {
    filter: drop-shadow(0 0 6px rgba(245,166,35,0.8)) drop-shadow(0 0 16px rgba(245,166,35,0.4));
  }
  .seat.is-me { background: rgba(0,255,136,0.04); }
  .seat.empty { opacity: 0.4; }
  .seat.is-away { opacity: 0.5; }
  .seat.is-away canvas.sprite { filter: grayscale(80%); }
  .away-badge {
    position: absolute; top: 6px; right: 6px;
    font-family: var(--pixel); font-size: 6px;
    color: var(--text-dim); background: var(--surface2);
    border: 1px solid var(--border);
    padding: 2px 5px; letter-spacing: 1px;
  }

  .seat-player-info { display:flex;flex-direction:column;align-items:center;gap:6px;position:relative;z-index:1; }
  .dj-crown { font-size:16px; display:none; animation: bob 1s ease-in-out infinite; }
  .is-dj .dj-crown { display:block; }
  @keyframes bob { 0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)} }
  .seat-name { font-family:var(--pixel);font-size:8px;color:var(--text);text-align:center; }
  .seat.is-me .seat-name { color: var(--green); }
  .seat.is-dj .seat-name { color: var(--accent); }
  .seat-song { font-size:11px;color:var(--text-dim);text-align:center;max-width:130px;line-height:1.4;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical; }
  .seat-song.has-song { color: var(--accent2); }
  .pick-song-btn {
    background:var(--accent3);border:1px solid var(--purple);color:var(--purple);
    padding:5px 10px;font-family:var(--pixel);font-size:7px;cursor:pointer;
  }
  .kick-btn {
    background:transparent;border:1px solid #ff4444;color:#ff4444;
    padding:3px 8px;font-family:var(--pixel);font-size:6px;cursor:pointer;
    letter-spacing:1px;margin-top:4px;display:block;width:fit-content;
  }
  .kick-btn:hover { background:rgba(255,68,68,0.2); }

  /* CENTER KEYWORD */
  .center-keyword {
    position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    z-index:10;width:180px;text-align:center;pointer-events:none;
  }
  .keyword-badge {
    background:var(--surface);border:3px solid var(--accent2);padding:12px 16px;
    box-shadow:0 0 30px rgba(245,166,35,0.3),6px 6px 0 rgba(0,0,0,0.5);
  }
  .keyword-label { font-family:var(--pixel);font-size:6px;color:var(--accent2);display:block;margin-bottom:6px; }
  .keyword-text { font-family:var(--pixel);font-size:11px;color:white;line-height:1.6;word-break:keep-all; }

  /* NEXT THEME */
  .next-theme-card {
    position:absolute;bottom:16px;right:16px;z-index:10;text-align:right;pointer-events:none;
  }
  .next-theme-label { font-family:var(--pixel);font-size:6px;color:var(--text-dim);display:block;margin-bottom:4px; }
  .next-theme-badge {
    background:var(--surface);border:1px solid var(--purple);padding:6px 10px;
    display:inline-block;box-shadow:0 0 10px rgba(168,85,247,0.2),3px 3px 0 rgba(0,0,0,0.4);
  }
  .next-theme-text { font-family:var(--pixel);font-size:8px;color:var(--purple);display:block; }
  .next-theme-sub { font-family:var(--pixel);font-size:5px;color:var(--text-dim);display:block;margin-top:2px; }

  /* PLAYER BAR */
  .player-bar {
    background:var(--surface2);border-top:2px solid var(--border);
    padding:10px 16px;display:flex;align-items:center;gap:12px;min-height:70px;flex-shrink:0;
  }
  .player-bar.hidden { display:none; }
  .player-thumb { width:46px;height:46px;object-fit:cover;border:2px solid var(--border);flex-shrink:0; }
  .player-info { flex:1;min-width:0; }
  .player-title { font-family:var(--pixel);font-size:8px;color:white;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px; }
  .player-dj { font-size:11px;color:var(--accent); }
  .player-controls { display:flex;gap:8px;align-items:center; }
  .ctrl-btn { background:none;border:2px solid var(--border);color:var(--text);width:34px;height:34px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all 0.15s; }
  .ctrl-btn:hover { border-color:var(--accent);color:var(--accent); }
  .ctrl-btn.play-btn { border-color:var(--accent);color:var(--accent);width:42px;height:42px;font-size:17px; }

  /* REACTION BAR */
  .reaction-bar {
    background:var(--bg);border-top:1px solid var(--border);
    padding:8px 12px;display:flex;align-items:center;gap:6px;flex-shrink:0;
    overflow-x:auto;scrollbar-width:none;
  }
  .reaction-bar::-webkit-scrollbar { display:none; }
  .reaction-label { font-family:var(--pixel);font-size:7px;color:var(--text-dim);white-space:nowrap;flex-shrink:0; }
  .reaction-btn { background:var(--surface);border:1px solid var(--border);padding:6px 8px;font-size:20px;cursor:pointer;transition:all 0.15s;flex-shrink:0; }
  .reaction-btn:hover { border-color:var(--accent2);transform:scale(1.1); }

  /* UNMUTE BAR */
  #unmute-bar {
    position:fixed;top:0;left:0;right:0;background:var(--accent);
    color:white;text-align:center;padding:12px;font-family:var(--pixel);font-size:9px;
    z-index:1000;cursor:pointer;display:none;letter-spacing:1px;
  }

  /* RIGHT PANEL */
  .right-panel {
    display:flex;flex-direction:column;background:var(--surface);
    border-left:2px solid var(--border);overflow:hidden;
  }

  /* KEYWORDS */
  .panel-section { border-bottom:2px solid var(--border);padding:14px; }
  .panel-section-title { font-family:var(--pixel);font-size:8px;color:var(--text-dim);letter-spacing:2px;margin-bottom:10px; }
  .keywords-list { display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px; }
  .keyword-tag {
    background:var(--bg);border:1px solid var(--border);color:var(--text-dim);
    padding:4px 8px;font-family:var(--pixel);font-size:7px;cursor:pointer;
  }
  .keyword-tag.active { border-color:var(--accent2);color:var(--accent2);background:rgba(245,166,35,0.1); }
  .random-btn {
    width:100%;background:transparent;border:1px solid var(--accent2);color:var(--accent2);
    padding:8px;font-family:var(--pixel);font-size:7px;cursor:pointer;margin-bottom:8px;
  }
  .keyword-input-row { display:flex;gap:6px; }
  .keyword-input-row .pixel-input { flex:1;background:var(--bg);border:2px solid var(--border);color:var(--text);padding:8px 10px;font-family:var(--body);font-size:13px;outline:none; }
  .keyword-input-row .pixel-input:focus { border-color:var(--accent); }
  .add-btn { background:transparent;border:2px solid var(--green);color:var(--green);padding:8px 12px;font-family:var(--pixel);font-size:7px;cursor:pointer;white-space:nowrap; }

  /* TABS */
  .tab-bar { display:flex;border-bottom:2px solid var(--border);flex-shrink:0; }
  .tab-btn { flex:1;background:none;border:none;color:var(--text-dim);padding:10px;font-family:var(--pixel);font-size:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px; }
  .tab-btn.active { color:var(--accent);border-bottom:2px solid var(--accent);margin-bottom:-2px; }

  /* CHAT */
  #panel-chat { flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0; }
  #panel-history { flex:1;overflow-y:auto;padding:12px;display:none; }
  .chat-messages { flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:8px;scrollbar-width:thin;scrollbar-color:var(--border) transparent; }
  .chat-messages::-webkit-scrollbar { width:4px; }
  .chat-messages::-webkit-scrollbar-thumb { background:var(--border); }
  .chat-msg { display:flex;flex-direction:column;gap:3px; }
  .chat-msg-name { font-family:var(--pixel);font-size:7px; }
  .chat-msg-time { font-size:10px;color:var(--text-dim); }
  .chat-msg-body { background:var(--bg);border:1px solid var(--border);padding:7px 10px;font-size:13px;line-height:1.5;border-radius:0 4px 4px 4px;max-width:92%;word-break:break-word; }
  .chat-msg.is-me { align-items:flex-end; }
  .chat-msg.is-me .chat-msg-body { border-radius:4px 0 4px 4px;border-color:var(--green);background:rgba(0,255,136,0.05); }
  .chat-msg.is-system .chat-msg-body { background:transparent;border:none;color:var(--text-dim);font-size:11px;text-align:center;width:100%; }
  .chat-input-area { padding:10px;border-top:2px solid var(--border);display:flex;gap:8px;flex-shrink:0; }
  .chat-input-area .pixel-input { flex:1;background:var(--bg);border:2px solid var(--border);color:var(--text);padding:8px 12px;font-family:var(--body);font-size:14px;outline:none; }
  .chat-input-area .pixel-input:focus { border-color:var(--accent); }
  .send-btn { background:var(--accent);border:none;color:white;padding:8px 14px;font-family:var(--pixel);font-size:9px;cursor:pointer; }

  /* HISTORY */
  .history-item { display:flex;gap:10px;padding:8px;border:1px solid var(--border);margin-bottom:6px; }
  .history-thumb { width:50px;height:36px;object-fit:cover;flex-shrink:0; }
  .history-title { font-size:12px;color:var(--text);margin-bottom:3px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical; }
  .history-meta { font-size:11px;color:var(--text-dim); }

  /* PLAYLIST */
  #panel-playlist {
    flex:1; display:none; flex-direction:column; overflow:hidden; min-height:0;
  }
  .playlist-toolbar {
    display:flex; gap:6px; padding:8px 10px; border-bottom:1px solid var(--border); flex-shrink:0;
  }
  .pl-search-input {
    flex:1; background:var(--bg); border:2px solid var(--border); color:var(--text);
    padding:7px 10px; font-family:var(--body); font-size:13px; outline:none;
  }
  .pl-search-input:focus { border-color:var(--purple); }
  .pl-search-btn {
    background:var(--purple); border:none; color:white;
    padding:7px 10px; font-family:var(--pixel); font-size:7px; cursor:pointer; white-space:nowrap;
  }
  .playlist-body {
    flex:1; overflow-y:auto; display:flex; flex-direction:column;
    scrollbar-width:thin; scrollbar-color:var(--border) transparent;
  }
  .playlist-body::-webkit-scrollbar { width:4px; }
  .playlist-body::-webkit-scrollbar-thumb { background:var(--border); }

  /* 검색 결과 드로어 */
  .pl-results {
    border-bottom:2px solid var(--accent3);
    display:none; flex-direction:column; flex-shrink:0;
    max-height:55%; overflow-y:auto;
  }
  .pl-results.open { display:flex; }
  .pl-results-header {
    display:flex; align-items:center; justify-content:space-between;
    padding:7px 10px; font-family:var(--pixel); font-size:7px; color:var(--text-dim);
    background:var(--surface2); position:sticky; top:0; z-index:1;
  }
  .pl-results-close {
    background:none; border:none; color:var(--text-dim); cursor:pointer; font-size:12px; padding:0;
  }

  /* 폴더(키워드) */
  .pl-folder {
    border-bottom:1px solid var(--border); flex-shrink:0;
  }
  .pl-folder-header {
    display:flex; align-items:center; gap:8px;
    padding:9px 12px; cursor:pointer; user-select:none;
    background:var(--surface2); transition:background 0.15s;
  }
  .pl-folder-header:hover { background:rgba(168,85,247,0.08); }
  .pl-folder-icon { font-size:13px; flex-shrink:0; }
  .pl-folder-name {
    font-family:var(--pixel); font-size:8px; color:var(--text); flex:1;
  }
  .pl-folder-meta {
    font-family:var(--pixel); font-size:6px; color:var(--text-dim); flex-shrink:0;
  }
  .pl-folder-arrow {
    font-size:9px; color:var(--text-dim); flex-shrink:0;
    transition:transform 0.2s;
  }
  .pl-folder.open .pl-folder-arrow { transform:rotate(90deg); }
  .pl-folder-songs {
    display:none; flex-direction:column;
    border-top:1px solid var(--border);
  }
  .pl-folder.open .pl-folder-songs { display:flex; }

  /* 곡 아이템 */
  .pl-item {
    display:flex; align-items:center; gap:8px;
    padding:7px 10px 7px 20px; border-bottom:1px solid rgba(42,42,74,0.5);
    transition:background 0.15s;
  }
  .pl-item:last-child { border-bottom:none; }
  .pl-item:hover { background:rgba(168,85,247,0.05); }
  .pl-thumb {
    width:46px; height:34px; object-fit:cover;
    border:1px solid var(--border); flex-shrink:0;
  }
  .pl-info { flex:1; min-width:0; }
  .pl-title {
    font-size:12px; font-weight:700; color:var(--text);
    overflow:hidden; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;
    margin-bottom:2px; line-height:1.4;
  }
  .pl-channel { font-size:10px; color:var(--text-dim); }
  .pl-actions { display:flex; flex-direction:column; gap:3px; flex-shrink:0; }
  .pl-btn {
    background:transparent; border:1px solid; padding:3px 6px;
    font-family:var(--pixel); font-size:6px; cursor:pointer; white-space:nowrap; line-height:1.5;
  }
  .pl-btn.select { border-color:var(--accent2); color:var(--accent2); }
  .pl-btn.select:hover { background:rgba(245,166,35,0.1); }
  .pl-btn.add { border-color:var(--purple); color:var(--purple); }
  .pl-btn.add:hover { background:rgba(168,85,247,0.1); }
  .pl-btn.remove { border-color:#ff4444; color:#ff4444; }
  .pl-btn.remove:hover { background:rgba(255,68,68,0.1); }
  .pl-btn.added { border-color:var(--green); color:var(--green); cursor:default; }

  .pl-empty {
    text-align:center; padding:24px 16px;
    font-family:var(--pixel); font-size:7px; color:var(--text-dim); line-height:2.5;
  }
  .pl-folder-empty {
    padding:10px 20px; font-size:11px; color:var(--text-dim); font-style:italic;
  }

  /* 검색 결과 아이템 */
  .pl-result-item {
    display:flex; align-items:center; gap:8px;
    padding:8px 10px; border-bottom:1px solid var(--border); transition:background 0.15s;
  }
  .pl-result-item:hover { background:rgba(168,85,247,0.05); }

  /* 현재 재생 저장 버튼 */
  #save-now-playing-btn {
    background:transparent; border:1px solid var(--purple); color:var(--purple);
    padding:4px 8px; font-family:var(--pixel); font-size:6px; cursor:pointer;
    white-space:nowrap; flex-shrink:0;
  }
  #save-now-playing-btn:hover { background:rgba(168,85,247,0.15); }

  /* 폴더 선택 팝업 */
  #folder-picker {
    position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:300;
    display:none; align-items:center; justify-content:center; backdrop-filter:blur(4px);
  }
  #folder-picker.open { display:flex; }
  .folder-picker-box {
    background:var(--surface); border:2px solid var(--purple); width:300px;
    box-shadow:0 0 40px rgba(168,85,247,0.3), 6px 6px 0 rgba(0,0,0,0.5);
    position:relative;
  }
  .folder-picker-box::before {
    content:''; position:absolute; top:-1px; left:-1px; right:-1px; height:3px;
    background:linear-gradient(90deg,var(--purple),var(--accent2));
  }
  .folder-picker-header {
    padding:12px 16px; border-bottom:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between;
  }
  .folder-picker-title { font-family:var(--pixel); font-size:8px; color:var(--text); }
  .folder-picker-close {
    background:none; border:1px solid var(--border); color:var(--text-dim);
    width:26px; height:26px; cursor:pointer; font-size:13px;
  }
  .folder-picker-list { padding:10px; display:flex; flex-direction:column; gap:6px; max-height:300px; overflow-y:auto; }
  .folder-picker-item {
    display:flex; align-items:center; gap:10px; padding:10px 12px;
    border:1px solid var(--border); cursor:pointer; transition:all 0.15s; background:var(--bg);
  }
  .folder-picker-item:hover { border-color:var(--purple); background:rgba(168,85,247,0.08); }
  .folder-picker-item-name { font-family:var(--pixel); font-size:8px; color:var(--text); flex:1; }
  .folder-picker-item-count { font-family:var(--pixel); font-size:6px; color:var(--text-dim); }
  .folder-picker-new {
    display:flex; gap:6px; padding:10px; border-top:1px solid var(--border);
  }
  .folder-picker-new input {
    flex:1; background:var(--bg); border:2px solid var(--border); color:var(--text);
    padding:7px 10px; font-family:var(--body); font-size:13px; outline:none;
  }
  .folder-picker-new input:focus { border-color:var(--purple); }
  .folder-picker-new-btn {
    background:var(--purple); border:none; color:white;
    padding:7px 10px; font-family:var(--pixel); font-size:7px; cursor:pointer;
  }

  /* SONG SEARCH MODAL */
  .modal-overlay { position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:100;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px); }
  .modal-overlay.open { display:flex; }
  .modal { background:var(--surface);border:2px solid var(--border);width:100%;max-width:560px;max-height:85vh;display:flex;flex-direction:column;position:relative;box-shadow:0 0 60px rgba(0,0,0,0.7); }
  .modal::before { content:'';position:absolute;top:-1px;left:-1px;right:-1px;height:3px;background:linear-gradient(90deg,var(--purple),var(--accent)); }
  .modal-header { padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between; }
  .modal-title { font-family:var(--pixel);font-size:9px;color:var(--text); }
  .modal-close { background:none;border:1px solid var(--border);color:var(--text-dim);width:28px;height:28px;cursor:pointer;font-size:14px; }
  .modal-search { padding:14px 18px;display:flex;gap:8px; }
  .modal-search .pixel-input { flex:1;background:var(--bg);border:2px solid var(--border);color:var(--text);padding:10px 12px;font-family:var(--body);font-size:14px;outline:none; }
  .search-btn { background:var(--purple);border:none;color:white;padding:10px 14px;font-family:var(--pixel);font-size:8px;cursor:pointer; }
  .search-results { flex:1;overflow-y:auto;padding:0 18px 18px; }
  .search-result-item { display:flex;gap:10px;padding:10px;border:1px solid transparent;cursor:pointer;margin-bottom:5px;align-items:center; }
  .search-result-item:hover { border-color:var(--purple);background:rgba(168,85,247,0.05); }
  .result-thumb { width:80px;height:56px;object-fit:cover;border:1px solid var(--border);flex-shrink:0; }
  .result-title { font-size:13px;font-weight:700;color:var(--text);margin-bottom:3px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical; }
  .result-channel { font-size:12px;color:var(--text-dim); }
  .search-empty { text-align:center;padding:40px;font-family:var(--pixel);font-size:8px;color:var(--text-dim);line-height:2; }

  /* REACTION EFFECTS */
  .emoji-particle { position:fixed;pointer-events:none;z-index:500;font-size:28px; }

  /* 기본 떠오르기 */
  @keyframes floatUp { 0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-220px) scale(0.4)} }

  /* 🎵 음표 - 위로 흘러가며 회전 */
  @keyframes musicFloat { 0%{opacity:1;transform:translateY(0) rotate(0deg) scale(1)}100%{opacity:0;transform:translateY(-260px) rotate(30deg) scale(0.3)} }

  /* ❤️ 하트 - 천천히 위로 둥실 */
  @keyframes heartFloat { 0%{opacity:1;transform:translateY(0) scale(0.5)}30%{opacity:1;transform:translateY(-80px) scale(1.2)}100%{opacity:0;transform:translateY(-280px) scale(0.6)} }

  /* 🔥 불꽃 - 아래서 솟구침 */
  @keyframes fireRise { 0%{opacity:1;transform:translateY(0) scale(1)}50%{opacity:1;transform:translateY(-100px) scale(1.4)}100%{opacity:0;transform:translateY(-240px) scale(0.2)} }

  /* ⭐ 별 - 반짝이며 커졌다 사라짐 */
  @keyframes starPop { 0%{opacity:0;transform:scale(0) rotate(0deg)}30%{opacity:1;transform:scale(1.5) rotate(180deg)}70%{opacity:1;transform:scale(1) rotate(360deg)}100%{opacity:0;transform:scale(0) rotate(540deg)} }

  /* ❄️ 얼음 - 떨어짐 */
  @keyframes iceFall { 0%{opacity:1;transform:translateY(0) rotate(0deg)}100%{opacity:0;transform:translateY(180px) rotate(180deg)} }

  /* 💧 물방울 - 위에서 아래로 */
  @keyframes dropFall { 0%{opacity:1;transform:translateY(-20px) scale(1)}80%{opacity:1;transform:translateY(160px) scale(0.8)}100%{opacity:0;transform:translateY(200px) scale(0.2)} }

  /* 🎉 색종이 */
  @keyframes confettiFall { 0%{opacity:1;transform:translateY(0) rotate(0deg) scale(1)}100%{opacity:0;transform:translateY(300px) rotate(720deg) scale(0.3)} }

  /* 😂 웃음 - 크게 나타났다 튕김 */
  @keyframes laughPop { 0%{opacity:0;transform:scale(0)}20%{opacity:1;transform:scale(2)}60%{opacity:1;transform:scale(1.5)}100%{opacity:0;transform:scale(3) translateY(-60px)} }

  /* 👍 좋아요 - 여러개 튀어나옴 */
  @keyframes thumbPop { 0%{opacity:1;transform:translate(0,0) scale(0.5)}30%{opacity:1;transform:translate(var(--tx),var(--ty)) scale(1.3)}100%{opacity:0;transform:translate(var(--tx2),var(--ty2)) scale(0.2)} }

  /* 화면 오버레이 */
  .screen-overlay { position:fixed;inset:0;pointer-events:none;z-index:400;opacity:0; }
  @keyframes overlayFlash { 0%{opacity:0}20%{opacity:0.25}100%{opacity:0} }

  /* 화면 흔들기 */
  @keyframes screenShake { 0%,100%{transform:translate(0,0)}20%{transform:translate(-4px,2px)}40%{transform:translate(4px,-2px)}60%{transform:translate(-2px,4px)}80%{transform:translate(2px,-4px)} }

  /* TOAST */
  .toast-container { position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:200;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none; }
  .toast { background:var(--surface);border:1px solid var(--accent2);color:var(--accent2);padding:8px 18px;font-family:var(--pixel);font-size:8px;animation:toastIn 0.3s ease,toastOut 0.3s ease 2.7s forwards; }
  @keyframes toastIn { from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)} }
  @keyframes toastOut { from{opacity:1}to{opacity:0} }

  /* CSS ANIMATIONS */
  @keyframes animDance { 0%{transform:rotate(-12deg)translateY(0)}25%{transform:rotate(0deg)translateY(-6px)scale(1.08)}50%{transform:rotate(12deg)translateY(0)}75%{transform:rotate(0deg)translateY(-4px)}100%{transform:rotate(-12deg)translateY(0)} }
  @keyframes animJump { 0%,100%{transform:translateY(0)}30%{transform:translateY(-16px)scale(1.1)}80%{transform:translateY(-2px)} }
  @keyframes animShake { 0%,100%{transform:translateX(0)}15%{transform:translateX(-6px)rotate(-5deg)}30%{transform:translateX(6px)rotate(5deg)}60%{transform:translateX(5px)rotate(4deg)}75%{transform:translateX(-3px)} }
  @keyframes animCelebrate { 0%{transform:scale(1)rotate(0)}20%{transform:scale(1.3)rotate(-15deg)}40%{transform:scale(1.3)rotate(15deg)}100%{transform:scale(1)rotate(0)} }
  @keyframes animCry { 0%,100%{transform:translateY(0)}50%{transform:translateY(5px)scale(0.92)} }
  @keyframes animSpin { 0%{transform:rotate(0)}100%{transform:rotate(360deg)} }
  .seat.is-bobbing canvas.sprite, canvas.sprite.anim-dance { animation:animDance 0.45s ease-in-out infinite; }
  canvas.sprite.anim-jump { animation:animJump 0.5s ease-out; }
  canvas.sprite.anim-shake { animation:animShake 0.5s ease-in-out; }
  canvas.sprite.anim-celebrate { animation:animCelebrate 0.6s ease-in-out; }
  canvas.sprite.anim-cry { animation:animCry 0.8s ease-in-out; }
  canvas.sprite.anim-spin { animation:animSpin 0.6s ease-in-out; }

  /* MOBILE */
  @media (max-width: 768px) {
    /* 전체 레이아웃 */
    #room-screen { height:auto!important; overflow-y:auto!important; }
    .room-layout { display:flex!important; flex-direction:column!important; height:auto!important; }
    .stage-area { flex-shrink:0!important; height:auto!important; }

    /* 자리 */
    .seats-container { height:320px!important; min-height:320px!important; flex:none!important; overflow:hidden!important; }
    .seat { padding:6px 4px!important; gap:3px!important; }
    .seat canvas.sprite { transform:scale(0.7); transform-origin:top center; }
    .center-keyword { width:110px; }
    .keyword-text { font-size:9px!important; }
    .next-theme-card { bottom:auto!important; top:6px!important; right:6px!important; }
    .next-theme-sub { display:none!important; }

    /* 자리 안 버튼들 — 재생 버튼 포함 */
    .seat-name { font-size:7px!important; }
    .seat-song { font-size:10px!important; max-width:100px!important; -webkit-line-clamp:1!important; }
    .pick-song-btn { font-size:6px!important; padding:4px 7px!important; }
    .ctrl-btn.play-btn#my-play-btn,
    button#my-play-btn { font-size:7px!important; padding:4px 8px!important; width:auto!important; height:auto!important; }
    .kick-btn { font-size:5px!important; padding:2px 6px!important; }

    /* 플레이어 바 */
    .player-bar { padding:8px 12px; min-height:60px; }
    .ctrl-btn { width:36px!important; height:36px!important; font-size:14px!important; }
    .ctrl-btn.play-btn { width:44px!important; height:44px!important; font-size:18px!important; }
    #save-now-playing-btn { font-size:5px!important; padding:3px 6px!important; }

    /* 탑바 */
    .topbar { padding:6px 10px; }
    .room-logo { font-size:8px!important; }
    .room-id-display { font-size:6px!important; padding:4px 7px; }
    .next-dj-btn, #leave-btn, #dj-refuse-btn { font-size:6px!important; padding:4px 7px!important; }
    .users-bar { display:none; }

    /* 리액션 */
    .reaction-bar { padding:6px 10px; }
    .reaction-btn { font-size:20px; padding:5px 7px; }

    /* ── 우측 패널: 키워드 숨기고 탭+채팅만 보이게 ── */
    .right-panel {
      border-left: none!important;
      border-top: 2px solid var(--border);
      display: flex!important;
      flex-direction: column!important;
      /* 뷰포트 높이에서 위 영역 빼고 채움 */
      height: 55vw!important;
      min-height: 280px!important;
      max-height: 400px!important;
      flex-shrink: 0!important;
      overflow: hidden!important;
    }

    /* 모바일에서 keywords 섹션 숨김 (공간 확보) */
    .right-panel .panel-section { display:none!important; }

    /* 탭바 */
    .tab-bar { flex-shrink:0!important; }
    .tab-btn { font-size:7px!important; padding:10px 4px!important; }

    /* 각 패널: !important 없이 flex로 자연스럽게 채움 */
    /* switchTab()이 display를 직접 제어하므로 !important 금지 */
    #panel-chat {
      min-height: 0;
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #panel-playlist {
      min-height: 0;
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #panel-history {
      flex: 1;
      overflow-y: auto;
      min-height: 0;
      padding: 8px;
    }

    /* 채팅 메시지 스크롤 */
    .chat-messages {
      flex: 1!important;
      overflow-y: auto!important;
      min-height: 0!important;
      -webkit-overflow-scrolling: touch;
    }
    .chat-input-area { flex-shrink:0!important; }
    .chat-input-area textarea,
    .chat-input-area .pixel-input { font-size:14px!important; }

    /* 플레이리스트 바디 스크롤 */
    .playlist-body { -webkit-overflow-scrolling: touch; }
  }

  canvas.sprite { image-rendering:pixelated; }
</style>
</head>
<body>

<!-- Unmute Banner -->
<div id="unmute-bar" onclick="handleUnmute()">🔇 탭해서 소리 켜기</div>

<!-- ROOM SCREEN -->
<div id="room-screen">
  <div class="topbar">
    <div class="room-logo">🎵 MUSICROOM</div>
    <div class="users-bar" id="users-bar">
      <span style="color:var(--text-dim);margin-right:4px;">ONLINE:</span>
    </div>
    <div class="topbar-right">
      <div class="room-id-display" id="room-id-display" title="클릭해서 링크 복사">📋 ROOM: ------</div>
      <button id="dj-refuse-btn" title="활성화하면 DJ 순번에서 제외됩니다">🚫 DJ 거부</button>
      <button class="next-dj-btn" id="next-dj-btn" style="display:none">▶ NEXT DJ</button>
      <button id="leave-btn">🚪 나가기</button>
    </div>
  </div>

  <div class="room-layout">
    <div class="stage-area">
      <div class="dj-indicator" id="dj-indicator">🎧 DJ: ---</div>

      <div class="seats-container" id="seats-container">
        <div class="center-keyword" id="center-keyword">
          <div class="keyword-badge">
            <span class="keyword-label">▸ THEME</span>
            <div class="keyword-text" id="keyword-display">---</div>
          </div>
        </div>
        <div class="next-theme-card" id="next-theme-card">
          <span class="next-theme-label">▸ NEXT THEME</span>
          <div class="next-theme-badge">
            <span class="next-theme-text" id="next-theme-text">?</span>
            <span class="next-theme-sub" id="next-theme-sub"></span>
          </div>
        </div>
      </div>

      <div class="player-bar hidden" id="player-bar">
        <img class="player-thumb" id="player-thumb" src="" alt="">
        <div class="player-info">
          <div class="player-title" id="player-title">---</div>
          <div class="player-dj" id="player-dj-name"></div>
        </div>
        <div class="player-controls">
          <button class="ctrl-btn play-btn" id="play-pause-btn">▶</button>
          <button class="ctrl-btn" id="stop-btn">■</button>
          <button class="ctrl-btn" id="mute-btn">🔊</button>
          <button id="save-now-playing-btn" title="내 플레이리스트에 저장">📋 저장</button>
        </div>
      </div>

      <div class="reaction-bar">
        <span class="reaction-label">REACT:</span>
        <button class="reaction-btn" data-emoji="🎵">🎵</button>
        <button class="reaction-btn" data-emoji="👍">👍</button>
        <button class="reaction-btn" data-emoji="❤️">❤️</button>
        <button class="reaction-btn" data-emoji="🔥">🔥</button>
        <button class="reaction-btn" data-emoji="⭐">⭐</button>
        <button class="reaction-btn" data-emoji="❄️">❄️</button>
        <button class="reaction-btn" data-emoji="💧">💧</button>
        <button class="reaction-btn" data-emoji="🎉">🎉</button>
        <button class="reaction-btn" data-emoji="😂">😂</button>
      </div>
    </div>

    <div class="right-panel">
      <div class="panel-section">
        <div class="panel-section-title">▸ KEYWORDS</div>
        <div class="keywords-list" id="keywords-list"></div>
        <button class="random-btn" id="random-keyword-btn">🎲 RANDOM</button>
        <div class="keyword-input-row">
          <input type="text" class="pixel-input" id="new-keyword-input" placeholder="키워드 추가..." maxlength="12">
          <button class="add-btn" id="add-keyword-btn">+ ADD</button>
        </div>
      </div>

      <div class="tab-bar">
        <button class="tab-btn active" id="tab-chat">💬 CHAT</button>
        <button class="tab-btn" id="tab-playlist">📋 MY LIST</button>
        <button class="tab-btn" id="tab-history">🎵 PLAYED</button>
      </div>

      <div id="panel-chat">
        <div class="chat-messages" id="chat-messages"></div>
        <div class="chat-input-area">
          <textarea class="pixel-input" id="chat-input" placeholder="메시지 입력..." maxlength="200" rows="1" style="resize:none;overflow:hidden;line-height:1.4;padding:10px 12px;font-family:var(--body);font-size:14px;"></textarea>
          <button class="send-btn" id="send-btn">SEND</button>
        </div>
      </div>

      <div id="panel-playlist">
        <div class="playlist-toolbar">
          <input type="text" class="pl-search-input" id="pl-search-input" placeholder="곡 검색해서 추가...">
          <button class="pl-search-btn" id="pl-search-btn">🔍</button>
        </div>
        <div class="playlist-body" id="playlist-body">
          <!-- 검색 결과 드로어 -->
          <div class="pl-results" id="pl-results">
            <div class="pl-results-header">
              <span>🔍 검색 결과</span>
              <button class="pl-results-close" id="pl-results-close">✕ 닫기</button>
            </div>
            <div id="pl-results-list"></div>
          </div>
          <!-- 폴더 목록 -->
          <div id="pl-folder-list">
            <div class="pl-empty">플레이리스트가 비어있어요<br>🔍 검색하거나 재생 중인 곡을<br>저장해보세요!</div>
          </div>
        </div>
      </div>

      <div id="panel-history"></div>
    </div>
  </div>
</div>

<!-- Folder Picker Modal -->
<div id="folder-picker">
  <div class="folder-picker-box">
    <div class="folder-picker-header">
      <div class="folder-picker-title">📋 폴더에 저장</div>
      <button class="folder-picker-close" id="folder-picker-close">✕</button>
    </div>
    <div class="folder-picker-list" id="folder-picker-list"></div>
    <div class="folder-picker-new">
      <input type="text" id="folder-picker-new-input" placeholder="새 폴더(키워드) 이름..." maxlength="12">
      <button class="folder-picker-new-btn" id="folder-picker-new-btn">+ 만들기</button>
    </div>
  </div>
</div>

<!-- DJ Request Modal -->
<div id="dj-request-modal">
  <div class="dj-request-box">
    <div class="dj-request-header">
      <div class="dj-request-title">🎧 다음 DJ 지목</div>
      <button class="dj-request-close" id="dj-request-close">✕</button>
    </div>
    <div class="dj-request-list" id="dj-request-list"></div>
  </div>
</div>

<!-- Song Search Modal -->
<div class="modal-overlay" id="search-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">🎵 노래 선정</div>
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <div class="modal-search">
      <input type="text" class="pixel-input" id="search-input" placeholder="노래 제목이나 아티스트 검색...">
      <button class="search-btn" id="search-btn">🔍 검색</button>

// ── drawSprite
function drawSprite(canvasEl, charId, scale=3, colorId=null) {
  const colorData = colorId ? COLORS.find(c => c.id === colorId) : COLORS[0];
  const palette = colorData ? colorData.palette : COLORS[0].palette;
  const rows = SPRITE_DATA[charId] || SPRITE_DATA.cat;
  canvasEl.width = 16 * scale;
  canvasEl.height = 16 * scale;
  const ctx = canvasEl.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  const colors = {
    '0':'transparent','1':palette[0],'2':palette[1],
    '3':palette[2],'4':palette[3],'5':palette[4],
  };
  rows.forEach((row, y) => {
    [...row].forEach((px, x) => {
      if (px === '0') return;
      ctx.fillStyle = colors[px] || palette[0];
      ctx.fillRect(x * scale, y * scale, scale, scale);
    });
  });
}

function applyKeywordLogic() {
  const userKws = (state.keywords||[]).filter(Boolean);
  let newKw;
  if (state.nextKeyword) {
    newKw = state.nextKeyword;
    state.nextKeyword = null;
  } else if (userKws.length === 1) {
    newKw = userKws[0];
  } else if (userKws.length >= 2) {
    newKw = userKws[Math.floor(Math.random()*userKws.length)];
  } else {
    const pool = state.keywordPool;
    const others = pool.filter(k=>k!==state.keyword);
    newKw = others[Math.floor(Math.random()*others.length)] || pool[0];
  }
  if (newKw) fbUpdateKeyword(newKw);
  renderNextTheme();
}

function kickPlayer(targetName, targetSeat) {
  if (!state.roomId || !window._fbReady) return;
  const {db, ref, set, push} = window._fb;
  // 강퇴 신호 Firebase에 저장
  set(ref(db, `rooms/${state.roomId}/kicked`), {
    name: targetName, seatIndex: targetSeat, ts: Date.now(), by: state.me?.name
  });
  // 자리 제거
  set(ref(db, `rooms/${state.roomId}/seats/seat_${targetSeat}`), null);
  fbSendSystemChat(state.roomId, `🚫 ${targetName}님이 강퇴됐습니다.`);
  toast(`🚫 ${targetName}님 강퇴`);
}

function fbSendSystemChat(roomId, text) {
  if (!window._fbReady) return;
  const {db,ref,push} = window._fb;
  push(ref(db,`rooms/${roomId}/chat`),{text,ts:Date.now(),system:true});
}
function fbSendChat(text) {
  if (!state.roomId||!state.me||!window._fbReady) return;
  const {db,ref,push} = window._fb;
  push(ref(db,`rooms/${state.roomId}/chat`),{
    name:state.me.name,charId:state.me.charId,colorId:state.me.colorId,
    text,time:timeStr(),ts:Date.now(),system:false
  });
}
function fbUpdateKeyword(keyword) {
  if (!state.roomId||!window._fbReady) return;
  const {db,ref,update} = window._fb;
  update(ref(db,`rooms/${state.roomId}`),{keyword});
}
function fbUpdateDJ(index) {
  if (!state.roomId||!window._fbReady) return;
  const {db,ref,update} = window._fb;
  update(ref(db,`rooms/${state.roomId}`),{currentDJIndex:index});
}
function fbUpdateSong(seatIndex, song) {
  if (!state.roomId||!window._fbReady) return;
  const {db,ref,update} = window._fb;
  update(ref(db,`rooms/${state.roomId}/seats/seat_${seatIndex}`),{song:song||null});
}
function fbBroadcastPlay(song, djName) {
  if (!state.roomId||!window._fbReady) return;
  const {db,ref,set} = window._fb;
  set(ref(db,`rooms/${state.roomId}/nowPlaying`),{
    videoId:song.id,title:song.title,thumb:song.thumb,djName,ts:Date.now()
  });
}
function fbAddHistory(entry) {
  if (!state.roomId||!window._fbReady) return;
  const {db,ref,push} = window._fb;
  push(ref(db,`rooms/${state.roomId}/history`),{...entry,ts:Date.now()});
}
function fbSetDJRefuse(on) {
  if (!state.roomId||!state.me||!window._fbReady) return;
  const {db,ref,update} = window._fb;
  update(ref(db,`rooms/${state.roomId}/seats/seat_${state.me.seatIndex}`),{djRefuse:on});
}
// DJ 신청 모달 열기 (현재 DJ가 NEXT DJ 누를 때)
function openDJRequestModal() {
  const list = document.getElementById('dj-request-list');
  list.innerHTML = '';
  const occupied = state.seats.map((s,i)=>s?i:-1).filter(i=>i>=0&&i!==state.currentDJIndex);
  if (!occupied.length) { toast('지목할 참여자가 없어요'); return; }
  occupied.forEach(i => {
    const seat = state.seats[i];
    const isRefused = !!seat.djRefuse;
    const hasSong = !!seat.song;
    const item = document.createElement('div');
    item.className = 'dj-request-item' + (isRefused?' refused':'');
    const colorData = COLORS.find(c=>c.id===seat.colorId)||COLORS[0];
    item.innerHTML = `
      <canvas class="sprite" width="36" height="36" data-char="${seat.charId}" data-color="${seat.colorId}" style="flex-shrink:0;image-rendering:pixelated;"></canvas>
      <div style="flex:1;min-width:0;">
        <div class="dj-request-name" style="color:${colorData.hex}">${seat.name}</div>
        <div class="dj-request-song">${hasSong?'🎵 '+seat.song.title:'노래 미선정'}</div>
      </div>
      ${isRefused?'<span class="dj-request-badge refused">DJ 거부중</span>':(!hasSong?'<span class="dj-request-badge no-song">곡 미선정</span>':'')}
    `;
    requestAnimationFrame(()=>{
      const cv = item.querySelector('canvas');
      if (cv) drawSprite(cv, seat.charId, 2.25, seat.colorId);
    });
    if (!isRefused) {
      item.addEventListener('click', () => {
        doNextDJ(i);
        document.getElementById('dj-request-modal').classList.remove('open');
      });
    }
    list.appendChild(item);
  });
  document.getElementById('dj-request-modal').classList.add('open');
}
// 실제 DJ 넘기기
function doNextDJ(targetIdx) {
  fbUpdateDJ(targetIdx);
  if (ytPlayer&&ytReady) { ytPlayer.stopVideo(); state.playing=false; state.currentSong=null; document.getElementById('player-bar').classList.add('hidden'); }
  fbSendSystemChat(state.roomId, `🎧 이제 ${state.seats[targetIdx]?.name}님이 DJ입니다!`);
  toast(`🎧 DJ: ${state.seats[targetIdx]?.name}`);
}

// ── ENTER ROOM
async function enterRoom() {
  const {db,ref,set,get,update,onValue,push} = window._fb;
  const roomRef = ref(db,`rooms/${myRoomId}`);
  const snap = await get(roomRef);

  let seatIndex = mySeatIndex;

  if (!snap.exists()) {
    const initKw = state.keywordPool[Math.floor(Math.random()*state.keywordPool.length)];
    await set(roomRef,{createdAt:Date.now(),keyword:initKw,keywords:{},currentDJIndex:0,seats:{},history:{}});
    seatIndex = 0;
  } else {
    const data = snap.val();
    const seats = data.seats||{};
    const taken = Object.values(seats).map(s=>s.seatIndex);

    // 이미 같은 이름으로 자리가 있으면 그 자리로 복귀 (새로고침 대응)
    const existingSeat = Object.values(seats).find(s => s.name === myName);
    if (existingSeat) {
      seatIndex = existingSeat.seatIndex;
      await update(ref(db,`rooms/${myRoomId}/seats/seat_${seatIndex}`),{
        charId:myCharId, colorId:myColorId, away:false
      });
      state.me = {name:myName, charId:myCharId, colorId:myColorId, seatIndex};
    } else {
      // 새 자리 배정
      seatIndex = [0,1,2,3].find(i=>!taken.includes(i));
      if (seatIndex === undefined) { alert('방이 꽉 찼어요!'); location.href='index.html'; return; }
      state.me = {name:myName, charId:myCharId, colorId:myColorId, seatIndex};
      await set(ref(db,`rooms/${myRoomId}/seats/seat_${seatIndex}`),{
        name:myName,charId:myCharId,colorId:myColorId,seatIndex,song:null,joinedAt:Date.now()
      });
    }
  }

  if (!state.me) {
    state.me = {name:myName, charId:myCharId, colorId:myColorId, seatIndex};
    await set(ref(db,`rooms/${myRoomId}/seats/seat_${seatIndex}`),{
      name:myName,charId:myCharId,colorId:myColorId,seatIndex,song:null,joinedAt:Date.now()
    });
  }
  const myKey = `seat_${seatIndex}`;

  // 세션 저장
  localStorage.setItem('musicroom_session', JSON.stringify({
    roomId:myRoomId, name:myName, charId:myCharId, colorId:myColorId, seatIndex, savedAt:Date.now()
  }));

  // 링크 복사
  document.getElementById('room-id-display').textContent = `📋 ROOM: ${myRoomId}`;
  document.getElementById('room-id-display').addEventListener('click',()=>{
    navigator.clipboard.writeText(`${location.origin}${location.pathname.replace('room.html','index.html')}?room=${myRoomId}`)
      .then(()=>toast('링크 복사됨! 🔗'));
  });

  // ── Firebase 리스너들
  // 방 상태
  onValue(ref(db,`rooms/${myRoomId}`), snap=>{
    if (!snap.exists()) return;
    const data = snap.val();
    if (data.keyword && data.keyword!==state.keyword) {
      state.keyword = data.keyword;
      const kd = document.getElementById('keyword-display');
      if (kd) kd.textContent = state.keyword;
    }
    if (data.keywords) {
      const kws = Array.isArray(data.keywords)?data.keywords:Object.values(data.keywords);
      if (JSON.stringify(kws)!==JSON.stringify(state.keywords)) {
        state.keywords = kws.filter(Boolean);
        renderKeywords();
        renderNextTheme();
      }
    }
    if (typeof data.currentDJIndex==='number' && data.currentDJIndex!==state.currentDJIndex) {
      state.currentDJIndex = data.currentDJIndex;
      renderSeats(); updateDJIndicator();
    }
    if (data.nextKeyword !== undefined) {
      state.nextKeyword = data.nextKeyword;
      renderNextTheme();
    }
  });

  // 자리
  onValue(ref(db,`rooms/${myRoomId}/seats`), snap=>{
    const seats = snap.val()||{};
    const newSeats = [null,null,null,null];
    Object.values(seats).forEach(s=>{if(s&&typeof s.seatIndex==='number')newSeats[s.seatIndex]=s;});
    state.seats = newSeats;
    // 내 djRefuse 상태를 Firebase 값으로 동기화
    if (state.me) {
      const mySeat = newSeats[state.me.seatIndex];
      if (mySeat) {
        state.djRefuse = !!mySeat.djRefuse;
        const btn = document.getElementById('dj-refuse-btn');
        if (btn) {
          btn.classList.toggle('active', state.djRefuse);
          btn.textContent = state.djRefuse ? '✅ DJ 거부중' : '🚫 DJ 거부';
        }
      }
    }
    renderSeats(); renderUsersBar(); updateDJIndicator();
  });

  // 채팅
  onValue(ref(db,`rooms/${myRoomId}/chat`), snap=>{
    if (!snap.exists()) return;
    const container = document.getElementById('chat-messages');
    container.innerHTML = '';
    Object.values(snap.val()).sort((a,b)=>a.ts-b.ts).forEach(msg=>{
      if (msg.system) {
        const div = document.createElement('div');
        div.className = 'chat-msg is-system';
        div.innerHTML = `<div class="chat-msg-body">${escHtml(msg.text)}</div>`;
        container.appendChild(div);
      } else {
        const isMe = state.me && msg.name===state.me.name;
        const colorData = COLORS.find(c=>c.id===msg.colorId)||COLORS[0];
        const div = document.createElement('div');
        div.className = `chat-msg${isMe?' is-me':''}`;
        div.innerHTML = `<div style="display:flex;align-items:center;gap:6px;margin-bottom:2px;">
          <span class="chat-msg-name" style="color:${colorData.hex}">${escHtml(msg.name)}</span>
          <span class="chat-msg-time">${msg.time||''}</span></div>
          <div class="chat-msg-body">${escHtml(msg.text)}</div>`;
        container.appendChild(div);
      }
    });
    container.scrollTop = container.scrollHeight;
  });

  // 히스토리
  onValue(ref(db,`rooms/${myRoomId}/history`), snap=>{
    if (!snap.exists()) return;
    state.history = Object.values(snap.val()).sort((a,b)=>b.ts-a.ts);
    renderHistory();
  });

  // nowPlaying
  let lastPlayTs = 0;
  onValue(ref(db,`rooms/${myRoomId}/nowPlaying`), snap=>{
    if (!snap.exists()) return;
    const np = snap.val();
    if (!np||!np.videoId) return;
    if (np.ts<=lastPlayTs) return;
    lastPlayTs = np.ts;
    state.currentSong = {id:np.videoId,title:np.title,thumb:np.thumb};
    document.getElementById('player-bar').classList.remove('hidden');
    document.getElementById('player-thumb').src = np.thumb||'';
    document.getElementById('player-title').textContent = np.title;
    document.getElementById('player-dj-name').textContent = `🎧 DJ: ${np.djName}`;
    updateMediaSession(np.title, np.djName, np.thumb);
    const doPlay = () => {
      if (ytReady&&ytPlayer) {
        const alreadyUnmuted = localStorage.getItem('musicroom_unmuted')==='true';
        if (alreadyUnmuted) {
          ytPlayer.unMute(); ytPlayer.setVolume(100); isMuted=false;
          document.getElementById('mute-btn').textContent='🔊';
          document.getElementById('unmute-bar').style.display='none';
          ytPlayer.loadVideoById(np.videoId);
        } else {
          ytPlayer.mute(); isMuted=true;
          ytPlayer.loadVideoById(np.videoId);
          const wait = setInterval(()=>{
            if (ytPlayer.getPlayerState()===1||ytPlayer.getPlayerState()===3) {
              clearInterval(wait);
              document.getElementById('mute-btn').textContent='🔇';
              document.getElementById('unmute-bar').style.display='block';
            }
          },200);
        }
      } else {
        const w = setInterval(()=>{if(ytReady&&ytPlayer){clearInterval(w);doPlay();}},300);
      }
    };
    doPlay();
  });

  // songEnded
  let lastEndedTs = 0;
  onValue(ref(db,`rooms/${myRoomId}/songEnded`), snap=>{
    if (!snap.exists()) return;
    const data = snap.val();
    if (!data||data.ts<=lastEndedTs) return;
    lastEndedTs = data.ts;
    const prevDJ = state.seats[data.djIndex];
    const amPrevDJ = prevDJ&&state.me&&prevDJ.name===state.me.name;
    if (!amPrevDJ) return;
    // djRefuse 제외한 occupied 목록
    const occupied = state.seats.map((s,i)=>s?i:-1).filter(i=>i>=0);
    const eligible = state.seats.map((s,i)=>s&&!s.djRefuse?i:-1).filter(i=>i>=0);
    if (!occupied.length) return;
    // 거부 안 한 사람 중 다음 순서 찾기 (없으면 전체에서)
    const pool = eligible.length ? eligible : occupied;
    const curPos = pool.indexOf(data.djIndex);
    const nextIdx = pool[(curPos+1)%pool.length];
    fbUpdateDJ(nextIdx);
    state._djRound = state._djRound||[];
    if (!state._djRound.includes(data.djIndex)) state._djRound.push(data.djIndex);
    if (occupied.every(i=>state._djRound.includes(i))) {
      state._djRound = [];
      const {db:db2,ref:ref2,set:set2,update:update2} = window._fb;
      set2(ref2(db2,`rooms/${myRoomId}/roundReset`),{ts:Date.now()});
      applyKeywordLogic();
      fbSendSystemChat(myRoomId,'🎉 한 바퀴 완료! 노래를 다시 선정해주세요!');
    }
    fbSendSystemChat(myRoomId,`🎧 노래 끝! 다음 DJ: ${state.seats[nextIdx]?.name}`);
  });

  // roundReset
  let lastResetTs = 0;
  onValue(ref(db,`rooms/${myRoomId}/roundReset`), snap=>{
    if (!snap.exists()) return;
    const data = snap.val();
    if (!data||data.ts<=lastResetTs) return;
    lastResetTs = data.ts;
    renderSeats();
    toast('🎉 새 라운드! 노래를 선정해주세요');
  });

  // 강퇴 감지
  onValue(ref(db, `rooms/${myRoomId}/kicked`), snap => {
    if (!snap.exists() || !state.me) return;
    const data = snap.val();
    if (data && data.name === state.me.name) {
      alert('강퇴됐습니다.');
      localStorage.removeItem('musicroom_session');
      location.href = 'index.html';
    }
  });

  // 리액션
  let lastReactionTs = 0;
  onValue(ref(db,`rooms/${myRoomId}/reactions`), snap=>{
    if (!snap.exists()) return;
    const items = Object.values(snap.val()).sort((a,b)=>b.ts-a.ts);
    if (!items.length||items[0].ts<=lastReactionTs) return;
    lastReactionTs = items[0].ts;
    const latest = items[0];
    spawnEmojiLocally(latest.emoji);
    if (latest.senderName) {
      const senderIdx = state.seats.findIndex(s=>s&&s.name===latest.senderName);
      if (senderIdx>=0) playCharAnim(senderIdx,'anim-'+(EMOJI_ANIM[latest.emoji]||'jump'),700);
    }
  });

  // 리듬
  onValue(ref(db,`rooms/${myRoomId}/rhythm`), snap=>{
    const rhythmData = snap.val()||{};
    state.seats.forEach((seat,idx)=>{
      if (!seat) return;
      const key = seat.name.replace(/[.#$[\]]/g,'_');
      const r = rhythmData[key];
      if (r&&r.on) {
        document.querySelector(`.seat[data-seat="${idx}"]`)?.classList.add('is-bobbing');
        playCharAnim(idx,'anim-dance');
      } else {
        document.querySelector(`.seat[data-seat="${idx}"]`)?.classList.remove('is-bobbing');
        stopCharAnim(idx);
      }
    });
  });

  fbSendSystemChat(myRoomId,`${myName}님이 입장했습니다 🎉`);
}

// ── PLAY DJ SONG
function playCurrentDJSong() {
  const djSeat = state.seats[state.currentDJIndex];
  if (!djSeat||!djSeat.song){toast('먼저 노래를 선정해주세요!');return;}
  // 플레이어 미준비 시 최대 5초 대기 후 재시도
  if (!ytReady||!ytPlayer||typeof ytPlayer.loadVideoById!=='function') {
    toast('⏳ 플레이어 준비 중...');
    let tries = 0;
    const wait = setInterval(()=>{
      tries++;
      if (ytReady && ytPlayer && typeof ytPlayer.loadVideoById==='function') {
        clearInterval(wait);
        _doPlay(djSeat.song, djSeat.name);
      } else if (tries > 75) { // 15초 대기
        clearInterval(wait);
        toast('❌ YouTube 연결 실패. 인터넷 연결을 확인하거나 새로고침 해보세요.');
      }
    }, 200);
    return;
  }
  _doPlay(djSeat.song, djSeat.name);
}

function _doPlay(song, djName) {
  ytPlayer.loadVideoById(song.id);
  fbBroadcastPlay(song, djName);
  fbAddHistory({title:song.title,thumb:song.thumb,djName,keyword:state.keyword,time:timeStr()});
  fbSendSystemChat(state.roomId,`🎧 ${djName}DJ의 "${song.title}" 재생 시작!`);
  toast('▶ 재생 시작!');
}

// ── YOUTUBE
function _initYTPlayer() {
  ytPlayer = new YT.Player('yt-player', {
    height: '180', width: '320',
    playerVars: {autoplay:1, controls:0, rel:0, iv_load_policy:3, modestbranding:1, enablejsapi:1, origin:location.origin},
    events: {
      onReady: () => { ytReady = true; },
      onStateChange: onPlayerStateChange,
      onError: (e) => { console.warn('YT Error:', e.data); }
    }
  });
}
// API가 이미 로드됐으면 바로 초기화, 아니면 로드 완료 시 호출
window._ytInit = _initYTPlayer;
if (window._ytApiLoaded) _initYTPlayer();

function onPlayerStateChange(event) {
  const btn = document.getElementById('play-pause-btn');
  if (event.data===YT.PlayerState.PLAYING) {
    state.playing=true; if(btn)btn.textContent='⏸';
    requestWakeLock();
  } else if (event.data===YT.PlayerState.PAUSED||event.data===YT.PlayerState.ENDED) {
    state.playing=false; if(btn)btn.textContent='▶';
    if (event.data===YT.PlayerState.ENDED) {
      const djSeat = state.seats[state.currentDJIndex];
      const amDJ = djSeat&&state.me&&djSeat.name===state.me.name;
      if (amDJ&&state.roomId&&window._fbReady) {
        const {db,ref,set} = window._fb;
        set(ref(db,`rooms/${state.roomId}/songEnded`),{ts:Date.now(),djIndex:state.currentDJIndex});
      }
    }
  }
}

// ── UNMUTE
function handleUnmute() {
  if (!ytPlayer||!ytReady) return;
  ytPlayer.unMute(); ytPlayer.setVolume(100); isMuted=false;
  localStorage.setItem('musicroom_unmuted','true');
  document.getElementById('mute-btn').textContent='🔊';
  document.getElementById('mute-btn').style.color='';
  document.getElementById('unmute-bar').style.display='none';
}

// ── MEDIA SESSION
function updateMediaSession(title, djName, thumb) {
  if (!('mediaSession' in navigator)) return;
  navigator.mediaSession.metadata = new MediaMetadata({title, artist:`DJ: ${djName}`, artwork:thumb?[{src:thumb}]:[]});
  navigator.mediaSession.setActionHandler('play',()=>{ytPlayer?.playVideo();});
  navigator.mediaSession.setActionHandler('pause',()=>{ytPlayer?.pauseVideo();});
}

// ── WAKE LOCK
let wakeLock = null;
async function requestWakeLock() {
  if (!('wakeLock' in navigator)||wakeLock) return;
  try { wakeLock = await navigator.wakeLock.request('screen'); wakeLock.addEventListener('release',()=>{wakeLock=null;}); } catch(e){}
}
document.addEventListener('visibilitychange',()=>{
  if (document.visibilityState==='visible'&&state.playing) requestWakeLock();
});

// ── EMOJI
function spawnEmojiLocally(emoji) {
  const effects = {
    '🎵': spawnMusic,
    '👍': spawnThumbs,
    '❤️': spawnHearts,
    '🔥': spawnFire,
    '⭐': spawnStars,
    '❄️': spawnIce,
    '💧': spawnDrops,
    '🎉': spawnConfetti,
    '😂': spawnLaugh,
  };
  const fn = effects[emoji];
  if (fn) fn();
  else spawnDefault(emoji);
}

function spawnDefault(emoji) {
  for (let i = 0; i < 5; i++) {
    setTimeout(() => {
      const el = makeParticle(emoji);
      el.style.left = Math.random()*80+10+'%';
      el.style.bottom = '20%';
      el.style.animation = 'floatUp 1.8s ease-out forwards';
      el.style.fontSize = '28px';
      document.body.appendChild(el);
      setTimeout(()=>el.remove(), 1800);
    }, i * 120);
  }
}

function makeParticle(emoji) {
  const el = document.createElement('div');
  el.className = 'emoji-particle';
  el.textContent = emoji;
  return el;
}

function spawnMusic() {
  for (let i = 0; i < 10; i++) {
    setTimeout(() => {
      const el = makeParticle('🎵');
      el.style.left = Math.random()*90+5+'%';
      el.style.bottom = Math.random()*30+10+'%';
      el.style.fontSize = Math.random()*20+18+'px';
      el.style.animation = `musicFloat ${1.5+Math.random()}s ease-out forwards`;
      document.body.appendChild(el);
      setTimeout(()=>el.remove(), 2500);
    }, i * 100);
  }
}

function spawnThumbs() {
  for (let i = 0; i < 8; i++) {
    setTimeout(() => {
      const el = makeParticle('👍');
      const cx = 30+Math.random()*40, cy = 30+Math.random()*40;
      el.style.left = cx+'%'; el.style.top = cy+'%';
      el.style.fontSize = Math.random()*24+20+'px';
      el.style.setProperty('--tx', (Math.random()-0.5)*120+'px');
      el.style.setProperty('--ty', (Math.random()-0.5)*120+'px');
      el.style.setProperty('--tx2', (Math.random()-0.5)*200+'px');
      el.style.setProperty('--ty2', (Math.random()-0.5)*200+'px');
      el.style.animation = 'thumbPop 1.2s ease-out forwards';
      document.body.appendChild(el);
      setTimeout(()=>el.remove(), 1200);
    }, i * 80);
  }

async function doSearch() {
  const q = document.getElementById('search-input').value.trim();
  if (!q) return;
  const resultsEl = document.getElementById('search-results');
  resultsEl.innerHTML='<div class="search-empty">🔍 검색 중...</div>';
  try {
    const url=`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(q)}&type=video&maxResults=8&key=${ytApiKey}`;
    const data = await (await fetch(url)).json();
    if (data.error){resultsEl.innerHTML=`<div class="search-empty">❌ 오류: ${data.error.message}</div>`;return;}
    if (!data.items?.length){resultsEl.innerHTML='<div class="search-empty">검색 결과가 없어요 🎵</div>';return;}
    resultsEl.innerHTML = '';
    data.items.forEach(item => {
      const vid = item.id.videoId;
      const title = item.snippet.title;
      const thumb = item.snippet.thumbnails.medium?.url||item.snippet.thumbnails.default.url;
      const channel = item.snippet.channelTitle;
      const div = document.createElement('div');
      div.className = 'search-result-item';
      div.style.cssText = 'position:relative;';
      div.innerHTML = `
        <img class="result-thumb" src="${escHtml(thumb)}" alt="" loading="lazy">
        <div style="flex:1;min-width:0;">
          <div class="result-title">${escHtml(title)}</div>
          <div class="result-channel">${escHtml(channel)}</div>
        </div>
        <button class="pl-btn add" style="flex-shrink:0;font-size:6px;padding:4px 6px;" data-pl-add>📁 저장</button>`;
      div.querySelector('.result-title').closest('div').parentElement.addEventListener('click', e=>{
        if(e.target.closest('[data-pl-add]')) return;
        selectSong(vid,title,thumb);
      });
      div.querySelector('[data-pl-add]').addEventListener('click', e => {
        e.stopPropagation();
        openFolderPicker({id:vid, title, thumb, channel});
      });
      resultsEl.appendChild(div);
    });
  } catch(e){resultsEl.innerHTML='<div class="search-empty">❌ 네트워크 오류</div>';}
}

function selectSong(videoId, title, thumb) {
  if (!state.me) return;
  const seatIndex = state.me.seatIndex;
  const song = {id:videoId,title,thumb};
  if (state.seats[seatIndex]) state.seats[seatIndex].song = song;
  fbUpdateSong(seatIndex, song);
  document.getElementById('search-modal').classList.remove('open');
  renderSeats();
  fbSendSystemChat(state.roomId,`${state.me.name}님이 "${title}"를 선정했습니다 🎵`);
  toast('노래 선정 완료! 🎵');
}

function plKey() { return `musicroom_pl2_${myName}`; }

function loadPL() {
  try { return JSON.parse(localStorage.getItem(plKey())) || {}; }
  catch(e) { return {}; }
}
function savePL() {
  localStorage.setItem(plKey(), JSON.stringify(myPL));
}

let myPL = loadPL();  // { "새벽감성": [{...},...], "드라이브": [...] }

// 전체 곡 수
function plTotalCount() {
  return Object.values(myPL).reduce((s, arr) => s + arr.length, 0);
}

// 폴더 목록 렌더링
function renderPlaylist() {
  const listEl = document.getElementById('pl-folder-list');
  if (!listEl) return;
  const folders = Object.keys(myPL);
  if (!folders.length) {
    listEl.innerHTML = '<div class="pl-empty">플레이리스트가 비어있어요<br>🔍 검색하거나 재생 중인 곡을<br>저장해보세요!</div>';
    return;
  }
  listEl.innerHTML = '';
  folders.forEach(folderName => {
    const songs = myPL[folderName] || [];
    const folderEl = document.createElement('div');
    folderEl.className = 'pl-folder';
    folderEl.innerHTML = `
      <div class="pl-folder-header">
        <span class="pl-folder-icon">📁</span>
        <span class="pl-folder-name">${escHtml(folderName)}</span>
        <span class="pl-folder-meta">${songs.length}곡</span>
        <span class="pl-folder-arrow">▶</span>
      </div>
      <div class="pl-folder-songs" id="folder-songs-${CSS.escape(folderName)}"></div>`;

    // 폴더 클릭 → 열기/닫기
    folderEl.querySelector('.pl-folder-header').addEventListener('click', () => {
      folderEl.classList.toggle('open');
      folderEl.querySelector('.pl-folder-icon').textContent =
        folderEl.classList.contains('open') ? '📂' : '📁';
    });

    // 곡 목록 렌더링
    const songsEl = folderEl.querySelector('.pl-folder-songs');
    if (!songs.length) {
      songsEl.innerHTML = '<div class="pl-folder-empty">아직 곡이 없어요</div>';
    } else {
      songs.forEach((song, idx) => {
        const item = document.createElement('div');
        item.className = 'pl-item';
        item.innerHTML = `
          <img class="pl-thumb" src="${escHtml(song.thumb)}" alt="" loading="lazy">
          <div class="pl-info">
            <div class="pl-title">${escHtml(song.title)}</div>
            <div class="pl-channel">${escHtml(song.channel||'')}</div>
          </div>
          <div class="pl-actions">
            <button class="pl-btn select">✅ 선정</button>
            <button class="pl-btn remove">🗑</button>
          </div>`;
        item.querySelector('.pl-btn.select').addEventListener('click', () => {
          selectSongFromPlaylist(song);
        });
        item.querySelector('.pl-btn.remove').addEventListener('click', () => {
          myPL[folderName].splice(idx, 1);
          if (!myPL[folderName].length) delete myPL[folderName];
          savePL();
          renderPlaylist();
        });
        songsEl.appendChild(item);
      });
    }
    listEl.appendChild(folderEl);
  });
}

// 특정 폴더에 곡 추가
function addToPL(song, folderName) {
  if (!folderName) return false;
  if (!myPL[folderName]) myPL[folderName] = [];
  if (myPL[folderName].find(s => s.id === song.id)) {
    toast(`"${folderName}"에 이미 있어요!`); return false;
  }
  myPL[folderName].push(song);
  savePL();
  renderPlaylist();
  toast(`📁 "${folderName}"에 저장됨`);
  return true;
}

// 폴더 선택 팝업 열기
let _folderPickerCallback = null;
function openFolderPicker(song) {
  _folderPickerCallback = (folderName) => addToPL(song, folderName);
  const listEl = document.getElementById('folder-picker-list');
  listEl.innerHTML = '';
  // 현재 방 키워드 + 내 폴더 합집합
  const roomKws = (state.keywords || []).filter(Boolean);
  const myFolders = Object.keys(myPL);
  const allFolders = [...new Set([...roomKws, ...myFolders])];

  if (!allFolders.length) {
    listEl.innerHTML = '<div style="padding:12px;font-size:12px;color:var(--text-dim);text-align:center;">키워드가 없어요.<br>아래에서 새 폴더를 만드세요!</div>';
  } else {
    allFolders.forEach(name => {
      const count = (myPL[name] || []).length;
      const item = document.createElement('div');
      item.className = 'folder-picker-item';
      item.innerHTML = `
        <span style="font-size:16px">${myPL[name] ? '📂' : '📁'}</span>
        <span class="folder-picker-item-name">${escHtml(name)}</span>
        <span class="folder-picker-item-count">${count}곡</span>`;
      item.addEventListener('click', () => {
        _folderPickerCallback(name);
        closeFolderPicker();
      });
      listEl.appendChild(item);
    });
  }
  document.getElementById('folder-picker-new-input').value = '';
  document.getElementById('folder-picker').classList.add('open');
}

function closeFolderPicker() {
  document.getElementById('folder-picker').classList.remove('open');

}

// ── TABS
function switchTab(active) {
  const tabs = ['chat','playlist','history'];
  tabs.forEach(t => {
    const btn = document.getElementById(`tab-${t}`);
    const panel = document.getElementById(`panel-${t}`);
    if (!btn || !panel) return;
    const isActive = t === active;
    btn.classList.toggle('active', isActive);
    // history는 block, 나머지는 flex (inline style로 CSS !important 우선)
    if (isActive) {
      panel.style.setProperty('display', t === 'history' ? 'block' : 'flex', 'important');
      panel.style.setProperty('flex', '1', 'important');
    } else {
      panel.style.setProperty('display', 'none', 'important');
    }
  });
  if (active === 'history') renderHistory();
  if (active === 'playlist') renderPlaylist();
}
document.getElementById('tab-chat').addEventListener('click', () => switchTab('chat'));
document.getElementById('tab-playlist').addEventListener('click', () => switchTab('playlist'));

document.getElementById('next-dj-btn').addEventListener('click',()=>{
  const others = state.seats.map((s,i)=>s?i:-1).filter(i=>i>=0&&i!==state.currentDJIndex);
  if (!others.length) return;
  // 거부 안 한 사람만 추림 (없으면 전체 허용 — 무한루프 방지)
  const eligible = others.filter(i=>!state.seats[i]?.djRefuse);
  const pool = eligible.length ? eligible : others;
  if (pool.length === 1) {
    // 후보가 한 명이면 바로 넘김
    doNextDJ(pool[0]);
  } else {
    // 여럿이면 지목 모달 열기 (모달 안에서도 거부자 클릭 불가)
    openDJRequestModal();
  }
});

// ── DJ 신청 모달 닫기
document.getElementById('dj-request-close').addEventListener('click',()=>{
  document.getElementById('dj-request-modal').classList.remove('open');
});
document.getElementById('dj-request-modal').addEventListener('click', e=>{
  if (e.target === document.getElementById('dj-request-modal'))
    document.getElementById('dj-request-modal').classList.remove('open');
});

// ── DJ 거부권 토글
document.getElementById('dj-refuse-btn').addEventListener('click',()=>{
  state.djRefuse = !state.djRefuse;
  const btn = document.getElementById('dj-refuse-btn');
  btn.classList.toggle('active', state.djRefuse);
  btn.textContent = state.djRefuse ? '✅ DJ 거부중' : '🚫 DJ 거부';
  fbSetDJRefuse(state.djRefuse);
  toast(state.djRefuse ? '🚫 DJ 거부 활성화 — 순번에서 제외됩니다' : '✅ DJ 거부 해제');
});

// ── LEAVE
document.getElementById('leave-btn').addEventListener('click',async()=>{
  if(state.roomId&&state.me&&window._fbReady){
    const{db,ref,set}=window._fb;
    const amDJ=state.seats[state.currentDJIndex]?.name===state.me.name;
    if(amDJ){
      const occupied=state.seats.map((s,i)=>s?i:-1).filter(i=>i>=0&&i!==state.me.seatIndex);
      if(occupied.length)fbUpdateDJ(occupied[0]);
    }
    await set(ref(db,`rooms/${state.roomId}/seats/seat_${state.me.seatIndex}`),null);
    fbSendSystemChat(state.roomId,`${state.me.name}님이 방을 나갔습니다 👋`);
  }
  localStorage.removeItem('musicroom_session');
  location.href='index.html';
});

// ── PAGE VISIBILITY (자리비움)
document.addEventListener('visibilitychange',()=>{
  if(!state.me||!state.roomId||!window._fbReady)return;
  const{db,ref,update}=window._fb;
  update(ref(db,`rooms/${state.roomId}/seats/seat_${state.me.seatIndex}`),{away:document.hidden});
});

// ── START
// Firebase 준비되면 입장
window.addEventListener('firebase-ready', ()=>{enterRoom();});
if (window._fbReady) enterRoom();
</script>
</body>
</html>
