<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>🎵 뮤직룸</title>
<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d0d1a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="뮤직룸">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nanum+Gothic:wght@400;700;800&display=swap');

  :root {
    --bg: #0d0d1a; --surface: #1a1a2e; --surface2: #16213e;
    --accent: #e94560; --accent2: #f5a623; --accent3: #0f3460;
    --green: #00ff88; --purple: #a855f7;
    --text: #e8e8f0; --text-dim: #8888aa;
    --pixel: 'Press Start 2P', monospace;
    --body: 'Nanum Gothic', sans-serif;
    --border: #2a2a4a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--body);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
    background-image:
      radial-gradient(ellipse at 20% 50%, rgba(168,85,247,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 20%, rgba(233,69,96,0.08) 0%, transparent 50%);
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px);
    pointer-events: none;
    z-index: 9999;
  }

  /* TOP BAR */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    background: var(--surface);
    border-bottom: 2px solid var(--border);
    gap: 8px;
    flex-wrap: wrap;
    flex-shrink: 0;
  }
  .room-logo { font-family: var(--pixel); font-size: 10px; color: var(--accent); }
  .users-bar {
    display: flex; align-items: center; gap: 8px;
    font-family: var(--pixel); font-size: 7px; color: var(--text-dim);
    overflow-x: auto; white-space: nowrap;
  }
  .user-dot::before {
    content: ''; width: 6px; height: 6px; background: var(--green);
    display: inline-block; margin-right: 4px;
    box-shadow: 0 0 6px var(--green);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.4} }
  .topbar-right { display: flex; gap: 8px; align-items: center; }
  .room-id-display {
    font-family: var(--pixel); font-size: 8px; color: var(--text-dim);
    background: var(--bg); border: 1px solid var(--border);
    padding: 5px 10px; cursor: pointer;
  }
  .room-id-display:hover { border-color: var(--accent2); color: var(--accent2); }
  .next-dj-btn {
    background: transparent; border: 2px solid var(--accent); color: var(--accent);
    padding: 6px 12px; font-family: var(--pixel); font-size: 8px;
    cursor: pointer; white-space: nowrap;
  }
  #leave-btn {
    background: var(--surface2); border: 1px solid var(--border); color: var(--text-dim);
    padding: 6px 10px; font-family: var(--pixel); font-size: 7px; cursor: pointer;
  }
  /* DJ 거부권 토글 */
  #dj-refuse-btn {
    background: transparent; border: 1px solid var(--border); color: var(--text-dim);
    padding: 6px 10px; font-family: var(--pixel); font-size: 7px; cursor: pointer; white-space: nowrap;
    transition: all 0.2s;
  }
  #dj-refuse-btn.active {
    border-color: #ff8c00; color: #ff8c00; background: rgba(255,140,0,0.1);
  }
  /* DJ 신청 모달 */
  #dj-request-modal {
    position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 200;
    display: none; align-items: center; justify-content: center; backdrop-filter: blur(4px);
  }
  #dj-request-modal.open { display: flex; }
  .dj-request-box {
    background: var(--surface); border: 2px solid var(--accent); width: 320px;
    box-shadow: 0 0 40px rgba(233,69,96,0.3), 6px 6px 0 rgba(0,0,0,0.5);
    position: relative;
  }
  .dj-request-box::before {
    content:''; position:absolute; top:-1px; left:-1px; right:-1px; height:3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
  }
  .dj-request-header {
    padding: 14px 18px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .dj-request-title { font-family: var(--pixel); font-size: 9px; color: var(--text); }
  .dj-request-close {
    background: none; border: 1px solid var(--border); color: var(--text-dim);
    width: 28px; height: 28px; cursor: pointer; font-size: 14px;
  }
  .dj-request-list { padding: 14px 18px; display: flex; flex-direction: column; gap: 8px; }
  .dj-request-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; border: 1px solid var(--border); cursor: pointer;
    transition: all 0.15s; background: var(--bg);
  }
  .dj-request-item:hover:not(.refused) { border-color: var(--accent); background: rgba(233,69,96,0.05); }
  .dj-request-item.refused { opacity: 0.4; cursor: not-allowed; border-color: #ff4444; }
  .dj-request-name { font-family: var(--pixel); font-size: 8px; color: var(--text); flex: 1; }
  .dj-request-song { font-size: 11px; color: var(--accent2); margin-top: 2px; }
  .dj-request-badge {
    font-family: var(--pixel); font-size: 6px; padding: 3px 6px;
    border: 1px solid; letter-spacing: 1px;
  }
  .dj-request-badge.refused { color: #ff4444; border-color: #ff4444; }
  .dj-request-badge.no-song { color: var(--text-dim); border-color: var(--border); }

  /* MAIN LAYOUT */
  .room-layout {
    display: grid;
    grid-template-columns: 1fr 320px;
    flex: 1;
    min-height: 0;
    height: calc(100dvh - 57px);
  }

  /* STAGE */
  .stage-area {
    display: flex; flex-direction: column;
    overflow: hidden; position: relative; min-height: 0;
  }

  .dj-indicator {
    position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
    font-family: var(--pixel); font-size: 7px; color: var(--accent);
    background: var(--surface); border: 1px solid var(--accent);
    padding: 4px 10px; z-index: 5;
    box-shadow: 0 0 12px rgba(233,69,96,0.3);
    animation: glow 2s ease-in-out infinite;
  }
  @keyframes glow { 0%,100%{box-shadow:0 0 12px rgba(233,69,96,0.3)}50%{box-shadow:0 0 20px rgba(233,69,96,0.6)} }

  /* SEATS */
  .seats-container {
    flex: 1; display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    position: relative; overflow: hidden; min-height: 0;
  }

  .seat {
    border: 1px solid var(--border);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 16px 12px; gap: 8px; position: relative;
    transition: background 0.3s;
  }
  .seat:nth-child(1){border-right:1px solid var(--border);border-bottom:1px solid var(--border);}
  .seat:nth-child(2){border-left:1px solid var(--border);border-bottom:1px solid var(--border);}
  .seat:nth-child(3){border-right:1px solid var(--border);border-top:1px solid var(--border);}
  .seat:nth-child(4){border-left:1px solid var(--border);border-top:1px solid var(--border);}

  .seat.is-dj { position: relative; overflow: hidden; }
  .seat.is-dj::before {
    content: ''; position: absolute; top: 0; left: 50%;
    transform: translateX(-50%); width: 160px; height: 100%;
    background: linear-gradient(to bottom, rgba(245,200,80,0.22) 0%, rgba(245,200,80,0.06) 50%, transparent 100%);
    clip-path: polygon(40% 0%, 60% 0%, 85% 100%, 15% 100%);
    pointer-events: none; z-index: 0;
    animation: beamPulse 2.5s ease-in-out infinite;
  }
  @keyframes beamPulse { 0%,100%{opacity:0.8}50%{opacity:1} }
  .seat.is-dj canvas.sprite {
    filter: drop-shadow(0 0 6px rgba(245,166,35,0.8)) drop-shadow(0 0 16px rgba(245,166,35,0.4));
  }
  .seat.is-me { background: rgba(0,255,136,0.04); }
  .seat.empty { opacity: 0.4; }
  .seat.is-away { opacity: 0.5; }
  .seat.is-away canvas.sprite { filter: grayscale(80%); }
  .away-badge {
    position: absolute; top: 6px; right: 6px;
    font-family: var(--pixel); font-size: 6px;
    color: var(--text-dim); background: var(--surface2);
    border: 1px solid var(--border);
    padding: 2px 5px; letter-spacing: 1px;
  }

  .seat-player-info { display:flex;flex-direction:column;align-items:center;gap:6px;position:relative;z-index:1; }
  .dj-crown { font-size:16px; display:none; animation: bob 1s ease-in-out infinite; }
  .is-dj .dj-crown { display:block; }
  @keyframes bob { 0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)} }
  .seat-name { font-family:var(--pixel);font-size:8px;color:var(--text);text-align:center; }
  .seat.is-me .seat-name { color: var(--green); }
  .seat.is-dj .seat-name { color: var(--accent); }
  .seat-song { font-size:11px;color:var(--text-dim);text-align:center;max-width:130px;line-height:1.4;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical; }
  .seat-song.has-song { color: var(--accent2); }
  .pick-song-btn {
    background:var(--accent3);border:1px solid var(--purple);color:var(--purple);
    padding:5px 10px;font-family:var(--pixel);font-size:7px;cursor:pointer;
  }
  .kick-btn {
    background:transparent;border:1px solid #ff4444;color:#ff4444;
    padding:3px 8px;font-family:var(--pixel);font-size:6px;cursor:pointer;
    letter-spacing:1px;margin-top:4px;display:block;width:fit-content;
  }
  .kick-btn:hover { background:rgba(255,68,68,0.2); }

  /* CENTER KEYWORD */
  .center-keyword {
    position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    z-index:10;width:180px;text-align:center;pointer-events:none;
  }
  .keyword-badge {
    background:var(--surface);border:3px solid var(--accent2);padding:12px 16px;
    box-shadow:0 0 30px rgba(245,166,35,0.3),6px 6px 0 rgba(0,0,0,0.5);
  }
  .keyword-label { font-family:var(--pixel);font-size:6px;color:var(--accent2);display:block;margin-bottom:6px; }
  .keyword-text { font-family:var(--pixel);font-size:11px;color:white;line-height:1.6;word-break:keep-all; }

  /* NEXT THEME */
  .next-theme-card {
    position:absolute;bottom:16px;right:16px;z-index:10;text-align:right;pointer-events:none;
  }
  .next-theme-label { font-family:var(--pixel);font-size:6px;color:var(--text-dim);display:block;margin-bottom:4px; }
  .next-theme-badge {
    background:var(--surface);border:1px solid var(--purple);padding:6px 10px;
    display:inline-block;box-shadow:0 0 10px rgba(168,85,247,0.2),3px 3px 0 rgba(0,0,0,0.4);
  }
  .next-theme-text { font-family:var(--pixel);font-size:8px;color:var(--purple);display:block; }
  .next-theme-sub { font-family:var(--pixel);font-size:5px;color:var(--text-dim);display:block;margin-top:2px; }

  /* PLAYER BAR */
  .player-bar {
    background:var(--surface2);border-top:2px solid var(--border);
    padding:10px 16px;display:flex;align-items:center;gap:12px;min-height:70px;flex-shrink:0;
  }
  .player-bar.hidden { display:none; }
  .player-thumb { width:46px;height:46px;object-fit:cover;border:2px solid var(--border);flex-shrink:0; }
  .player-info { flex:1;min-width:0; }
  .player-title { font-family:var(--pixel);font-size:8px;color:white;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px; }
  .player-dj { font-size:11px;color:var(--accent); }
  .player-controls { display:flex;gap:8px;align-items:center; }
  .ctrl-btn { background:none;border:2px solid var(--border);color:var(--text);width:34px;height:34px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all 0.15s; }
  .ctrl-btn:hover { border-color:var(--accent);color:var(--accent); }
  .ctrl-btn.play-btn { border-color:var(--accent);color:var(--accent);width:42px;height:42px;font-size:17px; }

  /* REACTION BAR */
  .reaction-bar {
    background:var(--bg);border-top:1px solid var(--border);
    padding:8px 12px;display:flex;align-items:center;gap:6px;flex-shrink:0;
    overflow-x:auto;scrollbar-width:none;
  }
  .reaction-bar::-webkit-scrollbar { display:none; }
  .reaction-label { font-family:var(--pixel);font-size:7px;color:var(--text-dim);white-space:nowrap;flex-shrink:0; }
  .reaction-btn { background:var(--surface);border:1px solid var(--border);padding:6px 8px;font-size:20px;cursor:pointer;transition:all 0.15s;flex-shrink:0; }
  .reaction-btn:hover { border-color:var(--accent2);transform:scale(1.1); }

  /* UNMUTE BAR */
  #unmute-bar {
    position:fixed;top:0;left:0;right:0;background:var(--accent);
    color:white;text-align:center;padding:12px;font-family:var(--pixel);font-size:9px;
    z-index:1000;cursor:pointer;display:none;letter-spacing:1px;
  }

  /* RIGHT PANEL */
  .right-panel {
    display:flex;flex-direction:column;background:var(--surface);
    border-left:2px solid var(--border);overflow:hidden;
  }

  /* KEYWORDS */
  .panel-section { border-bottom:2px solid var(--border);padding:14px; }
  .panel-section-title { font-family:var(--pixel);font-size:8px;color:var(--text-dim);letter-spacing:2px;margin-bottom:10px; }
  .keywords-list { display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px; }
  .keyword-tag {
    background:var(--bg);border:1px solid var(--border);color:var(--text-dim);
    padding:4px 8px;font-family:var(--pixel);font-size:7px;cursor:pointer;
  }
  .keyword-tag.active { border-color:var(--accent2);color:var(--accent2);background:rgba(245,166,35,0.1); }
  .random-btn {
    width:100%;background:transparent;border:1px solid var(--accent2);color:var(--accent2);
    padding:8px;font-family:var(--pixel);font-size:7px;cursor:pointer;margin-bottom:8px;
  }
  .keyword-input-row { display:flex;gap:6px; }
  .keyword-input-row .pixel-input { flex:1;background:var(--bg);border:2px solid var(--border);color:var(--text);padding:8px 10px;font-family:var(--body);font-size:13px;outline:none; }
  .keyword-input-row .pixel-input:focus { border-color:var(--accent); }
  .add-btn { background:transparent;border:2px solid var(--green);color:var(--green);padding:8px 12px;font-family:var(--pixel);font-size:7px;cursor:pointer;white-space:nowrap; }

  /* TABS */
  .tab-bar { display:flex;border-bottom:2px solid var(--border);flex-shrink:0; }
  .tab-btn { flex:1;background:none;border:none;color:var(--text-dim);padding:10px;font-family:var(--pixel);font-size:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px; }
  .tab-btn.active { color:var(--accent);border-bottom:2px solid var(--accent);margin-bottom:-2px; }

  /* CHAT */
  #panel-chat { flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0; }
  #panel-history { flex:1;overflow-y:auto;padding:12px;display:none; }
  .chat-messages { flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:8px;scrollbar-width:thin;scrollbar-color:var(--border) transparent; }
  .chat-messages::-webkit-scrollbar { width:4px; }
  .chat-messages::-webkit-scrollbar-thumb { background:var(--border); }
  .chat-msg { display:flex;flex-direction:column;gap:3px; }
  .chat-msg-name { font-family:var(--pixel);font-size:7px; }
  .chat-msg-time { font-size:10px;color:var(--text-dim); }
  .chat-msg-body { background:var(--bg);border:1px solid var(--border);padding:7px 10px;font-size:13px;line-height:1.5;border-radius:0 4px 4px 4px;max-width:92%;word-break:break-word; }
  .chat-msg.is-me { align-items:flex-end; }
  .chat-msg.is-me .chat-msg-body { border-radius:4px 0 4px 4px;border-color:var(--green);background:rgba(0,255,136,0.05); }
  .chat-msg.is-system .chat-msg-body { background:transparent;border:none;color:var(--text-dim);font-size:11px;text-align:center;width:100%; }
  .chat-input-area { padding:10px;border-top:2px solid var(--border);display:flex;gap:8px;flex-shrink:0; }
  .chat-input-area .pixel-input { flex:1;background:var(--bg);border:2px solid var(--border);color:var(--text);padding:8px 12px;font-family:var(--body);font-size:14px;outline:none; }
  .chat-input-area .pixel-input:focus { border-color:var(--accent); }
  .send-btn { background:var(--accent);border:none;color:white;padding:8px 14px;font-family:var(--pixel);font-size:9px;cursor:pointer; }

  /* HISTORY */
  .history-item { display:flex;gap:10px;padding:8px;border:1px solid var(--border);margin-bottom:6px; }
  .history-thumb { width:50px;height:36px;object-fit:cover;flex-shrink:0; }
  .history-title { font-size:12px;color:var(--text);margin-bottom:3px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical; }
  .history-meta { font-size:11px;color:var(--text-dim); }

  /* PLAYLIST */
  #panel-playlist {
    flex:1; display:none; flex-direction:column; overflow:hidden; min-height:0;
  }
  .playlist-toolbar {
    display:flex; gap:6px; padding:8px 10px; border-bottom:1px solid var(--border); flex-shrink:0;
  }
  .pl-search-input {
    flex:1; background:var(--bg); border:2px solid var(--border); color:var(--text);
    padding:7px 10px; font-family:var(--body); font-size:13px; outline:none;
  }
  .pl-search-input:focus { border-color:var(--purple); }
  .pl-search-btn {
    background:var(--purple); border:none; color:white;
    padding:7px 10px; font-family:var(--pixel); font-size:7px; cursor:pointer; white-space:nowrap;
  }
  .playlist-body {
    flex:1; overflow-y:auto; display:flex; flex-direction:column;
    scrollbar-width:thin; scrollbar-color:var(--border) transparent;
  }
  .playlist-body::-webkit-scrollbar { width:4px; }
  .playlist-body::-webkit-scrollbar-thumb { background:var(--border); }

  /* 검색 결과 드로어 */
  .pl-results {
    border-bottom:2px solid var(--accent3);
    display:none; flex-direction:column; flex-shrink:0;
    max-height:55%; overflow-y:auto;
  }
  .pl-results.open { display:flex; }
  .pl-results-header {
    display:flex; align-items:center; justify-content:space-between;
    padding:7px 10px; font-family:var(--pixel); font-size:7px; color:var(--text-dim);
    background:var(--surface2); position:sticky; top:0; z-index:1;
  }
  .pl-results-close {
    background:none; border:none; color:var(--text-dim); cursor:pointer; font-size:12px; padding:0;
  }

  /* 폴더(키워드) */
  .pl-folder {
    border-bottom:1px solid var(--border); flex-shrink:0;
  }
  .pl-folder-header {
    display:flex; align-items:center; gap:8px;
    padding:9px 12px; cursor:pointer; user-select:none;
    background:var(--surface2); transition:background 0.15s;
  }
  .pl-folder-header:hover { background:rgba(168,85,247,0.08); }
  .pl-folder-icon { font-size:13px; flex-shrink:0; }
  .pl-folder-name {
    font-family:var(--pixel); font-size:8px; color:var(--text); flex:1;
  }
  .pl-folder-meta {
    font-family:var(--pixel); font-size:6px; color:var(--text-dim); flex-shrink:0;
  }
  .pl-folder-arrow {
    font-size:9px; color:var(--text-dim); flex-shrink:0;
    transition:transform 0.2s;
  }
  .pl-folder.open .pl-folder-arrow { transform:rotate(90deg); }
  .pl-folder-songs {
    display:none; flex-direction:column;
    border-top:1px solid var(--border);
  }
  .pl-folder.open .pl-folder-songs { display:flex; }

  /* 곡 아이템 */
  .pl-item {
    display:flex; align-items:center; gap:8px;
    padding:7px 10px 7px 20px; border-bottom:1px solid rgba(42,42,74,0.5);
    transition:background 0.15s;
  }
  .pl-item:last-child { border-bottom:none; }
  .pl-item:hover { background:rgba(168,85,247,0.05); }
  .pl-thumb {
    width:46px; height:34px; object-fit:cover;
    border:1px solid var(--border); flex-shrink:0;
  }
  .pl-info { flex:1; min-width:0; }
  .pl-title {
    font-size:12px; font-weight:700; color:var(--text);
    overflow:hidden; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;
    margin-bottom:2px; line-height:1.4;
  }
  .pl-channel { font-size:10px; color:var(--text-dim); }
  .pl-actions { display:flex; flex-direction:column; gap:3px; flex-shrink:0; }
  .pl-btn {
    background:transparent; border:1px solid; padding:3px 6px;
    font-family:var(--pixel); font-size:6px; cursor:pointer; white-space:nowrap; line-height:1.5;
  }
  .pl-btn.select { border-color:var(--accent2); color:var(--accent2); }
  .pl-btn.select:hover { background:rgba(245,166,35,0.1); }

  /* REACTION EFFECTS */
  .emoji-particle { position:fixed;pointer-events:none;z-index:500;font-size:28px; }

  /* 기본 떠오르기 */
  @keyframes floatUp { 0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-220px) scale(0.4)} }

  /* 🎵 음표 - 위로 흘러가며 회전 */
  @keyframes musicFloat { 0%{opacity:1;transform:translateY(0) rotate(0deg) scale(1)}100%{opacity:0;transform:translateY(-260px) rotate(30deg) scale(0.3)} }

  /* ❤️ 하트 - 천천히 위로 둥실 */
  @keyframes heartFloat { 0%{opacity:1;transform:translateY(0) scale(0.5)}30%{opacity:1;transform:translateY(-80px) scale(1.2)}100%{opacity:0;transform:translateY(-280px) scale(0.6)} }

  /* 🔥 불꽃 - 아래서 솟구침 */
  @keyframes fireRise { 0%{opacity:1;transform:translateY(0) scale(1)}50%{opacity:1;transform:translateY(-100px) scale(1.4)}100%{opacity:0;transform:translateY(-240px) scale(0.2)} }

  /* ⭐ 별 - 반짝이며 커졌다 사라짐 */
  @keyframes starPop { 0%{opacity:0;transform:scale(0) rotate(0deg)}30%{opacity:1;transform:scale(1.5) rotate(180deg)}70%{opacity:1;transform:scale(1) rotate(360deg)}100%{opacity:0;transform:scale(0) rotate(540deg)} }

  /* ❄️ 얼음 - 떨어짐 */

  /* 💧 물방울 - 위에서 아래로 */
  @keyframes dropFall { 0%{opacity:1;transform:translateY(-20px) scale(1)}80%{opacity:1;transform:translateY(160px) scale(0.8)}100%{opacity:0;transform:translateY(200px) scale(0.2)} }

  /* 🎉 색종이 */
  @keyframes confettiFall { 0%{opacity:1;transform:translateY(0) rotate(0deg) scale(1)}100%{opacity:0;transform:translateY(300px) rotate(720deg) scale(0.3)} }

  /* 😂 웃음 - 크게 나타났다 튕김 */
  @keyframes laughPop { 0%{opacity:0;transform:scale(0)}20%{opacity:1;transform:scale(2)}60%{opacity:1;transform:scale(1.5)}100%{opacity:0;transform:scale(3) translateY(-60px)} }

  /* 👍 좋아요 - 여러개 튀어나옴 */
  @keyframes thumbPop { 0%{opacity:1;transform:translate(0,0) scale(0.5)}30%{opacity:1;transform:translate(var(--tx),var(--ty)) scale(1.3)}100%{opacity:0;transform:translate(var(--tx2),var(--ty2)) scale(0.2)} }

  /* 화면 오버레이 */
  .screen-overlay { position:fixed;inset:0;pointer-events:none;z-index:400;opacity:0; }
  @keyframes overlayFlash { 0%{opacity:0}20%{opacity:0.25}100%{opacity:0} }

  /* 화면 흔들기 */
  @keyframes screenShake { 0%,100%{transform:translate(0,0)}20%{transform:translate(-4px,2px)}40%{transform:translate(4px,-2px)}60%{transform:translate(-2px,4px)}80%{transform:translate(2px,-4px)} }

  /* TOAST */
  .toast-container { position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:200;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none; }
  .toast { background:var(--surface);border:1px solid var(--accent2);color:var(--accent2);padding:8px 18px;font-family:var(--pixel);font-size:8px;animation:toastIn 0.3s ease,toastOut 0.3s ease 2.7s forwards; }
  @keyframes toastIn { from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)} }
  @keyframes toastOut { from{opacity:1}to{opacity:0} }

  /* CSS ANIMATIONS */
  @keyframes animDance { 0%{transform:rotate(-12deg)translateY(0)}25%{transform:rotate(0deg)translateY(-6px)scale(1.08)}50%{transform:rotate(12deg)translateY(0)}75%{transform:rotate(0deg)translateY(-4px)}100%{transform:rotate(-12deg)translateY(0)} }
  @keyframes animJump { 0%,100%{transform:translateY(0)}30%{transform:translateY(-16px)scale(1.1)}80%{transform:translateY(-2px)} }
  @keyframes animShake { 0%,100%{transform:translateX(0)}15%{transform:translateX(-6px)rotate(-5deg)}30%{transform:translateX(6px)rotate(5deg)}60%{transform:translateX(5px)rotate(4deg)}75%{transform:translateX(-3px)} }
  @keyframes animCelebrate { 0%{transform:scale(1)rotate(0)}20%{transform:scale(1.3)rotate(-15deg)}40%{transform:scale(1.3)rotate(15deg)}100%{transform:scale(1)rotate(0)} }

  .seat.is-bobbing canvas.sprite, canvas.sprite.anim-dance { animation:animDance 0.45s ease-in-out infinite; }

// ── drawSprite
function drawSprite(canvasEl, charId, scale=3, colorId=null) {
  const colorData = colorId ? COLORS.find(c => c.id === colorId) : COLORS[0];
  const palette = colorData ? colorData.palette : COLORS[0].palette;
  const rows = SPRITE_DATA[charId] || SPRITE_DATA.cat;
  canvasEl.width = 16 * scale;
  canvasEl.height = 16 * scale;
  const ctx = canvasEl.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  const colors = {
    '0':'transparent','1':palette[0],'2':palette[1],
    '3':palette[2],'4':palette[3],'5':palette[4],
  };
  rows.forEach((row, y) => {
    [...row].forEach((px, x) => {
      if (px === '0') return;
      ctx.fillStyle = colors[px] || palette[0];
      ctx.fillRect(x * scale, y * scale, scale, scale);
    });
  });
}

// ── renderCharPicker
function renderCharPicker() {
  const container = document.getElementById('char-picker');
  if (!container) return;
  container.innerHTML = CHARS.map(c => `
    <div class="char-option ${c.id === selectedChar ? 'selected' : ''}" data-char="${c.id}">
      <canvas class="sprite" data-char="${c.id}" width="48" height="48"></canvas>
      <span class="char-name">${c.name}</span>
    </div>
  `).join('');
  container.querySelectorAll('canvas.sprite').forEach(cv => {
    drawSprite(cv, cv.dataset.char, 3, selectedColor);
  });
  container.querySelectorAll('.char-option').forEach(opt => {
    opt.addEventListener('click', () => {
      selectedChar = opt.dataset.char;
      container.querySelectorAll('.char-option').forEach(o =>
        o.classList.toggle('selected', o.dataset.char === selectedChar));
      if (typeof saveProfile === 'function') saveProfile();
    });
  });
  renderColorPicker();
}

// ── renderColorPicker
function renderColorPicker() {
  const container = document.getElementById('color-picker');
  if (!container) return;
  container.innerHTML = COLORS.map(c => `
    <div class="color-option ${c.id === selectedColor ? 'selected' : ''}"
         data-color="${c.id}" style="background:${c.hex};" title="${c.name}">

    </div>
  `).join('');
  container.querySelectorAll('.color-option').forEach(opt => {
    opt.addEventListener('click', () => {
      selectedColor = opt.dataset.color;
      container.querySelectorAll('.color-option').forEach(o =>
        o.classList.toggle('selected', o.dataset.color === selectedColor));
      document.querySelectorAll('canvas.sprite[data-char]').forEach(cv => {
        drawSprite(cv, cv.dataset.char, 3, selectedColor);
      });

    });

}

  if (!window._fbReady) return Date.now();

function fbDJPauseCurrentSong(positionSec) {
  if (!state.roomId||!window._fbReady||!isMeDJ()) return;
  const {db, ref, update, serverTimestamp} = window._fb;
  update(ref(db,`rooms/${state.roomId}/currentSong`),{
    pausePositionSec: positionSec,
    pausedAt: serverTimestamp(),
    updatedAt: Date.now(),
  });
}

function fbDJResumeCurrentSong(positionSec) {
  if (!state.roomId||!window._fbReady||!isMeDJ()) return;
  const {db, ref, update} = window._fb;
  const pos = Math.max(0, positionSec);
  getServerTimeMs().then(serverNow => {
    update(ref(db,`rooms/${state.roomId}/currentSong`),{
      serverStartAt: serverNow - pos * 1000,
      startTime: 0,
      pausePositionSec: null,
      pausedAt: null,
      updatedAt: Date.now(),
    });
  });
}

function waitYtCueable() {
  return new Promise(resolve => {
    let n = 0;
    const t = setInterval(() => {
      n++;
      try {
        if (ytPlayer && ytPlayer.getDuration && ytPlayer.getDuration() > 0) {
          clearInterval(t);
          resolve();
          return;
        }
      } catch (e) {}
      if (n > 120) { clearInterval(t); resolve(); }
    }, 50);
  });
}

function applyCurrentSongFromFirebase(cs) {
  if (!cs || !cs.id) return;
  const sig = `${cs.id}|${cs.updatedAt}|${cs.pausePositionSec}|${cs.serverStartAt}`;
  if (applyCurrentSongFromFirebase._lastSig === sig) return;
  applyCurrentSongFromFirebase._lastSig = sig;

  state.remoteCurrentSong = cs;
  state.currentSong = { id: cs.id, title: cs.title, thumb: cs.thumbnail || cs.thumb };
  document.getElementById('player-bar').classList.remove('hidden');
  document.getElementById('player-thumb').src = cs.thumbnail || '';
  document.getElementById('player-title').textContent = cs.title || '';
  document.getElementById('player-dj-name').textContent = `🎧 DJ: ${cs.djName || ''}`;
  updateMediaSession(cs.title, cs.djName, cs.thumbnail);

  const applyMutedAutoplay = () => {
    const alreadyUnmuted = localStorage.getItem('musicroom_unmuted') === 'true';
    if (alreadyUnmuted) {
      ytPlayer.unMute();
      ytPlayer.setVolume(100);
      isMuted = false;
      document.getElementById('mute-btn').textContent = '🔊';
      document.getElementById('unmute-bar').style.display = 'none';
      ytPlayer.playVideo();
    } else {
      ytPlayer.mute();
      isMuted = true;
      ytPlayer.playVideo();
      const wait = setInterval(() => {
        if (ytPlayer.getPlayerState() === 1 || ytPlayer.getPlayerState() === 3) {
          clearInterval(wait);
          document.getElementById('mute-btn').textContent = '🔇';
          document.getElementById('unmute-bar').style.display = 'block';
        }
      }, 200);
    }
  };

  const run = async () => {
    if (!ytReady || !ytPlayer) return;
    let vidNow = '';
    try {
      vidNow = ytPlayer.getVideoData?.().video_id || '';
    } catch (e) {}
    const sameClip = vidNow === cs.id;

    if (cs.pausePositionSec != null && cs.pausePositionSec >= 0) {
      if (!sameClip) ytPlayer.loadVideoById(cs.id);
      await waitYtCueable();
      ytPlayer.seekTo(cs.pausePositionSec, true);
      ytPlayer.pauseVideo();
      state.playing = false;
      const btn = document.getElementById('play-pause-btn');
      if (btn) btn.textContent = '▶';
      return;
    }

    if (!sameClip) ytPlayer.loadVideoById(cs.id);
    await waitYtCueable();
    const serverNow = await getServerTimeMs();
    const startAt = typeof cs.serverStartAt === 'number' ? cs.serverStartAt : serverNow;
    let elapsed = (serverNow - startAt) / 1000;
    if (elapsed < 0) elapsed = 0;
    ytPlayer.seekTo(elapsed, true);
    applyMutedAutoplay();
  };

  if (ytReady && ytPlayer) run();
  else {
    const w = setInterval(() => {
      if (ytReady && ytPlayer) {
        clearInterval(w);
        run();
      }
    }, 300);
  }
}

function fbAddHistory(entry) {

  push(ref(db,`rooms/${state.roomId}/history`),{...entry,ts:Date.now()});
}
// ── ENTER ROOM
async function enterRoom() {
  const {db,ref,set,get,update,onValue,push} = window._fb;
  const roomRef = ref(db,`rooms/${myRoomId}`);
  const snap = await get(roomRef);

  let seatIndex = mySeatIndex;

  if (!snap.exists()) {
    await set(roomRef,{
      createdAt: Date.now(),
      dj: { currentDJ: null, djQueue: [] },
      seats: {},
      history: {},
      songQueue: [],
    });
    seatIndex = 0;
  } else {
    const data = snap.val();
    if (!data.dj || data.dj.currentDJ === undefined) {
      const seatsObj = data.seats || {};
      const arr = [null, null, null, null];
      Object.values(seatsObj).forEach(s => {
        if (s && typeof s.seatIndex === 'number') arr[s.seatIndex] = s;
      });
      const idx = typeof data.currentDJIndex === 'number' ? data.currentDJIndex : 0;
      const djName = arr[idx]?.name ?? null;
      await update(roomRef, {
        dj: { currentDJ: djName, djQueue: [] },
        songQueue: data.songQueue || [],
      });
    }
    const seats = data.seats||{};
    const taken = Object.values(seats).map(s=>s.seatIndex);

    // 이미 같은 이름으로 자리가 있으면 그 자리로 복귀 (새로고침 대응)
    const existingSeat = Object.values(seats).find(s => s.name === myName);
    if (existingSeat) {
      seatIndex = existingSeat.seatIndex;
      await update(ref(db,`rooms/${myRoomId}/seats/seat_${seatIndex}`),{
        charId:myCharId, colorId:myColorId, away:false
      });
      state.me = {name:myName, charId:myCharId, colorId:myColorId, seatIndex};
    } else {
      // 새 자리 배정
      seatIndex = [0,1,2,3].find(i=>!taken.includes(i));
      if (seatIndex === undefined) { alert('방이 꽉 찼어요!'); location.href='index.html'; return; }
      state.me = {name:myName, charId:myCharId, colorId:myColorId, seatIndex};
      await set(ref(db,`rooms/${myRoomId}/seats/seat_${seatIndex}`),{
        name:myName,charId:myCharId,colorId:myColorId,seatIndex,song:null,joinedAt:Date.now()
      });
    }
  }

  if (!state.me) {
    state.me = {name:myName, charId:myCharId, colorId:myColorId, seatIndex};
    await set(ref(db,`rooms/${myRoomId}/seats/seat_${seatIndex}`),{
      name:myName,charId:myCharId,colorId:myColorId,seatIndex,song:null,joinedAt:Date.now()
    });
  }

  const djSnap = await get(ref(db, `rooms/${myRoomId}/dj`));
  const djV = djSnap.val() || {};
  if (!djV.currentDJ) {
    await update(ref(db, `rooms/${myRoomId}/dj`), {
      currentDJ: myName,
      djQueue: Array.isArray(djV.djQueue) ? djV.djQueue : [],
    });
  }

  // 세션 저장
  localStorage.setItem('musicroom_session', JSON.stringify({
    roomId:myRoomId, name:myName, charId:myCharId, colorId:myColorId, seatIndex, savedAt:Date.now()
  }));

  // 링크 복사
  document.getElementById('room-id-display').textContent = `📋 ROOM: ${myRoomId}`;
  document.getElementById('room-id-display').addEventListener('click',()=>{
    navigator.clipboard.writeText(`${location.origin}${location.pathname.replace('room.html','index.html')}?room=${myRoomId}`)
      .then(()=>toast('링크 복사됨! 🔗'));
  });

  // ── Firebase 리스너들
  onValue(ref(db,`rooms/${myRoomId}`), snap=>{
    if (!snap.exists()) return;
    const data = snap.val();
    if (data.dj) {
      const q = Array.isArray(data.dj.djQueue) ? data.dj.djQueue : [];
      const nextDj = { currentDJ: data.dj.currentDJ ?? null, djQueue: q };
      if (JSON.stringify(nextDj) !== JSON.stringify(state.dj)) {
        state.dj = nextDj;
        renderSeats();
        updateDJIndicator();
      }
    }
  });

  onValue(ref(db,`rooms/${myRoomId}/seats`), snap=>{
    const seats = snap.val()||{};
    const newSeats = [null,null,null,null];
    Object.values(seats).forEach(s=>{if(s&&typeof s.seatIndex==='number')newSeats[s.seatIndex]=s;});
    state.seats = newSeats;
    renderSeats(); renderUsersBar(); updateDJIndicator();
  });

  // 채팅
  onValue(ref(db,`rooms/${myRoomId}/chat`), snap=>{
    if (!snap.exists()) return;
    const container = document.getElementById('chat-messages');
    container.innerHTML = '';
    Object.values(snap.val()).sort((a,b)=>a.ts-b.ts).forEach(msg=>{
      if (msg.system) {
        const div = document.createElement('div');
        div.className = 'chat-msg is-system';
        div.innerHTML = `<div class="chat-msg-body">${escHtml(msg.text)}</div>`;
        container.appendChild(div);
      } else {
        const isMe = state.me && msg.name===state.me.name;
        const colorData = COLORS.find(c=>c.id===msg.colorId)||COLORS[0];
        const div = document.createElement('div');
        div.className = `chat-msg${isMe?' is-me':''}`;
        div.innerHTML = `<div style="display:flex;align-items:center;gap:6px;margin-bottom:2px;">
          <span class="chat-msg-name" style="color:${colorData.hex}">${escHtml(msg.name)}</span>
          <span class="chat-msg-time">${msg.time||''}</span></div>
          <div class="chat-msg-body">${escHtml(msg.text)}</div>`;
        container.appendChild(div);
      }
    });
    container.scrollTop = container.scrollHeight;
  });

  // 히스토리
  onValue(ref(db,`rooms/${myRoomId}/history`), snap=>{
    if (!snap.exists()) return;
    state.history = Object.values(snap.val()).sort((a,b)=>b.ts-a.ts);
    renderHistory();
  });

  onValue(ref(db,`rooms/${myRoomId}/currentSong`), snap=>{
    if (!snap.exists()) {
      state.remoteCurrentSong = null;
      applyCurrentSongFromFirebase._lastSig = '';
      return;
    }
    const cs = snap.val();
    applyCurrentSongFromFirebase(cs);
  });

  setInterval(async () => {
    if (!state.playing || !ytPlayer || !ytReady || !state.remoteCurrentSong) return;
    if (state.remoteCurrentSong.pausePositionSec != null && state.remoteCurrentSong.pausePositionSec >= 0) return;
    const cs = state.remoteCurrentSong;
    if (typeof cs.serverStartAt !== 'number') return;
    try {
      const serverNow = await getServerTimeMs();
      const expected = (serverNow - cs.serverStartAt) / 1000;
      const actual = ytPlayer.getCurrentTime();
      if (Math.abs(expected - actual) > 2) ytPlayer.seekTo(Math.max(0, expected), true);
    } catch (e) {}
  }, 8000);

  // 강퇴 감지
  onValue(ref(db, `rooms/${myRoomId}/kicked`), snap => {
    if (!snap.exists() || !state.me) return;
    const data = snap.val();
    if (data && data.name === state.me.name) {
      alert('강퇴됐습니다.');
      localStorage.removeItem('musicroom_session');
      location.href = 'index.html';
    }
  });

  // 리액션
  let lastReactionTs = 0;
  onValue(ref(db,`rooms/${myRoomId}/reactions`), snap=>{
    if (!snap.exists()) return;
    const items = Object.values(snap.val()).sort((a,b)=>b.ts-a.ts);
    if (!items.length||items[0].ts<=lastReactionTs) return;
    lastReactionTs = items[0].ts;
    const latest = items[0];
    spawnEmojiLocally(latest.emoji);
    if (latest.senderName) {
      const senderIdx = state.seats.findIndex(s=>s&&s.name===latest.senderName);
      if (senderIdx>=0) playCharAnim(senderIdx,'anim-'+(EMOJI_ANIM[latest.emoji]||'jump'),700);
    }
  });

  // 리듬
  onValue(ref(db,`rooms/${myRoomId}/rhythm`), snap=>{
    const rhythmData = snap.val()||{};
    state.seats.forEach((seat,idx)=>{
      if (!seat) return;
      const key = seat.name.replace(/[.#$[\]]/g,'_');
      const r = rhythmData[key];
      if (r&&r.on) {
        document.querySelector(`.seat[data-seat="${idx}"]`)?.classList.add('is-bobbing');
        playCharAnim(idx,'anim-dance');
      } else {
        document.querySelector(`.seat[data-seat="${idx}"]`)?.classList.remove('is-bobbing');
        stopCharAnim(idx);
      }
    });
  });

  fbSendSystemChat(myRoomId,`${myName}님이 입장했습니다 🎉`);
}

// ── PLAY DJ SONG
function playCurrentDJSong() {
  const djName = state.dj && state.dj.currentDJ;
  const djSeat = djName ? state.seats.find(s => s && s.name === djName) : null;
  if (!djSeat||!djSeat.song){toast('먼저 노래를 선정해주세요!');return;}
  if (!isMeDJ()) { toast('지금은 DJ만 재생할 수 있어요'); return; }
  // 플레이어 미준비 시 최대 5초 대기 후 재시도
  if (!ytReady||!ytPlayer||typeof ytPlayer.loadVideoById!=='function') {
    toast('⏳ 플레이어 준비 중...');
    let tries = 0;
    const wait = setInterval(()=>{
      tries++;
      if (ytReady && ytPlayer && typeof ytPlayer.loadVideoById==='function') {
        clearInterval(wait);
        _doPlay(djSeat.song, djSeat.name);
      } else if (tries > 75) { // 15초 대기
        clearInterval(wait);
        toast('❌ YouTube 연결 실패. 인터넷 연결을 확인하거나 새로고침 해보세요.');
      }
    }, 200);
    return;
  }
  _doPlay(djSeat.song, djSeat.name);
}

function _doPlay(song, djName) {
  fbSetCurrentSong(song, djName);
  fbAddHistory({title:song.title,thumb:song.thumb,djName,keyword:'---',time:timeStr()});
  fbSendSystemChat(state.roomId,`🎧 ${djName}DJ의 "${song.title}" 재생 시작!`);
  toast('▶ 재생 시작!');
}

// ── YOUTUBE
function _initYTPlayer() {
  ytPlayer = new YT.Player('yt-player', {
    height: '180', width: '320',
    playerVars: {autoplay:1, controls:0, rel:0, iv_load_policy:3, modestbranding:1, enablejsapi:1, origin:location.origin},
    events: {
      onReady: () => { ytReady = true; },
      onStateChange: onPlayerStateChange,
      onError: (e) => { console.warn('YT Error:', e.data); }
    }
  });
}
// API가 이미 로드됐으면 바로 초기화, 아니면 로드 완료 시 호출
window._ytInit = _initYTPlayer;
if (window._ytApiLoaded) _initYTPlayer();

let _pauseFbTimer = null;
function onPlayerStateChange(event) {
  const btn = document.getElementById('play-pause-btn');
  if (event.data===YT.PlayerState.PLAYING) {
    clearTimeout(_pauseFbTimer);
    state.playing=true; if(btn)btn.textContent='⏸';
    requestWakeLock();
    startAudioKeepAlive();
    if (isMeDJ() && state.remoteCurrentSong && state.remoteCurrentSong.pausePositionSec != null && state.remoteCurrentSong.pausePositionSec >= 0) {
      fbDJResumeCurrentSong(ytPlayer.getCurrentTime());
    }
  } else if (event.data===YT.PlayerState.PAUSED) {
    state.playing=false; if(btn)btn.textContent='▶';
    stopAudioKeepAlive();
    if (isMeDJ() && state.remoteCurrentSong && state.remoteCurrentSong.id) {
      clearTimeout(_pauseFbTimer);
      _pauseFbTimer = setTimeout(() => {
        if (!ytPlayer || ytPlayer.getPlayerState() !== YT.PlayerState.PAUSED) return;
        fbDJPauseCurrentSong(ytPlayer.getCurrentTime());
      }, 450);
    }
  } else if (event.data===YT.PlayerState.ENDED) {
    clearTimeout(_pauseFbTimer);
    state.playing=false; if(btn)btn.textContent='▶';
    stopAudioKeepAlive();
  }
}

// ── MEDIA SESSION
function updateMediaSession(title, djName, thumb) {
  if (!('mediaSession' in navigator)) return;
  navigator.mediaSession.metadata = new MediaMetadata({title, artist:`DJ: ${djName}`, artwork:thumb?[{src:thumb,sizes:'480x360',type:'image/jpeg'}]:[]});
  navigator.mediaSession.playbackState = 'playing';
  navigator.mediaSession.setActionHandler('play', () => { ytPlayer?.playVideo(); navigator.mediaSession.playbackState='playing'; });
  navigator.mediaSession.setActionHandler('pause', () => { ytPlayer?.pauseVideo(); navigator.mediaSession.playbackState='paused'; });
  navigator.mediaSession.setActionHandler('stop', () => { ytPlayer?.stopVideo(); });
  // previoustrack/nexttrack — 잠금화면 컨트롤 버튼 활성화용
  navigator.mediaSession.setActionHandler('previoustrack', null);
  navigator.mediaSession.setActionHandler('nexttrack', null);
}

// ── WAKE LOCK
// ── WAKE LOCK
let wakeLock = null;
async function requestWakeLock() {
  if (!('wakeLock' in navigator) || wakeLock) return;
  try {
    wakeLock = await navigator.wakeLock.request('screen');
    wakeLock.addEventListener('release', () => { wakeLock = null; });
  } catch(e) {}
}

// ── BACKGROUND AUDIO KEEP-ALIVE
// 안드로이드 크롬이 백그라운드에서 JS/오디오를 중단하지 못하도록
// 무음 AudioContext를 주기적으로 재생해서 "오디오 활성 탭"으로 유지
let _audioCtx = null;
let _keepAliveTimer = null;

function startAudioKeepAlive() {
  if (_keepAliveTimer) return;
  try {
    if (!_audioCtx) {
      _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (_audioCtx.state === 'suspended') _audioCtx.resume();
    _keepAliveTimer = setInterval(() => {
      if (!state.playing) return;
      try {
        // 10ms 짜리 무음 버퍼 재생 — 브라우저에 "오디오 활성" 신호
        const buf = _audioCtx.createBuffer(1, _audioCtx.sampleRate * 0.01, _audioCtx.sampleRate);
        const src = _audioCtx.createBufferSource();
        src.buffer = buf;
        src.connect(_audioCtx.destination);
        src.start();
      } catch(e) {}
    }, 20000); // 20초마다
  } catch(e) {}
}

function stopAudioKeepAlive() {
  if (_keepAliveTimer) { clearInterval(_keepAliveTimer); _keepAliveTimer = null; }
}

// visibilitychange: 복귀 시 재생 재시작 + wakeLock 재취득
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') {
    if (state.playing) requestWakeLock();
    if (ytReady && ytPlayer && state.remoteCurrentSong && state.remoteCurrentSong.pausePositionSec == null) {
      getServerTimeMs().then(serverNow => {
        const cs = state.remoteCurrentSong;
        if (!cs || typeof cs.serverStartAt !== 'number') return;
        const expected = Math.max(0, (serverNow - cs.serverStartAt) / 1000);
        try {
          ytPlayer.seekTo(expected, true);
          if (state.playing) ytPlayer.playVideo();
        } catch (e) {}
      });
    }
    if (state.playing && ytReady && ytPlayer) {
      setTimeout(() => {
        try {
          if (ytPlayer.getPlayerState() !== 1) {
            ytPlayer.playVideo();
          }
        } catch(e) {}
      }, 500);
    }
    if (_audioCtx && _audioCtx.state === 'suspended') _audioCtx.resume();
  }
});

function spawnEmojiLocally(emoji) {
  const effects = {
    '🎵': spawnMusic,
    '👍': spawnThumbs,
    '❤️': spawnHearts,
    '🔥': spawnFire,
    '⭐': spawnStars,

  if (fn) fn();

}

}

function shakeScreen() {
  document.body.style.animation = 'screenShake 0.4s ease-out';
  setTimeout(()=>document.body.style.animation='', 400);
}

function launchEmoji(emoji) {
  spawnEmojiLocally(emoji);
  if (state.me) {
    const myIdx = state.seats.findIndex(s=>s&&s.name===state.me.name);
    if (myIdx>=0) playCharAnim(myIdx,'anim-'+(EMOJI_ANIM[emoji]||'jump'),700);
  }
  if (state.roomId&&window._fbReady) {
    const {db,ref,push} = window._fb;
    push(ref(db,`rooms/${state.roomId}/reactions`),{emoji,ts:Date.now(),senderName:state.me?.name});
  }
}

// ── SONG SEARCH
function openSearchModal() {
  document.getElementById('search-modal').classList.add('open');
}
document.getElementById('modal-close').addEventListener('click',()=>document.getElementById('search-modal').classList.remove('open'));
document.getElementById('search-btn').addEventListener('click',doSearch);
document.getElementById('search-input').addEventListener('keydown',e=>{if(e.key==='Enter')doSearch();});

async function doSearch() {
  const q = document.getElementById('search-input').value.trim();
  if (!q) return;
  const resultsEl = document.getElementById('search-results');
  resultsEl.innerHTML='<div class="search-empty">🔍 검색 중...</div>';
  try {
    const url=`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(q)}&type=video&maxResults=8&key=${ytApiKey}`;
    const data = await (await fetch(url)).json();
    if (data.error){resultsEl.innerHTML=`<div class="search-empty">❌ 오류: ${data.error.message}</div>`;return;}
    if (!data.items?.length){resultsEl.innerHTML='<div class="search-empty">검색 결과가 없어요 🎵</div>';return;}
    resultsEl.innerHTML = '';
    data.items.forEach(item => {
      const vid = item.id.videoId;
      const title = item.snippet.title;
      const thumb = item.snippet.thumbnails.medium?.url||item.snippet.thumbnails.default.url;
      const channel = item.snippet.channelTitle;
      const div = document.createElement('div');
      div.className = 'search-result-item';
      div.style.cssText = 'position:relative;';
      div.innerHTML = `
        <img class="result-thumb" src="${escHtml(thumb)}" alt="" loading="lazy">
        <div style="flex:1;min-width:0;">
          <div class="result-title">${escHtml(title)}</div>
          <div class="result-channel">${escHtml(channel)}</div>
        </div>`;
      div.addEventListener('click', () => {
        selectSong(vid, title, thumb, channel);
      });
      resultsEl.appendChild(div);
    });
  } catch(e){resultsEl.innerHTML='<div class="search-empty">❌ 네트워크 오류</div>';}
}

function selectSong(videoId, title, thumb, channel = '') {
  if (!state.me) return;
  const seatIndex = state.me.seatIndex;
  const song = { id: videoId, title, thumb, channel };
  if (state.seats[seatIndex]) state.seats[seatIndex].song = song;
  fbUpdateSong(seatIndex, song);
  document.getElementById('search-modal').classList.remove('open');
  renderSeats();
  fbSendSystemChat(state.roomId,`${state.me.name}님이 "${title}"를 선정했습니다 🎵`);
  toast('노래 선정 완료! 🎵');
}

// Sprint 3: 플레이리스트·폴더 피커 재작성 예정

// ── PLAYER CONTROLS
document.getElementById('play-pause-btn').addEventListener('click',()=>{
  if (!ytPlayer||!ytReady) return;
  if (!isMeDJ()) { toast('DJ만 조작할 수 있어요'); return; }
  if (state.playing) ytPlayer.pauseVideo();
  else if (state.currentSong) ytPlayer.playVideo();
  else playCurrentDJSong();
});
document.getElementById('stop-btn').addEventListener('click',()=>{
  if (!ytPlayer||!ytReady) return;
  if (!isMeDJ()) { toast('DJ만 조작할 수 있어요'); return; }
  ytPlayer.stopVideo();
  document.getElementById('player-bar').classList.add('hidden');
  state.currentSong=null; state.playing=false;
  state.remoteCurrentSong = null;
  if (window._fbReady) {
    const {db, ref, set} = window._fb;
    set(ref(db, `rooms/${state.roomId}/currentSong`), null);
  }
  fbSendSystemChat(state.roomId,'재생이 멈췄습니다.');
});
document.getElementById('mute-btn').addEventListener('click',()=>{
  if (!ytPlayer||!ytReady) return;
  if (isMuted){ytPlayer.unMute();ytPlayer.setVolume(100);isMuted=false;document.getElementById('mute-btn').textContent='🔊';document.getElementById('mute-btn').style.color='';localStorage.setItem('musicroom_unmuted','true');document.getElementById('unmute-bar').style.display='none';}
  else{ytPlayer.mute();isMuted=true;document.getElementById('mute-btn').textContent='🔇';document.getElementById('mute-btn').style.color='var(--accent)';}
});

// ── CHAT UI
// 채팅 입력창 자동 높이
const chatInput = document.getElementById('chat-input');
chatInput.addEventListener('input', () => {
  chatInput.style.height = 'auto';
  chatInput.style.height = Math.min(chatInput.scrollHeight, 80) + 'px';
});

document.getElementById('send-btn').addEventListener('click', () => {
  sendChat();
  // 키보드 유지: 포커스 다시 설정
  chatInput.focus();
});

chatInput.addEventListener('keydown', e => {
  // PC: 엔터 전송 / 모바일: 엔터 줄바꿈
  const isMobile = /Android|iPhone|iPad/i.test(navigator.userAgent);
  if (e.key === 'Enter' && !e.shiftKey && !isMobile) {
    e.preventDefault();
    sendChat();
  }
  // 모바일은 기본 엔터(줄바꿈) 동작 허용
});

function sendChat() {
  const input = document.getElementById('chat-input');
  const msg = input.value.trim();
  if (!msg || !state.me) return;
  fbSendChat(msg);
  input.value = '';
  input.style.height = 'auto';
}

// ── TABS
function switchTab(active) {
  const tabs = ['chat','history'];
  tabs.forEach(t => {
    const btn = document.getElementById(`tab-${t}`);
    const panel = document.getElementById(`panel-${t}`);
    if (!btn || !panel) return;
    const isActive = t === active;
    btn.classList.toggle('active', isActive);
    if (isActive) {
      panel.style.setProperty('display', t === 'history' ? 'block' : 'flex', 'important');
      panel.style.setProperty('flex', '1', 'important');
    } else {
      panel.style.setProperty('display', 'none', 'important');
    }
  });
  if (active === 'history') renderHistory();
}
document.getElementById('tab-chat').addEventListener('click', () => switchTab('chat'));
document.getElementById('tab-history').addEventListener('click', () => switchTab('history'));

// ── REACTIONS
document.querySelectorAll('.reaction-btn').forEach(btn=>{
  btn.addEventListener('click',()=>launchEmoji(btn.dataset.emoji));
});

// ── LEAVE
document.getElementById('leave-btn').addEventListener('click',async()=>{
  if(state.roomId&&state.me&&window._fbReady){
    const{db,ref,set,get,update}=window._fb;
    if(isMeDJ()){
      const djSnap = await get(ref(db, `rooms/${state.roomId}/dj`));
      const d = djSnap.val() || { djQueue: [] };
      let nextDJ = (d.djQueue && d.djQueue[0]) || null;
      let newQueue = [...(d.djQueue || [])];
      if (nextDJ) {
        newQueue = newQueue.slice(1);
      } else {
        const others = state.seats.filter(s => s && s.name !== state.me.name).map(s => s.name);
        nextDJ = others[0] || null;
      }
      await update(ref(db, `rooms/${state.roomId}/dj`), { currentDJ: nextDJ, djQueue: newQueue });
    }
    await set(ref(db,`rooms/${state.roomId}/seats/seat_${state.me.seatIndex}`),null);
    fbSendSystemChat(state.roomId,`${state.me.name}님이 방을 나갔습니다 👋`);
  }
  localStorage.removeItem('musicroom_session');
  location.href='index.html';
});

// ── PAGE VISIBILITY (자리비움)
document.addEventListener('visibilitychange',()=>{
  if(!state.me||!state.roomId||!window._fbReady)return;
  const{db,ref,update}=window._fb;
  update(ref(db,`rooms/${state.roomId}/seats/seat_${state.me.seatIndex}`),{away:document.hidden});
});

// ── SERVICE WORKER 등록
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js', { scope: '/music-room/' })
    .then(reg => console.log('SW registered:', reg.scope))
    .catch(err => console.warn('SW failed:', err));
}

// SW keep-alive ping — 백그라운드에서 SW가 종료되지 않도록 30초마다 ping
setInterval(() => {
  if (!navigator.serviceWorker.controller) return;
  const mc = new MessageChannel();
  navigator.serviceWorker.controller.postMessage('keepalive', [mc.port2]);
}, 30000);

// ── START
// Firebase 준비되면 입장
window.addEventListener('firebase-ready', ()=>{enterRoom();});
if (window._fbReady) enterRoom();
</script>
