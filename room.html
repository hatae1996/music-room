<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>🎵 뮤직룸</title>
<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d0d1a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="뮤직룸">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nanum+Gothic:wght@400;700;800&display=swap');

  :root {
    --bg: #0d0d1a; --surface: #1a1a2e; --surface2: #16213e;
    --accent: #e94560; --accent2: #f5a623; --accent3: #0f3460;
    --green: #00ff88; --purple: #a855f7;
    --text: #e8e8f0; --text-dim: #8888aa;
    --pixel: 'Press Start 2P', monospace;
    --body: 'Nanum Gothic', sans-serif;
    --border: #2a2a4a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  button, .ctrl-btn, .pick-song-btn, .char-option, .color-option {
    touch-action: manipulation;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--body);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
    background-image:
      radial-gradient(ellipse at 20% 50%, rgba(168,85,247,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 20%, rgba(233,69,96,0.08) 0%, transparent 50%);
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px);
    pointer-events: none;
    z-index: 9999;
  }

  /* TOP BAR */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    background: var(--surface);
    border-bottom: 2px solid var(--border);
    gap: 8px;
    flex-wrap: wrap;
    flex-shrink: 0;
  }
  .room-logo { font-family: var(--pixel); font-size: 10px; color: var(--accent); }
  .users-bar {
    display: flex; align-items: center; gap: 8px;
    font-family: var(--pixel); font-size: 7px; color: var(--text-dim);
    overflow-x: auto; white-space: nowrap;
  }
  .user-dot::before {
    content: ''; width: 6px; height: 6px; background: var(--green);
    display: inline-block; margin-right: 4px;
    box-shadow: 0 0 6px var(--green);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.4} }
  .topbar-right { display: flex; gap: 8px; align-items: center; }
  .room-id-display {
    font-family: var(--pixel); font-size: 8px; color: var(--text-dim);
    background: var(--bg); border: 1px solid var(--border);
    padding: 5px 10px; cursor: pointer;
  }
  .room-id-display:hover { border-color: var(--accent2); color: var(--accent2); }
  .next-dj-btn {
    background: transparent; border: 2px solid var(--accent); color: var(--accent);
    padding: 6px 12px; font-family: var(--pixel); font-size: 8px;
    cursor: pointer; white-space: nowrap;
  }
  #leave-btn {
    background: var(--surface2); border: 1px solid var(--border); color: var(--text-dim);
    padding: 6px 10px; font-family: var(--pixel); font-size: 7px; cursor: pointer;
  }
  /* DJ 거부권 토글 */
  #dj-refuse-btn {
    background: transparent; border: 1px solid var(--border); color: var(--text-dim);
    padding: 6px 10px; font-family: var(--pixel); font-size: 7px; cursor: pointer; white-space: nowrap;
    transition: all 0.2s;
  }
  #dj-refuse-btn.active {
    border-color: #ff8c00; color: #ff8c00; background: rgba(255,140,0,0.1);
  }
  /* DJ 신청 모달 */
  #dj-request-modal {
    position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 200;
    display: none; align-items: center; justify-content: center; backdrop-filter: blur(4px);
  }
  #dj-request-modal.open { display: flex; }
  .dj-request-box {
    background: var(--surface); border: 2px solid var(--accent); width: 320px;
    box-shadow: 0 0 40px rgba(233,69,96,0.3), 6px 6px 0 rgba(0,0,0,0.5);
    position: relative;
  }
  .dj-request-box::before {
    content:''; position:absolute; top:-1px; left:-1px; right:-1px; height:3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
  }
  .dj-request-header {
    padding: 14px 18px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .dj-request-title { font-family: var(--pixel); font-size: 9px; color: var(--text); }
  .dj-request-close {
    background: none; border: 1px solid var(--border); color: var(--text-dim);
    width: 28px; height: 28px; cursor: pointer; font-size: 14px;
  }
  .dj-request-list { padding: 14px 18px; display: flex; flex-direction: column; gap: 8px; }
  .dj-request-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; border: 1px solid var(--border); cursor: pointer;
    transition: all 0.15s; background: var(--bg);
  }
  .dj-request-item:hover:not(.refused) { border-color: var(--accent); background: rgba(233,69,96,0.05); }
  .dj-request-item.refused { opacity: 0.4; cursor: not-allowed; border-color: #ff4444; }
  .dj-request-name { font-family: var(--pixel); font-size: 8px; color: var(--text); flex: 1; }
  .dj-request-song { font-size: 11px; color: var(--accent2); margin-top: 2px; }
  .dj-request-badge {
    font-family: var(--pixel); font-size: 6px; padding: 3px 6px;
    border: 1px solid; letter-spacing: 1px;
  }
  .dj-request-badge.refused { color: #ff4444; border-color: #ff4444; }
  .dj-request-badge.no-song { color: var(--text-dim); border-color: var(--border); }

  /* MAIN LAYOUT */
  .room-layout {
    display: grid;
    grid-template-columns: 1fr 320px;
    flex: 1;
    min-height: 0;
    height: calc(100dvh - 57px);
  }

  /* STAGE */
  .stage-area {
    display: flex; flex-direction: column;
    overflow: hidden; position: relative; min-height: 0;
  }

  .dj-indicator {
    position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
    font-family: var(--pixel); font-size: 7px; color: var(--accent);
    background: var(--surface); border: 1px solid var(--accent);
    padding: 4px 10px; z-index: 5;
    box-shadow: 0 0 12px rgba(233,69,96,0.3);
    animation: glow 2s ease-in-out infinite;
  }
  @keyframes glow { 0%,100%{box-shadow:0 0 12px rgba(233,69,96,0.3)}50%{box-shadow:0 0 20px rgba(233,69,96,0.6)} }

  /* ROOM STAGE — 2×2 캐릭터 칸 + 가운데 겹침 DJ룸 (와이어프레임과 동일) */
  .room-stage {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 10px;
    position: relative;
    overflow: visible;
    min-height: 260px;
    padding: 10px;
    align-content: stretch;
  }
  .seat[data-seat="0"] { grid-column: 1; grid-row: 1; z-index: 1; }
  .seat[data-seat="1"] { grid-column: 2; grid-row: 1; z-index: 1; }
  .seat[data-seat="2"] { grid-column: 1; grid-row: 2; z-index: 1; }
  .seat[data-seat="3"] { grid-column: 2; grid-row: 2; z-index: 1; }

  .dj-room {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    width: clamp(188px, 44%, 290px);
    max-width: calc(100% - 20px);
    max-height: min(88%, 400px);
    z-index: 4;
    border: 3px solid var(--accent3);
    border-radius: 10px;
    background: linear-gradient(180deg, var(--surface2) 0%, var(--surface) 100%);
    box-shadow:
      0 0 0 1px rgba(0,0,0,0.4),
      0 12px 40px rgba(0,0,0,0.45),
      0 0 24px rgba(168,85,247,0.15);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 10px;
    gap: 6px;
    min-height: 0;
    overflow-x: hidden;
    overflow-y: auto;
    transition: box-shadow 0.3s, border-color 0.3s;
  }
  .dj-room.dj-booth-glow {
    animation: djBoothGlow 0.85s ease-out;
  }
  @keyframes djBoothGlow {
    0% { box-shadow: 0 0 0 rgba(245,166,35,0); border-color: var(--border); }
    35% { box-shadow: 0 0 28px rgba(245,166,35,0.55); border-color: var(--accent2); }
    100% { box-shadow: 0 0 0 rgba(245,166,35,0); border-color: var(--border); }
  }

  .dj-room-empty, .dj-room-active {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    flex: 1;
    min-height: 0;
  }
  .dj-room-title {
    font-family: var(--pixel);
    font-size: 8px;
    color: var(--accent2);
    letter-spacing: 2px;
  }
  .dj-room-hint {
    font-family: var(--pixel);
    font-size: 7px;
    color: var(--text-dim);
    text-align: center;
    line-height: 2;
  }
  #dj-char-canvas {
    image-rendering: pixelated;
    flex-shrink: 0;
  }
  .dj-nick {
    font-family: var(--pixel);
    font-size: 8px;
    color: var(--accent);
    text-align: center;
  }
  .dj-controls {
    display: none;
    flex-wrap: wrap;
    gap: 6px;
    justify-content: center;
    width: 100%;
  }
  .dj-controls button {
    background: var(--surface2);
    border: 2px solid var(--border);
    color: var(--text);
    padding: 6px 10px;
    font-family: var(--pixel);
    font-size: 6px;
    cursor: pointer;
  }
  .dj-controls button:hover {
    border-color: var(--accent);
    color: var(--accent);
  }
  .now-playing {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px;
    background: var(--bg);
    border: 1px solid var(--border);
    margin-top: auto;
  }
  .now-playing #song-thumb {
    width: 56px; height: 40px; object-fit: cover;
    border: 1px solid var(--border); flex-shrink: 0;
  }
  .song-info { flex: 1; min-width: 0; }
  #song-title {
    font-family: var(--pixel);
    font-size: 7px;
    color: var(--text);
    margin-bottom: 4px;
    line-height: 1.5;
    word-break: break-word;
  }
  #song-channel { font-size: 10px; color: var(--text-dim); }
  .dj-queue-row {
    width: 100%;
    font-family: var(--pixel);
    font-size: 5px;
    color: var(--text-dim);
    text-align: center;
    line-height: 1.7;
    padding: 6px 8px 0;
    border-top: 1px solid var(--border);
    margin-top: 4px;
  }

  #save-current-btn {
    background: transparent; border: 2px solid var(--purple); color: var(--purple);
    padding: 6px 10px; font-size: 16px; line-height: 1; cursor: pointer; flex-shrink: 0;
    border-radius: 2px;
  }
  #save-current-btn:hover:not(:disabled) { background: rgba(168,85,247,0.15); }
  #save-current-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  .queue-panel {
    width: 100%;
    margin-top: 6px;
    border: 1px solid var(--border);
    background: var(--bg);
    font-family: var(--body);
    font-size: 11px;
  }
  .queue-panel-header {
    display: flex; align-items: center; gap: 8px; padding: 6px 8px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .queue-toggle-btn {
    background: var(--surface2); border: 2px solid var(--border); color: var(--text);
    padding: 4px 8px; font-family: var(--pixel); font-size: 6px; cursor: pointer;
  }
  .queue-toggle-btn:hover { border-color: var(--accent); }
  .queue-summary { font-family: var(--pixel); font-size: 6px; color: var(--text-dim); }
  .queue-panel-body { padding: 8px; border-top: 1px solid var(--border); }
  .queue-panel-body.collapsed { display: none; }
  #queue-list { margin: 0; padding-left: 18px; max-height: 140px; overflow-y: auto; }
  #queue-list li { margin-bottom: 4px; color: var(--text-dim); }
  #queue-list li.is-current { color: var(--accent2); font-weight: 700; }
  .queue-actions { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
  .queue-actions button {
    background: var(--surface2); border: 2px solid var(--border); color: var(--text);
    padding: 5px 10px; font-family: var(--pixel); font-size: 6px; cursor: pointer;
  }
  .queue-actions button:not(:disabled):hover { border-color: var(--purple); }
  .queue-actions button:disabled { opacity: 0.4; cursor: not-allowed; }

  .pl-play-all-btn {
    background: transparent; border: 1px solid var(--accent2); color: var(--accent2);
    padding: 4px 8px; font-family: var(--pixel); font-size: 6px; cursor: pointer; flex-shrink: 0;
  }
  .pl-play-all-btn:hover:not(:disabled) { background: rgba(245,166,35,0.12); }
  .pl-play-all-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .seat {
    border: 1px solid var(--border);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 16px 12px; gap: 8px; position: relative;
    transition: background 0.3s;
    background: var(--bg);
  }
  .seat.is-dj-home canvas.sprite {
    opacity: 0.38;
    filter: grayscale(35%);
  }
  .dj-home-badge {
    font-family: var(--pixel);
    font-size: 6px;
    color: var(--accent2);
    margin-top: 2px;
    letter-spacing: 1px;
  }
  .seat.dj-seat-enter-anim .seat-player-info {
    animation: djSeatToBooth 0.5s ease forwards;
  }
  @keyframes djSeatToBooth {
    0% { opacity: 1; transform: translate(0, 0) scale(1); }
    40% { opacity: 0.2; transform: translate(var(--dj-slide-x, 0), var(--dj-slide-y, -12px)) scale(0.85); }
    100% { opacity: 1; transform: translate(0, 0) scale(1); }
  }
  .seat.dj-seat-return-anim .seat-player-info {
    animation: djSeatFromBooth 0.5s ease forwards;
  }
  @keyframes djSeatFromBooth {
    0% { opacity: 0.35; transform: scale(0.9); }
    100% { opacity: 1; transform: scale(1); }
  }

  .dj-apply-btn {
    margin-top: 6px;
    background: var(--surface2);
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 5px 10px;
    font-family: var(--pixel);
    font-size: 6px;
    cursor: pointer;
    white-space: nowrap;
  }
  .dj-apply-btn:hover { border-color: var(--accent2); color: var(--accent2); }
  .dj-wait-label {
    font-family: var(--pixel);
    font-size: 6px;
    color: var(--accent2);
    margin-top: 6px;
    text-align: center;
    line-height: 1.5;
  }
  .seat.is-me { background: rgba(0,255,136,0.04); }
  .seat.empty { opacity: 0.4; }
  .seat.is-away { opacity: 0.5; }
  .seat.is-away canvas.sprite { filter: grayscale(80%); }
  .away-badge {
    position: absolute; top: 6px; right: 6px;
    font-family: var(--pixel); font-size: 6px;
    color: var(--text-dim); background: var(--surface2);
    border: 1px solid var(--border);
    padding: 2px 5px; letter-spacing: 1px;
  }

  .seat-player-info { display:flex;flex-direction:column;align-items:center;gap:6px;position:relative;z-index:1; }
  .seat-name { font-family:var(--pixel);font-size:8px;color:var(--text);text-align:center; }
  .seat.is-me .seat-name { color: var(--green); }
  .seat.is-dj-home .seat-name { color: var(--accent2); }
  .seat-song { font-size:11px;color:var(--text-dim);text-align:center;max-width:130px;line-height:1.4;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical; }
  .seat-song.has-song { color: var(--accent2); }
  .pick-song-btn {
    background:var(--accent3);border:1px solid var(--purple);color:var(--purple);
    padding:5px 10px;font-family:var(--pixel);font-size:7px;cursor:pointer;
  }
  .kick-btn {
    background:transparent;border:1px solid #ff4444;color:#ff4444;
    padding:3px 8px;font-family:var(--pixel);font-size:6px;cursor:pointer;
    letter-spacing:1px;margin-top:4px;display:block;width:fit-content;
  }
  .kick-btn:hover { background:rgba(255,68,68,0.2); }

  /* CENTER KEYWORD */
  .center-keyword {
    position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    z-index:10;width:180px;text-align:center;pointer-events:none;
  }
  .keyword-badge {
    background:var(--surface);border:3px solid var(--accent2);padding:12px 16px;
    box-shadow:0 0 30px rgba(245,166,35,0.3),6px 6px 0 rgba(0,0,0,0.5);
  }
  .keyword-label { font-family:var(--pixel);font-size:6px;color:var(--accent2);display:block;margin-bottom:6px; }
  .keyword-text { font-family:var(--pixel);font-size:11px;color:white;line-height:1.6;word-break:keep-all; }

  /* NEXT THEME */
  .next-theme-card {
    position:absolute;bottom:16px;right:16px;z-index:10;text-align:right;pointer-events:none;
  }
  .next-theme-label { font-family:var(--pixel);font-size:6px;color:var(--text-dim);display:block;margin-bottom:4px; }
  .next-theme-badge {
    background:var(--surface);border:1px solid var(--purple);padding:6px 10px;
    display:inline-block;box-shadow:0 0 10px rgba(168,85,247,0.2),3px 3px 0 rgba(0,0,0,0.4);
  }
  .next-theme-text { font-family:var(--pixel);font-size:8px;color:var(--purple);display:block; }
  .next-theme-sub { font-family:var(--pixel);font-size:5px;color:var(--text-dim);display:block;margin-top:2px; }

  /* PLAYER BAR */
  .player-bar {
    background:var(--surface2);border-top:2px solid var(--border);
    padding:10px 16px;display:flex;align-items:center;gap:12px;min-height:70px;flex-shrink:0;
  }
  .player-bar.hidden { display:none; }
  .player-thumb { width:46px;height:46px;object-fit:cover;border:2px solid var(--border);flex-shrink:0; }
  .player-info { flex:1;min-width:0; }
  .player-title { font-family:var(--pixel);font-size:8px;color:white;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px; }
  .player-dj { font-size:11px;color:var(--accent); }
  .player-controls { display:flex;gap:8px;align-items:center; }
  .ctrl-btn { background:none;border:2px solid var(--border);color:var(--text);width:34px;height:34px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all 0.15s; }
  .ctrl-btn:hover { border-color:var(--accent);color:var(--accent); }
  .ctrl-btn.play-btn { border-color:var(--accent);color:var(--accent);width:42px;height:42px;font-size:17px; }

  /* REACTION BAR */
  .reaction-bar {
    background:var(--bg);border-top:1px solid var(--border);
    padding:8px 12px;display:flex;align-items:center;gap:6px;flex-shrink:0;
    overflow-x:auto;scrollbar-width:none;
  }
  .reaction-bar::-webkit-scrollbar { display:none; }
  .reaction-label { font-family:var(--pixel);font-size:7px;color:var(--text-dim);white-space:nowrap;flex-shrink:0; }
  .reaction-btn { background:var(--surface);border:1px solid var(--border);padding:6px 8px;font-size:20px;cursor:pointer;transition:all 0.15s;flex-shrink:0; }
  .reaction-btn:hover { border-color:var(--accent2);transform:scale(1.1); }

  /* UNMUTE BAR */
  #unmute-bar {
    position:fixed;top:0;left:0;right:0;background:var(--accent);
    color:white;text-align:center;padding:12px;font-family:var(--pixel);font-size:9px;
    z-index:1000;cursor:pointer;display:none;letter-spacing:1px;
  }

  /* RIGHT PANEL */
  .right-panel {
    display:flex;flex-direction:column;background:var(--surface);
    border-left:2px solid var(--border);overflow:hidden;
    min-height:0;
  }

  /* KEYWORDS */
  .panel-section { border-bottom:2px solid var(--border);padding:14px; }
  .panel-section-title { font-family:var(--pixel);font-size:8px;color:var(--text-dim);letter-spacing:2px;margin-bottom:10px; }
  .keywords-list { display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px; }
  .keyword-tag {
    background:var(--bg);border:1px solid var(--border);color:var(--text-dim);
    padding:4px 8px;font-family:var(--pixel);font-size:7px;cursor:pointer;
  }
  .keyword-tag.active { border-color:var(--accent2);color:var(--accent2);background:rgba(245,166,35,0.1); }
  .random-btn {
    width:100%;background:transparent;border:1px solid var(--accent2);color:var(--accent2);
    padding:8px;font-family:var(--pixel);font-size:7px;cursor:pointer;margin-bottom:8px;
  }
  .keyword-input-row { display:flex;gap:6px; }
  .keyword-input-row .pixel-input { flex:1;background:var(--bg);border:2px solid var(--border);color:var(--text);padding:8px 10px;font-family:var(--body);font-size:13px;outline:none; }
  .keyword-input-row .pixel-input:focus { border-color:var(--accent); }
  .add-btn { background:transparent;border:2px solid var(--green);color:var(--green);padding:8px 12px;font-family:var(--pixel);font-size:7px;cursor:pointer;white-space:nowrap; }

  /* TABS */
  .tab-bar { display:flex;border-bottom:2px solid var(--border);flex-shrink:0; }
  .tab-btn { flex:1;background:none;border:none;color:var(--text-dim);padding:10px;font-family:var(--pixel);font-size:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px; }
  .tab-btn.active { color:var(--accent);border-bottom:2px solid var(--accent);margin-bottom:-2px; }
  @keyframes chat-tab-ping {
    0%, 100% { box-shadow: 0 0 0 0 rgba(233, 69, 96, 0); color: var(--accent2); }
    50% { box-shadow: 0 0 12px rgba(233, 69, 96, 0.5); color: var(--accent); }
  }
  .tab-btn#tab-chat.has-chat-ping:not(.active) {
    animation: chat-tab-ping 1.2s ease-in-out infinite;
  }

  /* CHAT */
  #panel-chat { flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0; }
  #panel-history { flex:1;overflow-y:auto;padding:12px;display:none; }
  .chat-messages { flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:8px;scrollbar-width:thin;scrollbar-color:var(--border) transparent; }
  .chat-messages::-webkit-scrollbar { width:4px; }
  .chat-messages::-webkit-scrollbar-thumb { background:var(--border); }
  .chat-msg { display:flex;flex-direction:column;gap:3px; }
  .chat-msg-name { font-family:var(--pixel);font-size:7px; }
  .chat-msg-time { font-size:10px;color:var(--text-dim); }
  .chat-msg-body { background:var(--bg);border:1px solid var(--border);padding:7px 10px;font-size:13px;line-height:1.5;border-radius:0 4px 4px 4px;max-width:92%;word-break:break-word; }
  .chat-msg.is-me { align-items:flex-end; }
  .chat-msg.is-me .chat-msg-body { border-radius:4px 0 4px 4px;border-color:var(--green);background:rgba(0,255,136,0.05); }
  .chat-msg.is-system .chat-msg-body { background:transparent;border:none;color:var(--text-dim);font-size:11px;text-align:center;width:100%; }
  .chat-msg.is-past-log .chat-msg-body { opacity:0.72; }
  .chat-msg.is-past-log .chat-msg-name { opacity:0.85; }
  .chat-dl-btn {
    flex-shrink:0; background:var(--surface2); border:2px solid var(--border); color:var(--text-dim);
    width:40px; min-width:40px; padding:6px 4px; font-size:18px; line-height:1; cursor:pointer;
    font-family:var(--body);
  }
  .chat-dl-btn:hover { border-color:var(--accent2); color:var(--accent2); }
  .chat-input-area { padding:10px;border-top:2px solid var(--border);display:flex;gap:8px;flex-shrink:0;align-items:flex-end; }
  .chat-input-area .pixel-input { flex:1;background:var(--bg);border:2px solid var(--border);color:var(--text);padding:8px 12px;font-family:var(--body);font-size:14px;outline:none; }
  .chat-input-area .pixel-input:focus { border-color:var(--accent); }
  .send-btn { background:var(--accent);border:none;color:white;padding:8px 14px;font-family:var(--pixel);font-size:9px;cursor:pointer; }

  /* 채팅 — OS 팝업 알림 토글 (뮤직룸 픽셀 UI) */
  .chat-notify-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding: 8px 10px;
    border-top: 2px solid var(--border);
    background: linear-gradient(180deg, rgba(15, 52, 96, 0.35) 0%, var(--surface2) 55%, var(--bg) 100%);
    flex-shrink: 0;
    position: relative;
    box-shadow: inset 0 1px 0 rgba(168, 85, 247, 0.12);
  }
  .chat-notify-row::before {
    content: '';
    position: absolute;
    top: 0;
    left: 8px;
    right: 8px;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--purple), var(--accent), var(--accent2), transparent);
    opacity: 0.45;
    pointer-events: none;
  }
  .chat-notify-label-wrap {
    display: flex;
    flex-direction: column;
    gap: 3px;
    min-width: 0;
  }
  .chat-notify-title {
    font-family: var(--pixel);
    font-size: 7px;
    color: var(--accent2);
    letter-spacing: 1px;
    text-shadow: 0 0 12px rgba(245, 166, 35, 0.25);
  }
  .chat-notify-hint {
    font-size: 10px;
    color: var(--text-dim);
    line-height: 1.35;
  }
  .chat-notify-switch {
    cursor: pointer;
    display: block;
    width: 50px;
    height: 28px;
    flex-shrink: 0;
    position: relative;
  }
  .chat-notify-switch input {
    opacity: 0;
    width: 0;
    height: 0;
    position: absolute;
  }
  .chat-notify-slider {
    position: absolute;
    inset: 0;
    background: var(--bg);
    border: 2px solid var(--border);
    box-shadow: 4px 4px 0 rgba(0, 0, 0, 0.45);
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .chat-notify-slider::before {
    content: '';
    position: absolute;
    width: 18px;
    height: 18px;
    left: 4px;
    top: 50%;
    transform: translateY(-50%);
    background: var(--text-dim);
    border: 2px solid var(--border);
    transition: transform 0.18s ease, background 0.18s, border-color 0.18s, box-shadow 0.18s;
    box-shadow: 2px 2px 0 rgba(0, 0, 0, 0.35);
  }
  .chat-notify-switch input:checked + .chat-notify-slider {
    border-color: var(--green);
    box-shadow: 0 0 14px rgba(0, 255, 136, 0.22), 4px 4px 0 rgba(0, 0, 0, 0.45);
  }
  .chat-notify-switch input:checked + .chat-notify-slider::before {
    transform: translate(22px, -50%);
    background: var(--green);
    border-color: rgba(0, 255, 136, 0.6);
    box-shadow: 0 0 10px rgba(0, 255, 136, 0.45), 2px 2px 0 rgba(0, 0, 0, 0.35);
  }
  .chat-notify-switch input:focus-visible + .chat-notify-slider {
    outline: 2px solid var(--accent2);
    outline-offset: 3px;
  }

  /* HISTORY */
  .history-item { display:flex;gap:10px;padding:8px;border:1px solid var(--border);margin-bottom:6px; }
  .history-thumb { width:50px;height:36px;object-fit:cover;flex-shrink:0; }
  .history-title { font-size:12px;color:var(--text);margin-bottom:3px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical; }
  .history-meta { font-size:11px;color:var(--text-dim); }

  /* PLAYLIST */
  #panel-playlist {
    flex:1; display:none; flex-direction:column; overflow:hidden; min-height:0;
  }
  .playlist-toolbar {
    display:flex; flex-wrap:wrap; align-items:center; gap:6px; padding:8px 10px; border-bottom:1px solid var(--border); flex-shrink:0;
  }
  .pl-sort-wrap {
    display:flex; flex-wrap:wrap; gap:4px; align-items:center; margin-left:auto;
  }
  .pl-sort-btn {
    background:var(--surface2); border:1px solid var(--border); color:var(--text-dim);
    padding:5px 8px; font-family:var(--pixel); font-size:6px; cursor:pointer; white-space:nowrap;
  }
  .pl-sort-btn:hover { border-color:var(--purple); color:var(--text); }
  .pl-sort-btn.active { border-color:var(--purple); color:var(--accent); }
  .pl-search-input {
    flex:1; background:var(--bg); border:2px solid var(--border); color:var(--text);
    padding:7px 10px; font-family:var(--body); font-size:13px; outline:none;
  }
  .pl-search-input:focus { border-color:var(--purple); }
  .pl-search-btn {
    background:var(--purple); border:none; color:white;
    padding:7px 10px; font-family:var(--pixel); font-size:7px; cursor:pointer; white-space:nowrap;
  }
  .playlist-body {
    flex:1; overflow-y:auto; display:flex; flex-direction:column;
    scrollbar-width:thin; scrollbar-color:var(--border) transparent;
  }
  .playlist-body::-webkit-scrollbar { width:4px; }
  .playlist-body::-webkit-scrollbar-thumb { background:var(--border); }

  /* 검색 결과 드로어 */
  .pl-results {
    border-bottom:2px solid var(--accent3);
    display:none; flex-direction:column; flex-shrink:0;
    max-height:55%; overflow-y:auto;
  }
  .pl-results.open { display:flex; }
  .pl-results-header {
    display:flex; align-items:center; justify-content:space-between;
    padding:7px 10px; font-family:var(--pixel); font-size:7px; color:var(--text-dim);
    background:var(--surface2); position:sticky; top:0; z-index:1;
  }
  .pl-results-close {
    background:none; border:none; color:var(--text-dim); cursor:pointer; font-size:12px; padding:0;
  }

  /* 폴더(키워드) */
  .pl-folder {
    border-bottom:1px solid var(--border); flex-shrink:0;
  }
  .pl-folder-header {
    display:flex; align-items:center; gap:8px;
    padding:9px 12px; cursor:pointer; user-select:none;
    background:var(--surface2); transition:background 0.15s;
  }
  .pl-folder-header:hover { background:rgba(168,85,247,0.08); }
  .pl-folder-icon { font-size:13px; flex-shrink:0; }
  .pl-folder-name {
    font-family:var(--pixel); font-size:8px; color:var(--text); flex:1;
  }
  .pl-folder-meta {
    font-family:var(--pixel); font-size:6px; color:var(--text-dim); flex-shrink:0;
  }
  .pl-folder-arrow {
    font-size:9px; color:var(--text-dim); flex-shrink:0;
    transition:transform 0.2s;
  }
  .pl-folder.open .pl-folder-arrow { transform:rotate(90deg); }
  .pl-folder-songs {
    display:none; flex-direction:column;
    border-top:1px solid var(--border);
    max-height:min(42vh, 300px);
    overflow-y:auto;
    overflow-x:hidden;
    min-height:0;
    -webkit-overflow-scrolling:touch;
  }
  .pl-folder.open .pl-folder-songs { display:flex; }

  /* 곡 아이템 */
  .pl-item {
    display:flex; align-items:center; gap:6px;
    padding:6px 8px 6px 14px; border-bottom:1px solid rgba(42,42,74,0.5);
    transition:background 0.15s;
  }
  .pl-item:last-child { border-bottom:none; }
  .pl-item:hover { background:rgba(168,85,247,0.05); }
  .pl-title-line {
    flex:1; min-width:0;
    font-size:12px; font-weight:600; color:var(--text);
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
    line-height:1.35;
  }
  .pl-actions { display:flex; flex-direction:row; flex-wrap:wrap; gap:3px; flex-shrink:0; max-width:min(200px, 48%); justify-content:flex-end; }
  .pl-btn {
    background:transparent; border:1px solid; padding:3px 6px;
    font-family:var(--pixel); font-size:6px; cursor:pointer; white-space:nowrap; line-height:1.5;
  }
  .pl-btn.select { border-color:var(--accent2); color:var(--accent2); }
  .pl-btn.select:hover { background:rgba(245,166,35,0.1); }
  .pl-btn.add { border-color:var(--purple); color:var(--purple); }
  .pl-btn.add:hover { background:rgba(168,85,247,0.1); }
  .pl-btn.remove { border-color:#ff4444; color:#ff4444; }
  .pl-btn.remove:hover { background:rgba(255,68,68,0.1); }
  .pl-btn.added { border-color:var(--green); color:var(--green); cursor:default; }

  .pl-empty {
    text-align:center; padding:24px 16px;
    font-family:var(--pixel); font-size:7px; color:var(--text-dim); line-height:2.5;
  }
  .pl-folder-empty {
    padding:10px 20px; font-size:11px; color:var(--text-dim); font-style:italic;
  }

  /* 검색 결과 아이템 */
  .pl-result-item {
    display:flex; align-items:center; gap:8px;
    padding:8px 10px; border-bottom:1px solid var(--border); transition:background 0.15s;
  }
  .pl-result-item:hover { background:rgba(168,85,247,0.05); }

  /* 현재 재생 저장 버튼 */
  #save-now-playing-btn {
    background:transparent; border:1px solid var(--purple); color:var(--purple);
    padding:4px 8px; font-family:var(--pixel); font-size:6px; cursor:pointer;
    white-space:nowrap; flex-shrink:0;
  }
  #save-now-playing-btn:hover { background:rgba(168,85,247,0.15); }

  /* 폴더 선택 팝업 */
  #folder-picker {
    position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:300;
    display:none; align-items:center; justify-content:center; backdrop-filter:blur(4px);
  }
  #folder-picker.open { display:flex; }
  .folder-picker-box {
    background:var(--surface); border:2px solid var(--purple); width:300px;
    box-shadow:0 0 40px rgba(168,85,247,0.3), 6px 6px 0 rgba(0,0,0,0.5);
    position:relative;
  }
  .folder-picker-box::before {
    content:''; position:absolute; top:-1px; left:-1px; right:-1px; height:3px;
    background:linear-gradient(90deg,var(--purple),var(--accent2));
  }
  .folder-picker-header {
    padding:12px 16px; border-bottom:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between;
  }
  .folder-picker-title { font-family:var(--pixel); font-size:8px; color:var(--text); }
  .folder-picker-close {
    background:none; border:1px solid var(--border); color:var(--text-dim);
    width:26px; height:26px; cursor:pointer; font-size:13px;
  }
  .folder-picker-list { padding:10px; display:flex; flex-direction:column; gap:6px; max-height:300px; overflow-y:auto; }
  .folder-picker-item {
    display:flex; align-items:center; gap:10px; padding:10px 12px;
    border:1px solid var(--border); cursor:pointer; transition:all 0.15s; background:var(--bg);
  }
  .folder-picker-item:hover { border-color:var(--purple); background:rgba(168,85,247,0.08); }
  .folder-picker-item-name { font-family:var(--pixel); font-size:8px; color:var(--text); flex:1; }
  .folder-picker-item-count { font-family:var(--pixel); font-size:6px; color:var(--text-dim); }
  .folder-picker-new {
    display:flex; gap:6px; padding:10px; border-top:1px solid var(--border);
  }
  .folder-picker-new input {
    flex:1; background:var(--bg); border:2px solid var(--border); color:var(--text);
    padding:7px 10px; font-family:var(--body); font-size:13px; outline:none;
  }
  .folder-picker-new input:focus { border-color:var(--purple); }
  .folder-picker-new-btn {
    background:var(--purple); border:none; color:white;
    padding:7px 10px; font-family:var(--pixel); font-size:7px; cursor:pointer;
  }

  /* SONG SEARCH MODAL */
  .modal-overlay { position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:100;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px); }
  .modal-overlay.open { display:flex; }
  .modal { background:var(--surface);border:2px solid var(--border);width:100%;max-width:560px;max-height:85vh;display:flex;flex-direction:column;position:relative;box-shadow:0 0 60px rgba(0,0,0,0.7); }
  .modal::before { content:'';position:absolute;top:-1px;left:-1px;right:-1px;height:3px;background:linear-gradient(90deg,var(--purple),var(--accent)); }
  .modal-header { padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between; }
  .modal-title { font-family:var(--pixel);font-size:9px;color:var(--text); }
  .modal-close { background:none;border:1px solid var(--border);color:var(--text-dim);width:28px;height:28px;cursor:pointer;font-size:14px; }
  .modal-search { padding:14px 18px;display:flex;gap:8px; }
  .modal-search .pixel-input { flex:1;background:var(--bg);border:2px solid var(--border);color:var(--text);padding:10px 12px;font-family:var(--body);font-size:14px;outline:none; }
  .search-btn { background:var(--purple);border:none;color:white;padding:10px 14px;font-family:var(--pixel);font-size:8px;cursor:pointer; }
  .search-results { flex:1;overflow-y:auto;padding:0 18px 18px; }
  .search-result-item { display:flex;gap:10px;padding:10px;border:1px solid var(--border);margin-bottom:5px;align-items:center;background:var(--surface2); }
  .search-result-item:hover { border-color:var(--purple);background:rgba(168,85,247,0.05); }
  .result-thumb-wrap { position:relative;width:80px;height:56px;flex-shrink:0;border:1px solid var(--border); }
  .result-thumb { width:100%;height:100%;object-fit:cover;display:block; }
  .result-duration {
    position:absolute;right:3px;bottom:3px;
    background:rgba(0,0,0,0.78);color:#fff;font-size:10px;font-family:var(--body);
    padding:1px 4px;line-height:1.35;border-radius:2px;pointer-events:none;
  }
  .result-title { font-size:13px;font-weight:700;color:var(--text);margin-bottom:3px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical; }
  .result-channel { font-size:12px;color:var(--text-dim); }
  .result-actions { display:flex;flex-direction:column;gap:6px;flex-shrink:0; }
  .result-actions button {
    background:var(--surface2);border:2px solid var(--border);color:var(--text);
    padding:6px 10px;font-family:var(--pixel);font-size:6px;cursor:pointer;white-space:nowrap;
  }
  .result-actions button:not(:disabled):hover { border-color:var(--purple);color:var(--purple); }
  .result-actions button:disabled { opacity:0.45;cursor:not-allowed; }
  .search-empty { text-align:center;padding:40px;font-family:var(--pixel);font-size:8px;color:var(--text-dim);line-height:2; }

  /* REACTION EFFECTS */
  .emoji-particle { position:fixed;pointer-events:none;z-index:500;font-size:28px; }

  /* 기본 떠오르기 */
  @keyframes floatUp { 0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-220px) scale(0.4)} }

  /* 🎵 음표 - 위로 흘러가며 회전 */
  @keyframes musicFloat { 0%{opacity:1;transform:translateY(0) rotate(0deg) scale(1)}100%{opacity:0;transform:translateY(-260px) rotate(30deg) scale(0.3)} }

  /* ❤️ 하트 - 천천히 위로 둥실 */
  @keyframes heartFloat { 0%{opacity:1;transform:translateY(0) scale(0.5)}30%{opacity:1;transform:translateY(-80px) scale(1.2)}100%{opacity:0;transform:translateY(-280px) scale(0.6)} }

  /* 🔥 불꽃 - 아래서 솟구침 */
  @keyframes fireRise { 0%{opacity:1;transform:translateY(0) scale(1)}50%{opacity:1;transform:translateY(-100px) scale(1.4)}100%{opacity:0;transform:translateY(-240px) scale(0.2)} }

  /* ⭐ 별 - 반짝이며 커졌다 사라짐 */
  @keyframes starPop { 0%{opacity:0;transform:scale(0) rotate(0deg)}30%{opacity:1;transform:scale(1.5) rotate(180deg)}70%{opacity:1;transform:scale(1) rotate(360deg)}100%{opacity:0;transform:scale(0) rotate(540deg)} }

  /* ❄️ 얼음 - 떨어짐 */
  @keyframes iceFall { 0%{opacity:1;transform:translateY(0) rotate(0deg)}100%{opacity:0;transform:translateY(180px) rotate(180deg)} }

  /* 💧 물방울 - 위에서 아래로 */
  @keyframes dropFall { 0%{opacity:1;transform:translateY(-20px) scale(1)}80%{opacity:1;transform:translateY(160px) scale(0.8)}100%{opacity:0;transform:translateY(200px) scale(0.2)} }

  /* 🎉 색종이 */
  @keyframes confettiFall { 0%{opacity:1;transform:translateY(0) rotate(0deg) scale(1)}100%{opacity:0;transform:translateY(300px) rotate(720deg) scale(0.3)} }

  /* 😂 웃음 - 크게 나타났다 튕김 */
  @keyframes laughPop { 0%{opacity:0;transform:scale(0)}20%{opacity:1;transform:scale(2)}60%{opacity:1;transform:scale(1.5)}100%{opacity:0;transform:scale(3) translateY(-60px)} }

  /* 👍 좋아요 - 여러개 튀어나옴 */
  @keyframes thumbPop { 0%{opacity:1;transform:translate(0,0) scale(0.5)}30%{opacity:1;transform:translate(var(--tx),var(--ty)) scale(1.3)}100%{opacity:0;transform:translate(var(--tx2),var(--ty2)) scale(0.2)} }

  /* 화면 오버레이 */
  .screen-overlay { position:fixed;inset:0;pointer-events:none;z-index:400;opacity:0; }
  @keyframes overlayFlash { 0%{opacity:0}20%{opacity:0.25}100%{opacity:0} }

  /* 화면 흔들기 */
  @keyframes screenShake { 0%,100%{transform:translate(0,0)}20%{transform:translate(-4px,2px)}40%{transform:translate(4px,-2px)}60%{transform:translate(-2px,4px)}80%{transform:translate(2px,-4px)} }

  /* TOAST */
  .toast-container { position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:200;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none; }
  .toast { background:var(--surface);border:1px solid var(--accent2);color:var(--accent2);padding:8px 18px;font-family:var(--pixel);font-size:8px;animation:toastIn 0.3s ease,toastOut 0.3s ease 2.7s forwards; }
  @keyframes toastIn { from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)} }
  @keyframes toastOut { from{opacity:1}to{opacity:0} }

  /* CSS ANIMATIONS */
  @keyframes animDance { 0%{transform:rotate(-12deg)translateY(0)}25%{transform:rotate(0deg)translateY(-6px)scale(1.08)}50%{transform:rotate(12deg)translateY(0)}75%{transform:rotate(0deg)translateY(-4px)}100%{transform:rotate(-12deg)translateY(0)} }

  .seat.is-bobbing canvas.sprite, canvas.sprite.anim-dance { animation:animDance 0.45s ease-in-out infinite; }

function drawSprite(canvasEl, charId, scale=3, colorId=null) {
  const colorData = colorId ? COLORS.find(c => c.id === colorId) : COLORS[0];
  const palette = colorData ? colorData.palette : COLORS[0].palette;
  const rows = SPRITE_DATA[charId] || SPRITE_DATA.cat;
  canvasEl.width = 16 * scale;
  canvasEl.height = 16 * scale;
  const ctx = canvasEl.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  const colors = {
    '0':'transparent','1':palette[0],'2':palette[1],
    '3':palette[2],'4':palette[3],'5':palette[4],
  };
  rows.forEach((row, y) => {
    [...row].forEach((px, x) => {
      if (px === '0') return;
      ctx.fillStyle = colors[px] || palette[0];
      ctx.fillRect(x * scale, y * scale, scale, scale);
    });
  });
}

function mergeCharProfile(charId) {
  const base = CHAR_PROFILE._default || {};
  const p = CHAR_PROFILE[charId] || {};
  return {
    persona: p.persona != null ? p.persona : base.persona,
    idleDelayMul: p.idleDelayMul != null ? p.idleDelayMul : base.idleDelayMul,
    idleSpeedMul: p.idleSpeedMul != null ? p.idleSpeedMul : base.idleSpeedMul,
    motionAdd: { ...(base.motionAdd || {}), ...(p.motionAdd || {}) },
    emoji: { ...(base.emoji || {}), ...(p.emoji || {}) },
  };
}

function mergedMotionWeights(charId) {
  const baseW = CHAR_MOTION_WEIGHT[charId] || CHAR_MOTION_WEIGHT.cat;
  const add = mergeCharProfile(charId).motionAdd;
  const out = { ...baseW };
  Object.keys(add).forEach(k => {
    out[k] = (out[k] || 0) + add[k];
  });
  return out;
}

  const djIdx = seatIndexOfDJ();
  const ids = [document.getElementById(`sprite-${seatIdx}`)];
  if (seatIdx === djIdx) ids.push(document.getElementById('dj-char-canvas'));

function isMeDJ() {
  return !!(state.me && state.dj && state.dj.currentDJ === state.me.name);
}

const _idleTimers = [null, null, null, null];
const _idleMotionActive = [false, false, false, false];

function isSeatDJ(seatIndex) {
  const dj = state.dj && state.dj.currentDJ;
  const seat = state.seats[seatIndex];
  return !!(dj && seat && seat.name === dj);
}

function pickIdleMotionForChar(charId) {
  const weights = mergedMotionWeights(charId);
  const keys = Object.keys(weights).filter(k => weights[k] > 0 && IDLE_MOTIONS[k]);
  if (!keys.length) return 'bob';
  let total = 0;
  keys.forEach(k => { total += weights[k]; });
  let r = Math.random() * total;
  for (const k of keys) {
    r -= weights[k];
    if (r <= 0) return k;
  }
  return keys[0];
}

function scheduleIdleMotion(seatIndex) {
  if (_idleTimers[seatIndex]) clearTimeout(_idleTimers[seatIndex]);
  const seat = state.seats[seatIndex];
  const charId = (seat && seat.charId) || 'cat';
  const prof = mergeCharProfile(charId);
  const mul = prof.idleDelayMul != null ? prof.idleDelayMul : 1;
  const delay = (3000 + Math.random() * 5000) * mul;
  _idleTimers[seatIndex] = setTimeout(() => {
    _idleTimers[seatIndex] = null;
    if (state.playing && state.seats[seatIndex] && !isSeatDJ(seatIndex)) {
      triggerIdleMotion(seatIndex);
    }
    scheduleIdleMotion(seatIndex);
  }, delay);
}

function triggerIdleMotion(seatIndex) {
  if (_idleMotionActive[seatIndex] || !state.playing || isSeatDJ(seatIndex)) return;
  const seat = state.seats[seatIndex];
  if (!seat) return;
  const seatEl = document.querySelector(`.seat[data-seat="${seatIndex}"]`);
  if (seatEl && seatEl.classList.contains('is-bobbing')) return;
  if (!document.getElementById(`sprite-${seatIndex}`)) return;
  const cid = seat.charId || 'cat';
  const motionName = pickIdleMotionForChar(cid);
  const motion = IDLE_MOTIONS[motionName];
  if (!motion) return;

  const prof = mergeCharProfile(cid);
  const speedMul = prof.idleSpeedMul != null ? prof.idleSpeedMul : 1;

  _idleMotionActive[seatIndex] = true;
  let frame = 0;
  const runFrame = () => {
    const cv = document.getElementById(`sprite-${seatIndex}`);
    if (!cv || !state.playing || isSeatDJ(seatIndex)) {
      _idleMotionActive[seatIndex] = false;
      if (cv) cv.style.transform = '';
      return;
    }
    if (frame >= motion.frames) {
      _idleMotionActive[seatIndex] = false;
      cv.style.transform = '';
      return;
    }
    const parts = [];
    if (motion.offsetY) {
      const oy = motion.offsetY[Math.min(frame, motion.offsetY.length - 1)] * 3;
      parts.push(`translateY(${oy}px)`);
    }
    if (motion.offsetX) {
      const ox = motion.offsetX[Math.min(frame, motion.offsetX.length - 1)] * 3;
      parts.push(`translateX(${ox}px)`);
    }
    if (motion.scaleY) {
      const sy = motion.scaleY[Math.min(frame, motion.scaleY.length - 1)];
      parts.push(`scaleY(${sy})`);
    }
    if (motion.flipX) {
      const flip = motion.flipX[Math.min(frame, motion.flipX.length - 1)];
      if (flip) parts.push('scaleX(-1)');
    }
    cv.style.transform = parts.length ? parts.join(' ') : '';
    cv.style.transformOrigin = 'bottom center';
    frame++;
    setTimeout(runFrame, motion.speed * speedMul);
  };
  runFrame();
}

function restartIdleMotionSchedules() {
  for (let i = 0; i < 4; i++) {
    if (_idleTimers[i]) { clearTimeout(_idleTimers[i]); _idleTimers[i] = null; }
    _idleMotionActive[i] = false;
    const cv = document.getElementById(`sprite-${i}`);
    if (cv) cv.style.transform = '';
    scheduleIdleMotion(i);
  }
}

function stopIdleMotionSchedules() {
  for (let i = 0; i < 4; i++) {
    if (_idleTimers[i]) { clearTimeout(_idleTimers[i]); _idleTimers[i] = null; }
    _idleMotionActive[i] = false;
    const cv = document.getElementById(`sprite-${i}`);
    if (cv) cv.style.transform = '';
  }
}

function setSeatSlideVars(seatEl, seatIndex) {
  const booth = document.getElementById('dj-room');
  if (!seatEl || !booth) return;
  const sr = seatEl.getBoundingClientRect();
  const br = booth.getBoundingClientRect();
  const dx = (br.left + br.width / 2) - (sr.left + sr.width / 2);
  const dy = (br.top + br.height / 2) - (sr.top + sr.height / 2);
  const scale = Math.min(120 / Math.hypot(dx, dy || 1), 1);
  seatEl.style.setProperty('--dj-slide-x', `${(dx * scale * 0.35).toFixed(0)}px`);
  seatEl.style.setProperty('--dj-slide-y', `${(dy * scale * 0.35).toFixed(0)}px`);
}

function maybeDjTransition(before, after) {
  const prev = before && before.currentDJ;
  const cur = after && after.currentDJ;
  const booth = document.getElementById('dj-room');

  if (cur && cur !== prev) {
    const idx = state.seats.findIndex(s => s && s.name === cur);
    if (idx >= 0) {
      const el = document.querySelector(`.seat[data-seat="${idx}"]`);
      if (el) {
        setSeatSlideVars(el, idx);
        el.classList.remove('dj-seat-return-anim');
        el.classList.add('dj-seat-enter-anim');
        setTimeout(() => el.classList.remove('dj-seat-enter-anim'), 520);
      }
    }
    booth?.classList.add('dj-booth-glow');
    setTimeout(() => booth?.classList.remove('dj-booth-glow'), 900);
  }

  if (prev && prev !== cur) {
    const idx = state.seats.findIndex(s => s && s.name === prev);
    if (idx >= 0) {
      const el = document.querySelector(`.seat[data-seat="${idx}"]`);
      el?.classList.remove('dj-seat-enter-anim');
      el?.classList.add('dj-seat-return-anim');
      setTimeout(() => el?.classList.remove('dj-seat-return-anim'), 520);
    }
  }
}

function renderSeats() {
  const stage = document.getElementById('room-stage');
  if (!stage) return;
  stage.querySelectorAll('.seat').forEach(el => el.remove());

  for (let i = 0; i < 4; i++) {
    const seat = state.seats[i];
    const isMe = seat && state.me && seat.name === state.me.name;
    const isDJHome = !!(seat && state.dj && state.dj.currentDJ && seat.name === state.dj.currentDJ);
    const isEmpty = !seat;
    const div = document.createElement('div');
    const isAway = seat && seat.away && !isMe;
    div.className = `seat${isDJHome?' is-dj-home':''}${isMe?' is-me':''}${isEmpty?' empty':''}${isAway?' is-away':''}`;
    div.dataset.seat = i;

    if (isEmpty) {
      const pos = ['TOP-LEFT','TOP-RIGHT','BOTTOM-LEFT','BOTTOM-RIGHT'][i];
      div.innerHTML = `<div style="font-family:var(--pixel);font-size:7px;color:var(--text-dim);text-align:center;line-height:2.5;"><div style="font-size:22px;margin-bottom:8px;opacity:0.3">👤</div>WAITING...<br>${pos}</div>`;
    } else {
      const hasSong = seat.song != null;
      const q = (state.dj && state.dj.djQueue) || [];
      const qpos = q.indexOf(seat.name);
      const inQueue = qpos >= 0;
      let djExtra = '';
      if (isMe && !isMeDJ()) {
        if (inQueue) djExtra = `<div class="dj-wait-label">⏳ 대기 중 (#${qpos + 1}위)</div>`;
        else djExtra = `<button type="button" class="dj-apply-btn" data-dj-apply="1">🎧 DJ 신청</button>`;
      }
      div.innerHTML = `
        ${isAway ? '<div class="away-badge">자리비움</div>' : ''}
        <div class="seat-player-info">
          <canvas class="sprite" id="sprite-${i}" data-char="${seat.charId}" width="64" height="64"></canvas>
          ${isDJHome ? '<div class="dj-home-badge">🎧 DJ 중</div>' : ''}
          <div class="seat-name">${escHtml(seat.name)}${isMe?' 〈나〉':''}</div>
          <div class="seat-song${hasSong?' has-song':''}">${hasSong?'🎵 '+escHtml(seat.song.title):'노래 미선정'}</div>
          ${isMe?`<button class="pick-song-btn" data-seat="${i}">🔍 노래 선정</button>`:''}
          ${djExtra}
          ${!isMe?`<button class="kick-btn" data-kick="${seat.name}" data-seat="${i}">강퇴</button>`:''}
        </div>`;
    }
    stage.appendChild(div);
    if (seat) requestAnimationFrame(()=>{
      const cv = document.getElementById(`sprite-${i}`);
      if (cv) drawSprite(cv, seat.charId, 4, seat.colorId);
    });
  }

  stage.querySelectorAll('.kick-btn').forEach(btn=>{
    btn.addEventListener('click', e=>{
      e.stopPropagation();
      const targetName = btn.dataset.kick;
      const targetSeat = parseInt(btn.dataset.seat);
      if (!confirm(`${targetName}님을 강퇴할까요?`)) return;
      kickPlayer(targetName, targetSeat);
    });
  });

  stage.querySelectorAll('.pick-song-btn').forEach(btn=>{
    btn.addEventListener('click', e=>{e.stopPropagation();openSearchModal();});
  });
  stage.querySelectorAll('.dj-apply-btn').forEach(btn=>{
    btn.addEventListener('click', e=>{e.stopPropagation();applyDJRole();});
  });

  renderDJRoom();
}

function getChatLogMaxTs(roomCode) {
  const logs = JSON.parse(localStorage.getItem(`chatlog_${roomCode}`) || '[]');
  let m = 0;
  logs.forEach(l => { if (l.ts > m) m = l.ts; });
  return m;
}

function appendChatLog(roomCode, entry) {
  const key = `chatlog_${roomCode}`;
  const logs = JSON.parse(localStorage.getItem(key) || '[]');
  const ts = entry.ts != null ? entry.ts : Date.now();
  const last = logs[logs.length - 1];
  if (last && last.ts === ts && last.type === entry.type && last.msg === entry.msg && (last.nick || '') === (entry.nick || '')) return;
  logs.push({
    ts,
    time: new Date(ts).toISOString(),
    timeLabel: entry.timeLabel || '',
    nick: entry.nick || '',
    msg: entry.msg,
    type: entry.type || 'chat',
    colorId: entry.colorId || null,
  });
  if (logs.length > 500) logs.splice(0, logs.length - 500);
  localStorage.setItem(key, JSON.stringify(logs));
}

function renderChatLogEntry(log, isPast, container) {
  if (log.type === 'system') {
    const div = document.createElement('div');
    div.className = 'chat-msg is-system' + (isPast ? ' is-past-log' : '');
    div.innerHTML = `<div class="chat-msg-body">${escHtml(log.msg)}</div>`;
    container.appendChild(div);

  const colorData = COLORS.find(c => c.id === log.colorId) || COLORS[0];
  const isMe = state.me && log.nick === state.me.name;
  const div = document.createElement('div');
  div.className = `chat-msg${isMe ? ' is-me' : ''}${isPast ? ' is-past-log' : ''}`;
  div.innerHTML = `<div style="display:flex;align-items:center;gap:6px;margin-bottom:2px;">
    <span class="chat-msg-name" style="color:${colorData.hex}">${escHtml(log.nick)}</span>
    <span class="chat-msg-time">${escHtml(log.timeLabel || '')}</span></div>

function loadPastLogs(roomCode) {

async function kickPlayer(targetName, targetSeat) {
  if (!state.roomId || !window._fbReady) return;
  const {db, ref, set, push, get, update} = window._fb;
  set(ref(db, `rooms/${state.roomId}/kicked`), {
    name: targetName, seatIndex: targetSeat, ts: Date.now(), by: state.me?.name
  });
  await set(ref(db, `rooms/${state.roomId}/seats/seat_${targetSeat}`), null);
  if (state.dj && (state.dj.currentDJ === targetName || (state.dj.djQueue || []).includes(targetName))) {
    const djSnap = await get(ref(db, `rooms/${state.roomId}/dj`));
    const d = djSnap.val() || { djQueue: [] };
    let queue = (Array.isArray(d.djQueue) ? d.djQueue : []).filter(n => n !== targetName);
    let cur = d.currentDJ ?? null;
    if (cur === targetName) {
      cur = queue[0] || null;
      queue = queue.slice(1);
    }
    await update(ref(db, `rooms/${state.roomId}/dj`), { currentDJ: cur, djQueue: queue });
  }
  fbSendSystemChat(state.roomId, `🚫 ${targetName}님이 강퇴됐습니다.`);
  toast(`🚫 ${targetName}님 강퇴`);
}

function fbSendSystemChat(roomId, text) {
  if (!window._fbReady) return;
  const {db,ref,push} = window._fb;
  push(ref(db,`rooms/${roomId}/chat`),{text,ts:Date.now(),system:true});
}
function fbSendChat(text) {

  });
}

  update(ref(db,`rooms/${state.roomId}/seats/seat_${seatIndex}`),{song:song||null});
}

async function applyDJRole() {
  if (!state.me || !state.roomId || !window._fbReady) return;
  const { db, ref, get, update } = window._fb;
  const djRef = ref(db, `rooms/${state.roomId}/dj`);
  const snap = await get(djRef);
  const d = snap.val() || { currentDJ: null, djQueue: [] };
  let q = Array.isArray(d.djQueue) ? [...d.djQueue] : [];
  const cur = d.currentDJ ?? null;
  if (!cur) {
    await update(djRef, { currentDJ: state.me.name, djQueue: q });
    toast('🎧 DJ 부스에 입장했습니다!');
    return;
  }
  if (cur === state.me.name) return;
  if (q.includes(state.me.name)) {
    toast('이미 DJ 대기열에 있어요');
    return;
  }
  q.push(state.me.name);
  await update(djRef, { currentDJ: cur, djQueue: q });
  toast('DJ 대기열에 등록됐어요');
}

async function leaveDJBooth() {
  if (!isMeDJ() || !state.roomId || !window._fbReady) return;
  const { db, ref, get, set, update } = window._fb;
  const djRef = ref(db, `rooms/${state.roomId}/dj`);
  const snap = await get(djRef);
  const d = snap.val() || {};
  const queue = Array.isArray(d.djQueue) ? [...d.djQueue] : [];
  const nextDJ = queue.length > 0 ? queue[0] : null;
  const newQueue = queue.slice(1);
  const boothWillBeEmpty = !nextDJ;
  const msg = boothWillBeEmpty
    ? 'DJ를 그만둘까요? 대기자가 없으면 부스가 비고 재생도 멈춥니다.'
    : 'DJ를 그만둘까요? 다음 대기자가 부스로 올라옵니다.';
  if (!confirm(msg)) return;

  await set(djRef, { currentDJ: nextDJ, djQueue: newQueue });
  state.dj = { currentDJ: nextDJ, djQueue: newQueue };

  if (boothWillBeEmpty) {
    await set(ref(db, `rooms/${state.roomId}/currentSong`), null);
    await update(ref(db, `rooms/${state.roomId}`), { songQueue: [], queueIndex: 0 });
    resetLocalPlaybackQuiet();
  }

  renderSeats();
  renderDJRoom();
  updateDJIndicator();
  toast('DJ를 그만뒀어요');
}

function resetLocalPlaybackQuiet() {
  state.currentSong = null;
  state.playing = false;

  document.getElementById('player-bar')?.classList.add('hidden');

function fbDJResumeCurrentSong(positionSec) {
  if (!state.roomId||!window._fbReady||!isMeDJ()) return;
  const {db, ref, update} = window._fb;
  const pos = Math.max(0, positionSec);
  getServerTimeMs().then(serverNow => {
    update(ref(db,`rooms/${state.roomId}/currentSong`),{
      serverStartAt: serverNow - pos * 1000,
      startTime: 0,
      pausePositionSec: null,
      pausedAt: null,
      updatedAt: Date.now(),
    });
  });
}

function waitYtCueable() {
  return new Promise(resolve => {
    let n = 0;
    const t = setInterval(() => {
      n++;
      try {
        if (ytPlayer && ytPlayer.getDuration && ytPlayer.getDuration() > 0) {
          clearInterval(t);
          resolve();
          return;
        }
      } catch (e) {}
      if (n > 120) { clearInterval(t); resolve(); }
    }, 50);
  });
}

function applyCurrentSongFromFirebase(cs) {
  if (!cs || !cs.id) return;
  const sig = `${cs.id}|${cs.updatedAt}|${cs.pausePositionSec}|${cs.serverStartAt}`;
  if (applyCurrentSongFromFirebase._lastSig === sig) return;
  applyCurrentSongFromFirebase._lastSig = sig;

  state.remoteCurrentSong = cs;
  state.currentSong = { id: cs.id, title: cs.title, thumb: cs.thumbnail || cs.thumb };
  document.getElementById('player-bar').classList.remove('hidden');
  document.getElementById('player-thumb').src = cs.thumbnail || '';
  document.getElementById('player-title').textContent = cs.title || '';
  document.getElementById('player-dj-name').textContent = `🎧 DJ: ${cs.djName || ''}`;
  updateMediaSession(cs.title, cs.djName, cs.thumbnail);
  renderDJRoom();

  const applyMutedAutoplay = () => {
    const alreadyUnmuted = localStorage.getItem('musicroom_unmuted') === 'true';
    if (alreadyUnmuted) {
      ytPlayer.unMute();
      ytPlayer.setVolume(100);
      isMuted = false;
      document.getElementById('mute-btn').textContent = '🔊';
      document.getElementById('unmute-bar').style.display = 'none';
      ytPlayer.playVideo();
    } else {
      ytPlayer.mute();
      isMuted = true;
      ytPlayer.playVideo();
      const wait = setInterval(() => {
        if (ytPlayer.getPlayerState() === 1 || ytPlayer.getPlayerState() === 3) {
          clearInterval(wait);
          document.getElementById('mute-btn').textContent = '🔇';
          document.getElementById('unmute-bar').style.display = 'block';
        }
      }, 200);
    }
  };

  const run = async () => {
    if (!ytReady || !ytPlayer) return;
    let vidNow = '';
    try {
      vidNow = ytPlayer.getVideoData?.().video_id || '';
    } catch (e) {}
    const sameClip = vidNow === cs.id;

    if (cs.pausePositionSec != null && cs.pausePositionSec >= 0) {
      if (!sameClip) ytPlayer.loadVideoById(cs.id);
      await waitYtCueable();
      ytPlayer.seekTo(cs.pausePositionSec, true);
      ytPlayer.pauseVideo();
      state.playing = false;
      stopIdleMotionSchedules();
      const btn = document.getElementById('play-pause-btn');
      if (btn) btn.textContent = '▶';
      return;
    }

    if (!sameClip) ytPlayer.loadVideoById(cs.id);
    await waitYtCueable();
    const serverNow = await getServerTimeMs();
    const startAt = typeof cs.serverStartAt === 'number' ? cs.serverStartAt : serverNow;
    let elapsed = (serverNow - startAt) / 1000;
    if (elapsed < 0) elapsed = 0;
    ytPlayer.seekTo(elapsed, true);
    applyMutedAutoplay();
  };

  if (ytReady && ytPlayer) run();
  else {
    const w = setInterval(() => {
      if (ytReady && ytPlayer) {
        clearInterval(w);
        run();
      }
    }, 300);
  }
}

function fbAddHistory(entry) {
  if (!state.roomId||!window._fbReady) return;
  const {db,ref,push} = window._fb;
  push(ref(db,`rooms/${state.roomId}/history`),{...entry,ts:Date.now()});
}
// ── ENTER ROOM
async function enterRoom() {
  const {db,ref,set,get,update,onValue,push} = window._fb;
  const roomRef = ref(db,`rooms/${myRoomId}`);
  const snap = await get(roomRef);

  let seatIndex = mySeatIndex;
  let shouldAnnounceJoin = false;

  if (!snap.exists()) {
    await set(roomRef,{
      createdAt: Date.now(),
      dj: { currentDJ: null, djQueue: [] },
      seats: {},
      history: {},
      songQueue: [],
      queueIndex: 0,
    });
    seatIndex = 0;
    shouldAnnounceJoin = true;
  } else {
    const data = snap.val();
    if (!data.dj || data.dj.currentDJ === undefined) {
      const seatsObj = data.seats || {};
      const arr = [null, null, null, null];
      Object.values(seatsObj).forEach(s => {
        if (s && typeof s.seatIndex === 'number') arr[s.seatIndex] = s;
      });
      const idx = typeof data.currentDJIndex === 'number' ? data.currentDJIndex : 0;
      const djName = arr[idx]?.name ?? null;
      await update(roomRef, {
        dj: { currentDJ: djName, djQueue: [] },
        songQueue: data.songQueue || [],
        queueIndex: typeof data.queueIndex === 'number' ? data.queueIndex : 0,
      });
    }
    if (typeof data.queueIndex !== 'number') {
      update(roomRef, { queueIndex: 0 });
    }
    const seats = data.seats||{};
    const taken = Object.values(seats).map(s=>s.seatIndex);

    // 이미 같은 이름으로 자리가 있으면 그 자리로 복귀 (새로고침 대응)
    const existingSeat = Object.values(seats).find(s => s.name === myName);
    if (existingSeat) {
      seatIndex = existingSeat.seatIndex;
      await update(ref(db,`rooms/${myRoomId}/seats/seat_${seatIndex}`),{
        charId:myCharId, colorId:myColorId, away:false
      });
      state.me = {name:myName, charId:myCharId, colorId:myColorId, seatIndex};
    } else {
      // 새 자리 배정 (처음 들어온 참가자)
      seatIndex = [0,1,2,3].find(i=>!taken.includes(i));
      if (seatIndex === undefined) { alert('방이 꽉 찼어요!'); location.href='index.html'; return; }
      state.me = {name:myName, charId:myCharId, colorId:myColorId, seatIndex};
      await set(ref(db,`rooms/${myRoomId}/seats/seat_${seatIndex}`),{
        name:myName,charId:myCharId,colorId:myColorId,seatIndex,song:null,joinedAt:Date.now()
      });
      shouldAnnounceJoin = true;
    }
  }

  if (!state.me) {
    state.me = {name:myName, charId:myCharId, colorId:myColorId, seatIndex};
    await set(ref(db,`rooms/${myRoomId}/seats/seat_${seatIndex}`),{
      name:myName,charId:myCharId,colorId:myColorId,seatIndex,song:null,joinedAt:Date.now()
    });
    shouldAnnounceJoin = true;
  }

  // DJ는 DJ 신청(또는 대기열 승격)으로만 부스에 입장 (첫 입장 자동 DJ 제거)

  // 세션 저장
  localStorage.setItem('musicroom_session', JSON.stringify({
    roomId:myRoomId, name:myName, charId:myCharId, colorId:myColorId, seatIndex, savedAt:Date.now()
  }));

  // 링크 복사
  document.getElementById('room-id-display').textContent = `📋 ROOM: ${myRoomId}`;
  document.getElementById('room-id-display').addEventListener('click',()=>{
    navigator.clipboard.writeText(`${location.origin}${location.pathname.replace('room.html','index.html')}?room=${myRoomId}`)
      .then(()=>toast('링크 복사됨! 🔗'));
  });

  let chatPersistWatermark = getChatLogMaxTs(myRoomId);
  let chatNotifyInitialized = false;
  let chatNotifyWatermark = 0;
  loadPastLogs(myRoomId);

  // ── Firebase 리스너들
  onValue(ref(db,`rooms/${myRoomId}`), snap=>{
    if (!snap.exists()) return;
    const data = snap.val();
    if (data.dj) {
      let q = Array.isArray(data.dj.djQueue) ? [...data.dj.djQueue] : [];
      let cur = data.dj.currentDJ ?? null;
      if (!cur && q.length > 0) {
        cur = q[0];
        q = q.slice(1);
        update(ref(db, `rooms/${myRoomId}/dj`), { currentDJ: cur, djQueue: q });
        return;
      }
      const nextDj = { currentDJ: cur, djQueue: q };
      if (JSON.stringify(nextDj) !== JSON.stringify(state.dj)) {
        const before = { ...state.dj };
        state.dj = nextDj;
        renderSeats();
        updateDJIndicator();
        requestAnimationFrame(() => maybeDjTransition(before, state.dj));
      }
    }
  });

  onValue(ref(db,`rooms/${myRoomId}/seats`), snap=>{
    const seats = snap.val()||{};
    const newSeats = [null,null,null,null];
    Object.values(seats).forEach(s=>{if(s&&typeof s.seatIndex==='number')newSeats[s.seatIndex]=s;});
    state.seats = newSeats;
    renderSeats(); renderUsersBar(); updateDJIndicator();
  });

  // 채팅
  onValue(ref(db,`rooms/${myRoomId}/chat`), snap=>{
    const live = document.getElementById('chat-live');
    const container = document.getElementById('chat-messages');
    if (!live || !container) return;
    live.innerHTML = '';
    if (!snap.exists()) {
      container.scrollTop = container.scrollHeight;
      return;
    }
    const list = Object.values(snap.val()).sort((a,b)=>a.ts-b.ts);
    const maxTs = list.length ? list[list.length - 1].ts : 0;

    if (!chatNotifyInitialized) {
      chatNotifyWatermark = maxTs;
      chatNotifyInitialized = true;
    } else if (maxTs > chatNotifyWatermark) {
      if (state.me) {
        const newMsgs = list.filter(m => m.ts > chatNotifyWatermark);
        const fromOthers = newMsgs.filter(m => !m.system && m.name !== state.me.name);
        if (fromOthers.length) {
          const wantsAttention = document.hidden || state.rightPanelTab !== 'chat';
          if (wantsAttention) {
            startChatTabAttention(fromOthers.length);
            const last = fromOthers[fromOthers.length - 1];
            tryDesktopChatNotify(last.name, last.text);
          }
        }
      }
      chatNotifyWatermark = maxTs;
    }

    list.forEach(msg=>{
      if (msg.ts > chatPersistWatermark) {
        if (msg.system) {
          appendChatLog(myRoomId, { ts: msg.ts, nick: '', msg: msg.text, type: 'system', timeLabel: '' });
        } else {
          appendChatLog(myRoomId, {
            ts: msg.ts,
            nick: msg.name,
            msg: msg.text,
            type: 'chat',
            timeLabel: msg.time || '',
            colorId: msg.colorId,
          });
        }
        chatPersistWatermark = Math.max(chatPersistWatermark, msg.ts);
      }
      if (msg.system) {
        const div = document.createElement('div');
        div.className = 'chat-msg is-system';
        div.innerHTML = `<div class="chat-msg-body">${escHtml(msg.text)}</div>`;
        live.appendChild(div);
      } else {
        const isMe = state.me && msg.name===state.me.name;
        const colorData = COLORS.find(c=>c.id===msg.colorId)||COLORS[0];
        const div = document.createElement('div');
        div.className = `chat-msg${isMe?' is-me':''}`;
        div.innerHTML = `<div style="display:flex;align-items:center;gap:6px;margin-bottom:2px;">
          <span class="chat-msg-name" style="color:${colorData.hex}">${escHtml(msg.name)}</span>
          <span class="chat-msg-time">${msg.time||''}</span></div>
          <div class="chat-msg-body">${escHtml(msg.text)}</div>`;
        live.appendChild(div);
      }
    });
    container.scrollTop = container.scrollHeight;
  });

  // 히스토리
  onValue(ref(db,`rooms/${myRoomId}/history`), snap=>{
    if (!snap.exists()) return;
    state.history = Object.values(snap.val()).sort((a,b)=>b.ts-a.ts);
    renderHistory();
  });

  onValue(ref(db,`rooms/${myRoomId}/currentSong`), snap=>{
    if (!snap.exists()) {
      resetLocalPlaybackQuiet();
      return;
    }
    const cs = snap.val();
    applyCurrentSongFromFirebase(cs);
  });

  onValue(ref(db,`rooms/${myRoomId}/songQueue`), snap=>{
    state.songQueue = snap.exists() && Array.isArray(snap.val()) ? snap.val() : [];
    renderQueuePanel();
  });
  onValue(ref(db,`rooms/${myRoomId}/queueIndex`), snap=>{
    state.queueIndex = snap.exists() && typeof snap.val() === 'number' ? snap.val() : 0;
    renderQueuePanel();
  });

  setInterval(async () => {
    if (!state.playing || !ytPlayer || !ytReady || !state.remoteCurrentSong) return;
    if (state.remoteCurrentSong.pausePositionSec != null && state.remoteCurrentSong.pausePositionSec >= 0) return;
    const cs = state.remoteCurrentSong;
    if (typeof cs.serverStartAt !== 'number') return;
    try {
      const serverNow = await getServerTimeMs();
      const expected = (serverNow - cs.serverStartAt) / 1000;
      const actual = ytPlayer.getCurrentTime();
      if (Math.abs(expected - actual) > 2) ytPlayer.seekTo(Math.max(0, expected), true);
    } catch (e) {}
  }, 8000);

  // 강퇴 감지
  onValue(ref(db, `rooms/${myRoomId}/kicked`), snap => {
    if (!snap.exists() || !state.me) return;
    const data = snap.val();
    if (data && data.name === state.me.name) {
      alert('강퇴됐습니다.');
      localStorage.removeItem('musicroom_session');
      location.href = 'index.html';
    }
  });

  // 리액션
  let lastReactionTs = 0;
  onValue(ref(db,`rooms/${myRoomId}/reactions`), snap=>{
    if (!snap.exists()) return;
    const items = Object.values(snap.val()).sort((a,b)=>b.ts-a.ts);
    if (!items.length||items[0].ts<=lastReactionTs) return;
    lastReactionTs = items[0].ts;
    const latest = items[0];
    spawnEmojiLocally(latest.emoji);
    if (latest.senderName) {
      const senderIdx = state.seats.findIndex(s=>s&&s.name===latest.senderName);
      if (senderIdx>=0) playCharAnimForEmoji(senderIdx, latest.emoji);
    }
  });

  onValue(ref(db, userPlaylistDbPath(myName)), snap => {
    state.sharedPlaylist = normalizePlaylistMap(snap.exists() ? snap.val() : null);
    const fp = document.getElementById('folder-picker');
    if (fp && fp.classList.contains('open')) renderFolderPickerList();
    if (state.rightPanelTab === 'playlist') renderPlaylistPanel();
  });

  // 리듬
  onValue(ref(db,`rooms/${myRoomId}/rhythm`), snap=>{
    const rhythmData = snap.val()||{};
    const djIdx = seatIndexOfDJ();
    state.seats.forEach((seat,idx)=>{
      if (!seat) return;
      const key = seat.name.replace(/[.#$[\]]/g,'_');
      const r = rhythmData[key];
      const djBooth = document.getElementById('dj-room');
      if (r&&r.on) {
        if (idx === djIdx && djBooth) {
          djBooth.classList.add('is-bobbing');
          playCharAnim(idx,'anim-dance');
        } else {
          document.querySelector(`.seat[data-seat="${idx}"]`)?.classList.add('is-bobbing');
          playCharAnim(idx,'anim-dance');
        }
      } else {
        if (idx === djIdx && djBooth) djBooth.classList.remove('is-bobbing');
        document.querySelector(`.seat[data-seat="${idx}"]`)?.classList.remove('is-bobbing');
        stopCharAnim(idx);
      }
    });
  });

  if (shouldAnnounceJoin) {
    fbSendSystemChat(myRoomId, `${myName}님이 입장했습니다 🎉`);
  }

  maybeMigrateLocalPlaylistToShared().catch(() => {});
}

// ── PLAY DJ SONG
function playCurrentDJSong() {
  const djName = state.dj && state.dj.currentDJ;
  const djSeat = djName ? state.seats.find(s => s && s.name === djName) : null;
  if (!djSeat||!djSeat.song){toast('먼저 노래를 선정해주세요!');return;}
  if (!isMeDJ()) { toast('지금은 DJ만 재생할 수 있어요'); return; }
  // 플레이어 미준비 시 최대 5초 대기 후 재시도
  if (!ytReady||!ytPlayer||typeof ytPlayer.loadVideoById!=='function') {
    toast('⏳ 플레이어 준비 중...');
    let tries = 0;
    const wait = setInterval(()=>{
      tries++;
      if (ytReady && ytPlayer && typeof ytPlayer.loadVideoById==='function') {
        clearInterval(wait);
        _doPlay(djSeat.song, djSeat.name);
      } else if (tries > 75) { // 15초 대기
        clearInterval(wait);
        toast('❌ YouTube 연결 실패. 인터넷 연결을 확인하거나 새로고침 해보세요.');
      }
    }, 200);
    return;
  }
  _doPlay(djSeat.song, djSeat.name);
}

function _doPlay(song, djName) {
  fbSetCurrentSong(song, djName);
  fbAddHistory({title:song.title,thumb:song.thumb,djName,keyword:'---',time:timeStr()});
  fbSendSystemChat(state.roomId,`🎧 ${djName}DJ의 "${song.title}" 재생 시작!`);
  toast('▶ 재생 시작!');
}

// ── YOUTUBE
function _initYTPlayer() {
  ytPlayer = new YT.Player('yt-player', {
    height: '180', width: '320',
    playerVars: {autoplay:1, playsinline:1, controls:0, rel:0, iv_load_policy:3, modestbranding:1, enablejsapi:1, origin:location.origin},
    events: {
      onReady: () => {
        ytReady = true;
        const iframe = document.querySelector('#yt-player iframe');
        if (iframe) {
          try {
            let a = iframe.getAttribute('allow') || '';
            if (!a.includes('autoplay')) a = (a ? a + '; ' : '') + 'autoplay; encrypted-media; picture-in-picture';
            iframe.setAttribute('allow', a);
          } catch (e) {}
          iframe.setAttribute('playsinline', '');
          iframe.setAttribute('webkit-playsinline', '');
        }
      },
      onStateChange: onPlayerStateChange,
      onError: (e) => { console.warn('YT Error:', e.data); }
    }
  });
}
// API가 이미 로드됐으면 바로 초기화, 아니면 로드 완료 시 호출
window._ytInit = _initYTPlayer;
if (window._ytApiLoaded) _initYTPlayer();

let _pauseFbTimer = null;
function onPlayerStateChange(event) {
  const btn = document.getElementById('play-pause-btn');
  if (event.data===YT.PlayerState.PLAYING) {
    clearTimeout(_pauseFbTimer);
    state.playing=true; if(btn)btn.textContent='⏸';
    renderDJRoom();
    requestWakeLock();
    startAudioKeepAlive();
    restartIdleMotionSchedules();
    if (isMeDJ() && state.remoteCurrentSong && state.remoteCurrentSong.pausePositionSec != null && state.remoteCurrentSong.pausePositionSec >= 0) {
      fbDJResumeCurrentSong(ytPlayer.getCurrentTime());
    }
  } else if (event.data===YT.PlayerState.PAUSED) {
    state.playing=false; if(btn)btn.textContent='▶';
    renderDJRoom();
    stopAudioKeepAlive();
    stopIdleMotionSchedules();
    if (isMeDJ() && state.remoteCurrentSong && state.remoteCurrentSong.id) {
      clearTimeout(_pauseFbTimer);
      _pauseFbTimer = setTimeout(() => {
        if (!ytPlayer || ytPlayer.getPlayerState() !== YT.PlayerState.PAUSED) return;
        fbDJPauseCurrentSong(ytPlayer.getCurrentTime());
      }, 450);
    }
  } else if (event.data===YT.PlayerState.ENDED) {
    clearTimeout(_pauseFbTimer);
    state.playing=false; if(btn)btn.textContent='▶';
    renderDJRoom();
    stopAudioKeepAlive();
    stopIdleMotionSchedules();
    if (isMeDJ()) advancePlayQueueIfAny();
  }
}

// ── MEDIA SESSION
function updateMediaSession(title, djName, thumb) {
  if (!('mediaSession' in navigator)) return;
  navigator.mediaSession.metadata = new MediaMetadata({title, artist:`DJ: ${djName}`, artwork:thumb?[{src:thumb,sizes:'480x360',type:'image/jpeg'}]:[]});
  navigator.mediaSession.playbackState = 'playing';
  navigator.mediaSession.setActionHandler('play', () => { ytPlayer?.playVideo(); navigator.mediaSession.playbackState='playing'; });
  navigator.mediaSession.setActionHandler('pause', () => { ytPlayer?.pauseVideo(); navigator.mediaSession.playbackState='paused'; });
  navigator.mediaSession.setActionHandler('stop', () => { ytPlayer?.stopVideo(); });
  // previoustrack/nexttrack — 잠금화면 컨트롤 버튼 활성화용
  navigator.mediaSession.setActionHandler('previoustrack', null);
  navigator.mediaSession.setActionHandler('nexttrack', null);
}

// ── WAKE LOCK
// ── WAKE LOCK
let wakeLock = null;
async function requestWakeLock() {
  if (!('wakeLock' in navigator) || wakeLock) return;
  try {
    wakeLock = await navigator.wakeLock.request('screen');
    wakeLock.addEventListener('release', () => { wakeLock = null; });
  } catch(e) {}
}

// ── BACKGROUND AUDIO KEEP-ALIVE
// 안드로이드 크롬이 백그라운드에서 JS/오디오를 중단하지 못하도록
// 무음 AudioContext를 주기적으로 재생해서 "오디오 활성 탭"으로 유지
let _audioCtx = null;
let _keepAliveTimer = null;

function startAudioKeepAlive() {
  if (_keepAliveTimer) return;
  try {
    if (!_audioCtx) {
      _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (_audioCtx.state === 'suspended') _audioCtx.resume();
    _keepAliveTimer = setInterval(() => {
      if (!state.playing) return;
      try {
        // 10ms 짜리 무음 버퍼 재생 — 브라우저에 "오디오 활성" 신호
        const buf = _audioCtx.createBuffer(1, _audioCtx.sampleRate * 0.01, _audioCtx.sampleRate);
        const src = _audioCtx.createBufferSource();
        src.buffer = buf;
        src.connect(_audioCtx.destination);
        src.start();
      } catch(e) {}
    }, 15000);
  } catch(e) {}
}

function stopAudioKeepAlive() {
  if (_keepAliveTimer) { clearInterval(_keepAliveTimer); _keepAliveTimer = null; }
}

function ensureAndroidBackgroundPlayback() {
  if (!IS_ANDROID || !state.playing || !ytReady || !ytPlayer) return;
  try {
    // 안드로이드 앱 전환 시 일시정지되는 케이스를 줄이기 위한 보조 재생 트리거
    if (ytPlayer.getPlayerState && ytPlayer.getPlayerState() !== YT.PlayerState.PLAYING) {
      ytPlayer.playVideo();
    }
    if (_audioCtx && _audioCtx.state === 'suspended') _audioCtx.resume();
    startAudioKeepAlive();
  } catch (e) {}
}

// visibilitychange: 복귀 시 재생 재시작 + wakeLock 재취득
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'hidden') {
    ensureAndroidBackgroundPlayback();
    return;
  }
  if (document.visibilityState === 'visible') {
    if (state.playing) requestWakeLock();
    ensureAndroidBackgroundPlayback();
    if (ytReady && ytPlayer && state.remoteCurrentSong && state.remoteCurrentSong.pausePositionSec == null) {
      getServerTimeMs().then(serverNow => {
        const cs = state.remoteCurrentSong;
        if (!cs || typeof cs.serverStartAt !== 'number') return;
        const expected = Math.max(0, (serverNow - cs.serverStartAt) / 1000);
        try {
          const st = ytPlayer.getPlayerState();
          if (state.playing && st !== YT.PlayerState.PLAYING) {
            ytPlayer.seekTo(expected, true);
          } else if (st === YT.PlayerState.PLAYING) {
            const actual = ytPlayer.getCurrentTime();
            if (Math.abs(expected - actual) > 3) ytPlayer.seekTo(expected, true);
          }
          if (state.playing) ytPlayer.playVideo();
        } catch (e) {}
      });
    }
    if (state.playing && ytReady && ytPlayer) {
      setTimeout(() => {
        try {
          if (ytPlayer.getPlayerState() !== 1) {
            ytPlayer.playVideo();
          }
        } catch(e) {}
      }, 500);
    }
    if (_audioCtx && _audioCtx.state === 'suspended') _audioCtx.resume();
  }
});
window.addEventListener('blur', ensureAndroidBackgroundPlayback);
window.addEventListener('pagehide', ensureAndroidBackgroundPlayback);

    '🎵': spawnMusic,
    '👍': spawnThumbs,
    '❤️': spawnHearts,
    '🔥': spawnFire,
    '⭐': spawnStars,
    '❄️': spawnIce,
    '💧': spawnDrops,
    '🎉': spawnConfetti,
    '😂': spawnLaugh,

  if (fn) fn();

}
