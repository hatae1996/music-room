<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎵 뮤직룸</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nanum+Gothic:wght@400;700;800&display=swap');

  :root {
    --bg: #0d0d1a; --surface: #1a1a2e; --surface2: #16213e;
    --accent: #e94560; --accent2: #f5a623; --accent3: #0f3460;
    --green: #00ff88; --purple: #a855f7;
    --text: #e8e8f0; --text-dim: #8888aa;
    --pixel: 'Press Start 2P', monospace;
    --body: 'Nanum Gothic', sans-serif;
    --border: #2a2a4a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--body);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    gap: 24px;
    background-image:
      radial-gradient(ellipse at 20% 50%, rgba(168,85,247,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 20%, rgba(233,69,96,0.08) 0%, transparent 50%);
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px);
    pointer-events: none;
    z-index: 9999;
  }

  .logo {
    font-family: var(--pixel);
    font-size: clamp(16px, 4vw, 28px);
    color: var(--accent);
    text-shadow: 0 0 20px rgba(233,69,96,0.6), 4px 4px 0 #7a0020;
    text-align: center;
    animation: flicker 3s infinite;
  }
  .logo span { color: var(--accent2); }
  @keyframes flicker { 0%,94%,96%,100% { opacity:1; } 95% { opacity:0.8; } }

  .setup-card {
    background: var(--surface);
    border: 2px solid var(--border);
    padding: 32px;
    width: 100%;
    max-width: 480px;
    position: relative;
    box-shadow: 0 0 40px rgba(0,0,0,0.5);
  }
  .setup-card::before {
    content: '';
    position: absolute;
    top: -1px; left: -1px; right: -1px;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--purple), var(--accent2));
  }

  .setup-title {
    font-family: var(--pixel);
    font-size: 10px;
    color: var(--text-dim);
    margin-bottom: 24px;
    letter-spacing: 2px;
  }

  .input-group { margin-bottom: 20px; }
  .input-label {
    font-family: var(--pixel);
    font-size: 8px;
    color: var(--accent2);
    display: block;
    margin-bottom: 8px;
    letter-spacing: 1px;
  }
  .pixel-input {
    width: 100%;
    background: var(--bg);
    border: 2px solid var(--border);
    color: var(--text);
    padding: 12px 16px;
    font-family: var(--body);
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }
  .pixel-input:focus { border-color: var(--accent); }
  .pixel-input::placeholder { color: var(--text-dim); }

  .char-picker {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-top: 8px;
  }
  .char-option {
    background: var(--bg);
    border: 2px solid var(--border);
    padding: 12px 8px;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
  }
  .char-option:hover { border-color: var(--accent2); }
  .char-option.selected { border-color: var(--accent); box-shadow: 0 0 16px rgba(233,69,96,0.4); }
  .char-option .char-name { font-family: var(--pixel); font-size: 6px; color: var(--text-dim); display:block; margin-top:4px; }
  .char-option.selected .char-name { color: var(--accent); }

  .color-picker {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 7px;
    margin-top: 8px;
  }
  .color-option {
    border: 2px solid transparent;
    height: 28px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .color-option:hover { transform: scale(1.12); }
  .color-option.selected { border-color: white; box-shadow: 0 0 10px rgba(255,255,255,0.5); transform: scale(1.15); }
  .color-check { font-size: 13px; display: none; }
  .color-option.selected .color-check { display: block; }

  .btn-primary {
    width: 100%;
    background: var(--accent);
    color: white;
    border: none;
    padding: 14px;
    font-family: var(--pixel);
    font-size: 10px;
    cursor: pointer;
    letter-spacing: 2px;
    box-shadow: 4px 4px 0 #7a0020;
    transition: all 0.15s;
  }
  .btn-primary:hover { transform: translate(-2px,-2px); box-shadow: 6px 6px 0 #7a0020; }

  .divider {
    text-align: center;
    font-family: var(--pixel);
    font-size: 8px;
    color: var(--text-dim);
    margin: 16px 0;
    position: relative;
  }
  .divider::before, .divider::after {
    content: '';
    position: absolute;
    top: 50%;
    width: 35%;
    height: 1px;
    background: var(--border);
  }
  .divider::before { left: 0; }
  .divider::after { right: 0; }

  .btn-secondary {
    width: 100%;
    background: transparent;
    color: var(--purple);
    border: 2px solid var(--purple);
    padding: 12px;
    font-family: var(--pixel);
    font-size: 9px;
    cursor: pointer;
    letter-spacing: 1px;
    box-shadow: 3px 3px 0 #3d1b5e;
    transition: all 0.15s;
  }
  .btn-secondary:hover { background: rgba(168,85,247,0.1); }

  /* 마지막 방 카드 */
  .last-room-card {
    width: 100%;
    max-width: 480px;
    background: var(--surface);
    border: 2px solid var(--accent2);
    padding: 14px 20px;
    display: none;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    box-shadow: 0 0 16px rgba(245,166,35,0.15), 4px 4px 0 rgba(0,0,0,0.4);
  }
  .last-room-card.show { display: flex; }
  .last-room-label { font-family: var(--pixel); font-size: 6px; color: var(--text-dim); margin-bottom: 5px; }
  .last-room-id { font-family: var(--pixel); font-size: 11px; color: var(--accent2); }
  .btn-rejoin {
    background: transparent;
    border: 2px solid var(--accent2);
    color: var(--accent2);
    padding: 8px 14px;
    font-family: var(--pixel);
    font-size: 8px;
    cursor: pointer;
    white-space: nowrap;
    box-shadow: 2px 2px 0 rgba(0,0,0,0.4);
  }

  canvas.sprite { image-rendering: pixelated; }

  @media (max-width: 480px) {
    .setup-card { padding: 20px 16px; }
    .char-picker { gap: 6px; }
    .color-picker { grid-template-columns: repeat(6, 1fr); gap: 5px; }
  }
</style>
</head>
<body>

<div class="logo">🎵 MUSIC<span>ROOM</span></div>

<div class="setup-card">
  <p class="setup-title">// ENTER THE ROOM</p>

  <div class="input-group">
    <label class="input-label">▸ YOUR NAME</label>
    <input type="text" class="pixel-input" id="player-name" placeholder="닉네임 입력..." maxlength="10">
  </div>

  <div class="input-group">
    <label class="input-label">▸ CHOOSE CHARACTER</label>
    <div class="char-picker" id="char-picker"></div>
  </div>

  <div class="input-group">
    <label class="input-label" style="color:var(--accent2);">▸ CHOOSE COLOR</label>
    <div class="color-picker" id="color-picker"></div>
  </div>

  <button class="btn-primary" id="create-room-btn">🏠 새 방 만들기</button>

  <div class="divider">OR</div>

  <div class="input-group">
    <label class="input-label">▸ ROOM CODE</label>
    <input type="text" class="pixel-input" id="room-code-input" placeholder="방 코드 입력..." maxlength="6" style="text-transform:uppercase;">
  </div>
  <button class="btn-secondary" id="join-room-btn">🚪 방 입장하기</button>
</div>

<!-- 마지막 방 재입장 카드 -->
<div class="last-room-card" id="last-room-card">
  <div>
    <div class="last-room-label">▸ 마지막 방</div>
    <div class="last-room-id" id="last-room-id"></div>
  </div>
  <button class="btn-rejoin" id="last-room-rejoin">↩ 다시 입장</button>
</div>

<script src="shared.js" onload="initPage()"></script>
<script>
// ── 프로필 저장/불러오기
function saveProfile(name) {
  localStorage.setItem('musicroom_profile', JSON.stringify({
    name: name || '',
    charId: selectedChar,
    colorId: selectedColor,
  }));
}

function loadProfile() {
  try {
    const p = JSON.parse(localStorage.getItem('musicroom_profile') || '{}');
    if (p.name) document.getElementById('player-name').value = p.name;
    if (p.charId && CHARS.find(c => c.id === p.charId)) selectedChar = p.charId;
    if (p.colorId && COLORS.find(c => c.id === p.colorId)) selectedColor = p.colorId;
  } catch(e) {}
}

function initPage() {
  loadProfile();
  renderCharPicker();
  showLastRoomCard();
}

// shared.js가 이미 로드됐을 경우 대비
if (typeof renderCharPicker === 'function') initPage();

// ── 마지막 방 카드
function showLastRoomCard() {
  try {
    const s = JSON.parse(localStorage.getItem('musicroom_session') || '{}');
    if (!s.roomId || Date.now() - s.savedAt > 24*60*60*1000) return;
    document.getElementById('last-room-id').textContent = 'ROOM: ' + s.roomId;
    document.getElementById('last-room-card').classList.add('show');
    document.getElementById('last-room-rejoin').onclick = () => {
      goToRoom(s.roomId, s.name, s.charId, s.colorId, s.seatIndex, true);
    };
  } catch(e) {}
}
// ── 방으로 이동
function goToRoom(roomId, name, charId, colorId, seatIndex, rejoin) {
  const params = new URLSearchParams({ roomId, name, charId, colorId });
  if (seatIndex !== undefined) params.set('seatIndex', seatIndex);
  if (rejoin) params.set('rejoin', '1');
  location.href = 'room.html?' + params.toString();
}

// ── 버튼 이벤트
document.getElementById('create-room-btn').addEventListener('click', () => {
  const name = document.getElementById('player-name').value.trim();
  if (!name) { alert('닉네임을 입력해주세요!'); return; }
  saveProfile(name);
  const roomId = Math.random().toString(36).substring(2,8).toUpperCase();
  goToRoom(roomId, name, selectedChar, selectedColor, 0, false);
});

document.getElementById('join-room-btn').addEventListener('click', () => {
  const name = document.getElementById('player-name').value.trim();
  const code = document.getElementById('room-code-input').value.trim().toUpperCase();
  if (!name) { alert('닉네임을 입력해주세요!'); return; }
  if (!code || code.length !== 6) { alert('방 코드 6자리를 입력해주세요!'); return; }
  saveProfile(name);
  goToRoom(code, name, selectedChar, selectedColor, undefined, false);
});

// URL에서 room 파라미터 (링크 공유로 접속 시)
const urlParams = new URLSearchParams(location.search);
const roomFromUrl = urlParams.get('room');
if (roomFromUrl) {
  document.getElementById('room-code-input').value = roomFromUrl;
}
</script>
</body>
</html>
